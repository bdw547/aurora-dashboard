# =============================================================================
# AURORA — standalone custom dashboard firmware for Guition JC1060P470
# =============================================================================
# Self-contained ESPHome config (stock components only): reuses the proven
# hardware bring-up (mipi_dsi JC1060P470 display, GT911 touch, ESP32-C6 hosted
# WiFi) WITHOUT espcontrol's button-grid component, and renders the custom
# Aurora UI wired to real Home Assistant entities.
# Flash first via esptool-js (browser), then OTA. secrets.yaml supplies wifi.
# =============================================================================
substitutions:
  name: "aurora-panel"
  friendly_name: "Aurora Panel"
  # Aurora palette
  c_bg: "0x08090D"
  c_card: "0x141720"
  c_hair: "0x2A2E38"
  c_text: "0xEEF0F6"
  c_text2: "0x8A8F9E"
  c_text3: "0x6E727E"
  c_teal: "0x2ED5B8"
  c_purple: "0x7B6CFF"
  c_warn: "0xFF9F6B"
  # --- Entity bindings (edit these to point Aurora at your Home Assistant) ---
  ent_light_living: "light.living_room_main"
  ent_light_kitchen: "light.kitchen_kitchen"
  ent_light_dining: "light.dining_room_chandelier"
  ent_light_office_shelves: "light.office_shelves"
  ent_light_office_main: "light.office_main_lights"
  ent_light_office_desk: "light.office_desk_lamp"
  ent_light_reading: "light.reading_lamp"
  ent_light_master: "light.master_bedroom_ceiling_fan_light"
  ent_light_patio: "light.outdoor_patio_back_porch_lights"
  ent_fan_living: "fan.living_room_pendant"
  ent_fan_office: "fan.office_ceiling_fan"
  ent_switch_putting_green: "switch.outdoor_patio_putting_green"
  ent_lock_front: "lock.front_door"
  ent_lock_back: "lock.back_door"
  ent_batt_front: "sensor.front_door_battery"
  ent_batt_back: "sensor.back_door_battery"
  ent_media_spotify: "media_player.spotifyplus_ben_walton"
  ent_media_tv: "media_player.lg_g3_living_room_2"
  ent_climate_main: "climate.main_floor"
  ent_climate_master: "climate.master_bedroom_master_bedroom"
  ent_climate_up: "climate.upstairs_upstairs"
  ent_sonos_living: "media_player.living_room"
  ent_sonos_kitchen: "media_player.kitchen"
  ent_camera_front: "camera.front_door"
  ent_event_chime: "event.front_door_front_door_chime"
  ha_base: "http://10.0.0.208:8123"
  ent_person: "person.ben"
  ent_weather: "weather.forecast_home"
  ent_weather_fc: "sensor.aurora_weather_daily"
  ent_nas_status: "sensor.walton_synology_volume_1_status"
  ent_nas_used: "sensor.walton_synology_volume_1_volume_used"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  on_boot:
    # Static `rotation:` is a no-op on this DSI panel; rotate at runtime late.
    - priority: -100
      then:
        - lvgl.display.set_rotation: 0
        - script.execute: demo_watchdog

esp32:
  variant: esp32p4
  flash_size: 16MB
  cpu_frequency: 360MHZ
  engineering_sample: true
  framework:
    type: esp-idf
    version: 5.5.2
    platform_version: 55.03.37
    advanced:
      enable_idf_experimental_features: true
      execute_from_psram: true
    # Board-specific options carried over from the proven stock firmware.
    # The ESP_HOSTED mempool/SPIRAM + stack settings are required or the C6
    # WiFi init fails ("HS_MP: mempool create failed: no mem") and boot-loops.
    sdkconfig_options:
      CONFIG_SDMMC_HOST_DEFAULT: "y"
      CONFIG_COMPILER_OPTIMIZATION_SIZE: "y"
      CONFIG_ESP_MAIN_TASK_STACK_SIZE: "8192"
      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "60"
      CONFIG_ESP_HOSTED_USE_MEMPOOL: "n"
      CONFIG_ESP_HOSTED_DFLT_TASK_FROM_SPIRAM: "y"
      CONFIG_FREERTOS_THREAD_LOCAL_STORAGE_POINTERS: "1"
      CONFIG_LOG_DEFAULT_LEVEL: "2"

psram:
  mode: hex
  speed: 200MHz

# Internal LDO powering the MIPI-DSI PHY (required by the P4 DSI display)
esp_ldo:
  - channel: 3
    id: dsi_phy_enable
    voltage: 2.5V

# ESP32-C6 hosted WiFi/BLE over SDIO
esp32_hosted:
  variant: esp32c6
  reset_pin: GPIO54
  cmd_pin: GPIO19
  clk_pin: GPIO18
  d0_pin: GPIO14
  d1_pin: GPIO15
  d2_pin: GPIO16
  d3_pin: GPIO17
  active_high: true
  sdio_frequency: 20MHz

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  power_save_mode: none
  # Stay running the dashboard (demo mode) when the home network isn't found,
  # instead of reboot-looping.
  reboot_timeout: 0s

api:
  on_client_connected:
    then:
      # Clear demo state if HA (re)connects — live data takes over.
      - lambda: 'id(g_demo) = false;'
      - lvgl.widget.update: { id: lbl_demo, hidden: true }
      - lvgl.widget.update: { id: lbl_cam_demo, hidden: true }
      - lvgl.widget.update: { id: lbl_cam_demo_big, hidden: true }
      - if:
          condition:
            lambda: 'return !id(g_booted);'
          then:
            - lambda: 'id(g_booted) = true;'
            - lvgl.label.update: { id: lbl_boot_status, text: "Loading dashboard..." }
            - delay: 2s
            - lvgl.page.show: page_home
ota:
  - platform: esphome
    on_begin:
      then:
        - lvgl.widget.update: { id: nav_rail, hidden: true }
        - lvgl.widget.update: { id: lbl_ssid, hidden: true }
        - lvgl.widget.update: { id: lbl_ip, hidden: true }
        - lvgl.page.show: page_ota
        - lvgl.bar.update: { id: ota_bar, value: 0 }
        - lvgl.label.update: { id: ota_pct, text: "0%" }
        - lvgl.label.update: { id: ota_status, text: "Receiving update..." }
    on_progress:
      then:
        - lvgl.bar.update: { id: ota_bar, value: !lambda 'return (int) x;' }
        - lvgl.label.update:
            id: ota_pct
            text: !lambda 'char b[8]; snprintf(b, sizeof(b), "%d%%", (int) x); return std::string(b);'
    on_end:
      then:
        - lvgl.bar.update: { id: ota_bar, value: 100 }
        - lvgl.label.update: { id: ota_pct, text: "100%" }
        - lvgl.label.update: { id: ota_status, text: "Complete! Restarting..." }
    on_error:
      then:
        - lvgl.label.update:
            id: ota_status
            text: !lambda 'char b[40]; snprintf(b, sizeof(b), "Update failed (error %d)", (int) x); return std::string(b);'
logger:
  level: INFO

# --- Backlight ---
output:
  - platform: ledc
    pin: GPIO23
    id: gpio_backlight_pwm
    frequency: 1000Hz
light:
  - platform: monochromatic
    output: gpio_backlight_pwm
    name: Display Backlight
    id: display_backlight
    restore_mode: RESTORE_DEFAULT_ON
    default_transition_length: 0s

# --- I2C + GT911 touch ---
i2c:
  - id: bus_a
    sda: GPIO07
    scl: GPIO08
    frequency: 400kHz
    sda_pullup_enabled: false
    scl_pullup_enabled: false
touchscreen:
  - platform: gt911
    id: my_touchscreen
    display: my_display
    i2c_id: bus_a
    reset_pin: GPIO22
    interrupt_pin: GPIO21
    on_touch:
      - if:
          condition:
            lambda: 'return id(g_screen_off);'
          then:
            - lambda: 'id(g_screen_off) = false;'
            - light.turn_on:
                id: display_backlight
                brightness: !lambda 'return id(g_bri) / 100.0f;'
            - if:
                condition:
                  lambda: 'return id(g_screensaver);'
                then:
                  - lvgl.page.show: page_home
      # Trackpad: start a fresh gesture
      - if:
          condition:
            lambda: 'return id(g_tp_active);'
          then:
            - lambda: |-
                id(g_tp_total) = 0; id(g_tp_dx) = 0; id(g_tp_dy) = 0; id(g_tp_scroll) = 0;
                id(g_tp_have_last) = false; id(g_tp_inpad) = false; id(g_tp_zone) = 0;
    on_update:
      - if:
          condition:
            lambda: 'return id(g_tp_active) && !touches.empty();'
          then:
            - lambda: |-
                auto &t = touches[0];
                bool inpad    = (t.x >= 96  && t.x <= 856  && t.y >= 120 && t.y <= 470);
                bool inscroll = (t.x >= 872 && t.x <= 1004 && t.y >= 120 && t.y <= 470);
                if (!inpad && !inscroll) { id(g_tp_have_last) = false; return; }
                if (!id(g_tp_have_last)) {
                  id(g_tp_zone) = inpad ? 1 : 2;   // 1 = move pad, 2 = scroll strip
                  id(g_tp_inpad) = inpad;
                }
                if (id(g_tp_have_last)) {
                  int ddx = (int) t.x - id(g_tp_lastx);
                  int ddy = (int) t.y - id(g_tp_lasty);
                  if (id(g_tp_zone) == 1) {
                    id(g_tp_dx) += ddx; id(g_tp_dy) += ddy;
                    id(g_tp_total) += abs(ddx) + abs(ddy);
                  } else {
                    id(g_tp_scroll) -= ddy;          // swipe up -> scroll up
                  }
                }
                id(g_tp_lastx) = t.x; id(g_tp_lasty) = t.y; id(g_tp_have_last) = true;
    on_release:
      - if:
          condition:
            lambda: 'return id(g_tp_active) && id(g_tp_inpad) && id(g_tp_total) < 10;'
          then:
            - homeassistant.action: { action: pyscript.lg_pointer_click }
      - lambda: 'id(g_tp_have_last) = false; id(g_tp_inpad) = false;'

# --- Display (stock mipi_dsi, built-in model) ---
display:
  - platform: mipi_dsi
    id: my_display
    model: JC1060P470
    color_order: RGB
    reset_pin:
      number: GPIO05
    update_interval: never
    auto_clear_enabled: false

