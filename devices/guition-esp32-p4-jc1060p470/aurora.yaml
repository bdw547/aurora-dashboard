  # ---- 6-day forecast columns (forecast package, \n-joined strings) ----
  - platform: homeassistant
    id: ha_wx_fc_names
    entity_id: $ent_weather_fc
    attribute: d_names
    on_value:
      then:
        - lambda: |-
            lv_obj_t* L[6] = { id(lbl_fc_name_0),id(lbl_fc_name_1),id(lbl_fc_name_2),id(lbl_fc_name_3),id(lbl_fc_name_4),id(lbl_fc_name_5) };
            std::string s = x; size_t p = 0;
            for (int i = 0; i < 6; i++) { size_t nl = s.find('\n', p); std::string t = (nl==std::string::npos)?s.substr(p):s.substr(p,nl-p); lv_label_set_text(L[i], t.c_str()); if (nl==std::string::npos) break; p = nl+1; }
  - platform: homeassistant
    id: ha_wx_fc_high
    entity_id: $ent_weather_fc
    attribute: d_high
    on_value:
      then:
        - lambda: |-
            lv_obj_t* L[6] = { id(lbl_fc_hi_0),id(lbl_fc_hi_1),id(lbl_fc_hi_2),id(lbl_fc_hi_3),id(lbl_fc_hi_4),id(lbl_fc_hi_5) };
            std::string s = x; size_t p = 0;
            for (int i = 0; i < 6; i++) { size_t nl = s.find('\n', p); std::string t = (nl==std::string::npos)?s.substr(p):s.substr(p,nl-p); t += "°"; lv_label_set_text(L[i], t.c_str()); if (nl==std::string::npos) break; p = nl+1; }
  - platform: homeassistant
    id: ha_wx_fc_low
    entity_id: $ent_weather_fc
    attribute: d_low
    on_value:
      then:
        - lambda: |-
            lv_obj_t* L[6] = { id(lbl_fc_lo_0),id(lbl_fc_lo_1),id(lbl_fc_lo_2),id(lbl_fc_lo_3),id(lbl_fc_lo_4),id(lbl_fc_lo_5) };
            std::string s = x; size_t p = 0;
            for (int i = 0; i < 6; i++) { size_t nl = s.find('\n', p); std::string t = (nl==std::string::npos)?s.substr(p):s.substr(p,nl-p); t += "°"; lv_label_set_text(L[i], t.c_str()); if (nl==std::string::npos) break; p = nl+1; }
  - platform: homeassistant
    id: ha_wx_fc_cond
    entity_id: $ent_weather_fc
    attribute: d_cond
    on_value:
      then:
        - lambda: |-
            lv_obj_t* L[6] = { id(icon_fc_0),id(icon_fc_1),id(icon_fc_2),id(icon_fc_3),id(icon_fc_4),id(icon_fc_5) };
            std::string s = x; size_t p = 0;
            for (int i = 0; i < 6; i++) {
