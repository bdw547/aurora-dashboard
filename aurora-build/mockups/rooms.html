<!doctype html><html><head><meta charset=utf-8>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css" rel="stylesheet">
<style>
html,body{margin:0;padding:0;background:#000}
.aufr{position:relative;width:1024px;height:600px;background:#08090D;background-image:radial-gradient(130% 100% at 88% -10%,rgba(46,213,184,.13),rgba(123,108,255,.08) 42%,transparent 70%);font-family:'Sora',system-ui,sans-serif;color:#EEF0F6;overflow:hidden}
/* st_glass */
.glass{position:absolute;background:rgba(20,23,32,.92);border:1px solid #2A2E38;border-radius:22px}
.mdi{font-family:'Material Design Icons';font-style:normal;line-height:1}
.l{position:absolute;white-space:nowrap}
.f-disp{font-family:Sora;font-weight:600}
.f-title{font-family:Sora;font-weight:600;font-size:24px}
.f-head{font-family:Sora;font-weight:600;font-size:34px}
.f-body{font-family:Sora;font-weight:500;font-size:14px}
.f-small{font-family:Sora;font-weight:500;font-size:12px}
/* nav rail */
.rail{position:absolute;left:0;top:0;width:74px;height:600px;background:#10121A;opacity:.96}
.nav{position:absolute;left:8px;width:58px;height:58px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:30px;color:#EEF0F6}
.qbtn{position:absolute;width:122px;height:62px;border-radius:12px;background:#161B24;display:flex;align-items:center;justify-content:center;font-size:14px}
</style></head><body>
