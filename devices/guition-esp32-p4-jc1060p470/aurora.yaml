  on_idle:
    timeout: !lambda 'return id(g_timeout_ms) == 0 ? 86400000 : id(g_timeout_ms);'
    then:
      - if:
          condition:
            lambda: 'return id(g_timeout_ms) > 0;'
          then:
            - lambda: 'id(g_screen_off) = true;'
            - if:
