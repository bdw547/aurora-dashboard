script:
  # If Home Assistant never connects after boot, run a self-contained demo.
  - id: demo_watchdog
    mode: single
    then:
      - delay: 18s
      - if:
          condition:
            lambda: 'return !id(g_booted);'
          then:
            - lambda: 'id(g_demo) = true;'
            - lvgl.label.update: { id: lbl_boot_status, text: "Demo mode - no Home Assistant" }
            - delay: 1200ms
            - script.execute: demo_populate
            - lvgl.page.show: page_home
  # Fill the dashboard with believable sample data for showing it off offline.
  - id: demo_populate
    then:
      - lvgl.widget.update: { id: lbl_demo, hidden: false }
      - lvgl.widget.update: { id: lbl_cam_demo, hidden: false }
      - lvgl.widget.update: { id: lbl_cam_demo_big, hidden: false }
      # clock / greeting / screensaver
      - lvgl.label.update: { id: lbl_clock, text: "2:45" }
      - lvgl.label.update: { id: lbl_ampm, text: "PM" }
      - lvgl.label.update: { id: lbl_greeting, text: "Good afternoon, Ben" }
      - lvgl.label.update: { id: lbl_ss_time, text: "2:45" }
      - lvgl.label.update: { id: lbl_ss_date, text: "Saturday, June 21" }
      # home
      - lvgl.label.update: { id: lbl_home_temp_big, text: "72" }
      - lvgl.label.update: { id: lbl_home_cond, text: "Sunny" }
      - lvgl.label.update: { id: lbl_home_temp, text: "72°" }
      - lvgl.label.update: { id: lbl_home_np, text: "Midnight City" }
      - lvgl.label.update: { id: lbl_home_np_artist, text: "M83" }
      - lvgl.label.update: { id: lbl_home_lock_front, text: "Locked", text_color: 0x2ED5B8 }
      - lvgl.label.update: { id: lbl_home_lock_back, text: "Locked", text_color: 0x2ED5B8 }
      - lvgl.label.update: { id: lbl_home_presence, text: "Home" }
      - lvgl.label.update: { id: lbl_home_presence2, text: "Home", text_color: 0x2ED5B8 }
      # climate (3 thermostats)
      - lvgl.label.update: { id: lbl_mf_cur, text: "· 72°" }
      - lvgl.label.update: { id: lbl_mf_action, text: "Cooling" }
      - lvgl.label.update: { id: lbl_mf_lo, text: "65°" }
      - lvgl.label.update: { id: lbl_mf_hi, text: "72°" }
      - lvgl.label.update: { id: lbl_mb_cur, text: "· 70°" }
      - lvgl.label.update: { id: lbl_mb_action, text: "Cooling" }
      - lvgl.label.update: { id: lbl_mb_lo, text: "63°" }
      - lvgl.label.update: { id: lbl_mb_hi, text: "68°" }
      - lvgl.label.update: { id: lbl_up_cur, text: "· 70°" }
      - lvgl.label.update: { id: lbl_up_action, text: "Idle" }
      - lvgl.label.update: { id: lbl_up_lo, text: "66°" }
      - lvgl.label.update: { id: lbl_up_hi, text: "70°" }
      # media / sonos
      - lvgl.label.update: { id: lbl_np_title, text: "Midnight City" }
      - lvgl.label.update: { id: lbl_np_artist, text: "M83" }
      - lvgl.label.update: { id: lbl_sonos_living_title, text: "Open Eye Signal" }
      - lvgl.label.update: { id: lbl_sonos_kitchen_title, text: "Awake — Tycho" }
      - lvgl.label.update: { id: lbl_sonos_link, text: "Solo" }
      # security
      - lvgl.label.update: { id: lbl_front_lock_state, text: "Locked", text_color: 0x2ED5B8 }
      - lvgl.label.update: { id: lbl_back_lock_state, text: "Locked", text_color: 0x2ED5B8 }
      - lvgl.widget.update: { id: btn_front_lock, bg_color: 0x2ED5B8 }
      - lvgl.widget.update: { id: btn_back_lock, bg_color: 0x2ED5B8 }
      - lvgl.label.update: { id: lbl_front_batt, text: "100%" }
      - lvgl.label.update: { id: lbl_back_batt, text: "92%" }
  # Load ONE front-door snapshot shortly after the Security tab opens, so the
  # page renders/stays responsive first and the blocking fetch happens after.
  - id: cam_snap_once
    mode: restart
    then:
      - delay: 250ms
      - if:
          condition:
            lambda: 'return id(g_cam_view) == 1 && !id(g_cam_url).empty();'
          then:
            - online_image.set_url: { id: cam_image, url: !lambda 'return id(g_cam_url);' }
            - component.update: cam_image
  # Fullscreen view: one deferred snapshot on open (then manual Refresh only).
  - id: cam_snap_big
    mode: restart
    then:
      - delay: 250ms
      - if:
          condition:
            lambda: 'return id(g_cam_view) == 2 && !id(g_cam_url).empty();'
          then:
            - online_image.set_url: { id: cam_big, url: !lambda 'return id(g_cam_url);' }
            - component.update: cam_big
