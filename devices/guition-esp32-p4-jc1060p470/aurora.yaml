text_sensor:
  - platform: homeassistant
    id: ha_outdoor_condition
    entity_id: weather.forecast_home
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_clim_condition
            text: !lambda |-
              std::string r = x;
              for (size_t i = 0; i < r.size(); i++) { if (r[i] == '-' || r[i] == '_') r[i] = ' '; }
              if (!r.empty()) r[0] = toupper(r[0]);
              return r;
        - lvgl.label.update:
            id: lbl_home_cond
            text: !lambda |-
              std::string r = x;
              for (size_t i = 0; i < r.size(); i++) { if (r[i] == '-' || r[i] == '_') r[i] = ' '; }
              if (!r.empty()) r[0] = toupper(r[0]);
              return r;
  - platform: homeassistant
