            x: 96
            y: 92
            width: 266
            height: 56
            styles: st_glass
            pad_all: 12
            widgets:
              - obj: { width: 11, height: 11, radius: 6, bg_color: 0xFFD9A0, align: left_mid, x: 4, border_width: 0 }
              - label: { text: "Living Room", align: left_mid, x: 24, text_font: f_body, text_color: $c_text }
              - label: { text: "74%", align: right_mid, x: -4, text_font: f_body, text_color: $c_text2 }
            on_click:
              - homeassistant.action:
                  action: light.toggle
                  data: { entity_id: light.living_room_main }
        - button:
            x: 96
            y: 154
            width: 266
            height: 56
            styles: st_glass
            pad_all: 12
            widgets:
              - obj: { width: 11, height: 11, radius: 6, bg_color: 0x7B6CFF, align: left_mid, x: 4, border_width: 0 }
              - label: { text: "Office Shelves", align: left_mid, x: 24, text_font: f_body, text_color: 0xEEF0F6 }
            on_click:
              - homeassistant.action:
                  action: light.toggle
                  data: { entity_id: light.office_shelves }
        - button:
            x: 96
            y: 216
            width: 266
            height: 56
            styles: st_glass
            pad_all: 12
            widgets:
              - obj: { width: 11, height: 11, radius: 6, bg_color: 0xFFF3DF, align: left_mid, x: 4, border_width: 0 }
