          id: lbl_rem
          text: !lambda |-
            int r = id(np_dur) - id(np_pos); if (r < 0) r = 0;
            char b[10]; snprintf(b, sizeof(b), "-%d:%02d", r / 60, r % 60); return std::string(b);

time:
  - platform: homeassistant
    id: ha_time

interval:
  # NOTE: camera images are NOT polled on an interval. ESPHome's image fetch is
  # synchronous (blocks the UI loop) and the cloud-Nest camera_proxy is slow, so
  # both the Security card and the fullscreen view load a single snapshot on open
  # (deferred) plus a manual Refresh — auto-polling locked up the screen.
  - interval: 50ms
    then:
      - if:
          condition:
            lambda: 'return id(g_tp_active) && (id(g_tp_dx) != 0 || id(g_tp_dy) != 0);'
          then:
            # x2 sensitivity so a short drag covers more screen (less perceived lag)
            - homeassistant.action:
                action: pyscript.lg_pointer_move
                data:
                  dx: !lambda 'return std::to_string(id(g_tp_dx) * 2);'
                  dy: !lambda 'return std::to_string(id(g_tp_dy) * 2);'
            - lambda: 'id(g_tp_dx) = 0; id(g_tp_dy) = 0;'
      - if:
          condition:
            lambda: 'return id(g_tp_active) && abs(id(g_tp_scroll)) >= 10;'
          then:
            - homeassistant.action:
                action: pyscript.lg_pointer_scroll
                data:
                  dy: !lambda 'return std::to_string(id(g_tp_scroll) / 10);'
            - lambda: 'id(g_tp_scroll) = id(g_tp_scroll) % 10;'
  - interval: 10s
    then:
      - lvgl.label.update:
          id: lbl_clock
          text: !lambda |-
            auto t = id(ha_time).now();
            if (!t.is_valid()) return std::string("--:--");
            int h = t.hour % 12; if (h == 0) h = 12;
            char c[8]; snprintf(c, sizeof(c), "%d:%02d", h, t.minute); return std::string(c);
      - lvgl.label.update:
          id: lbl_ampm
          text: !lambda |-
            auto t = id(ha_time).now();
            if (!t.is_valid()) return std::string("");
            return std::string(t.hour < 12 ? "AM" : "PM");
      - lvgl.label.update:
          id: lbl_greeting
          text: !lambda |-
            auto t = id(ha_time).now();
            if (!t.is_valid()) return std::string("Welcome home, Ben");
            const char* g = t.hour < 12 ? "Good morning" : (t.hour < 18 ? "Good afternoon" : "Good evening");
            const char* d[] = {"Sun","Mon","Tue","Wed","Thu","Fri","Sat"};
            const char* m[] = {"Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"};
            char c[56]; snprintf(c, sizeof(c), "%s, Ben \u00b7 %s %s %d", g, d[t.day_of_week-1], m[t.month-1], t.day_of_month); return std::string(c);
      - lvgl.label.update:
          id: lbl_ss_time
          text: !lambda |-
            auto t = id(ha_time).now();
            if (!t.is_valid()) return std::string("--:--");
            int h = t.hour % 12; if (h == 0) h = 12;
            char c[8]; snprintf(c, sizeof(c), "%d:%02d", h, t.minute); return std::string(c);
      - lvgl.label.update:
          id: lbl_ss_date
          text: !lambda |-
            auto t = id(ha_time).now();
            if (!t.is_valid()) return std::string("");
            const char* d[] = {"Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"};
            const char* m[] = {"Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"};
            char c[48]; snprintf(c, sizeof(c), "%s, %s %d", d[t.day_of_week-1], m[t.month-1], t.day_of_month); return std::string(c);
  - interval: 1s
    then:
      - if:
          condition:
            lambda: 'return id(np_playing) && id(np_dur) > 0 && id(np_pos) < id(np_dur);'
          then:
            - lambda: 'id(np_pos) += 1;'
            - script.execute: np_update

