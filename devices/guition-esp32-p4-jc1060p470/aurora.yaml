    # ---------- MEDIA (Sonos now-playing + zones + webOS TV remote) ----------
    # NOTE: zone buttons call media_play_pause per room for v1; real Sonos
    # grouping (media_player.join/unjoin) is a refinement once confirmed.
    - id: page_media
      bg_opa: 0
      widgets:
        - image: { src: img_aurora_bg, x: 0, y: 0 }
        - label: { text: "Listening", x: 100, y: 26, text_font: f_title, text_color: $c_text }

        # Now-playing card (Sonos: media_player.living_room)
        - obj:
            x: 96
            y: 70
            width: 440
            height: 360
            styles: st_glass
            widgets:
              - obj: { x: 4, y: 4, width: 120, height: 120, radius: 16, bg_color: $c_purple, border_width: 0 }
              - label: { id: lbl_np_title, text: "Nothing playing", x: 138, y: 14, text_font: f_title, text_color: $c_text }
              - label: { id: lbl_np_artist, text: "", x: 138, y: 50, text_font: f_body, text_color: $c_text2 }
              - button:
                  align: bottom_left
                  x: 0
                  y: -60
                  width: 70
                  height: 48
                  widgets: [label: { text: "󰒮", align: center, text_font: f_icon, text_color: $c_text } ]
                  on_click:
                    - homeassistant.action: { action: media_player.media_previous_track, data: { entity_id: media_player.living_room } }
              - button:
                  align: bottom_mid
                  y: -60
                  width: 70
                  height: 48
                  bg_color: $c_teal
                  bg_grad_color: $c_purple
                  widgets: [label: { text: "󰐊", align: center, text_font: f_icon, text_color: $c_bg } ]
                  on_click:
                    - homeassistant.action: { action: media_player.media_play_pause, data: { entity_id: media_player.living_room } }
              - button:
                  align: bottom_right
                  x: 0
                  y: -60
                  width: 70
                  height: 48
                  widgets: [label: { text: "󰒭", align: center, text_font: f_icon, text_color: $c_text } ]
                  on_click:
                    - homeassistant.action: { action: media_player.media_next_track, data: { entity_id: media_player.living_room } }
              - slider:
                  id: sld_vol
                  align: bottom_mid
                  y: -10
                  width: 400
                  min_value: 0
                  max_value: 100
                  value: 34
                  on_release:
                    - homeassistant.action:
                        action: media_player.volume_set
                        data:
                          entity_id: media_player.living_room
                          volume_level: !lambda 'char b[8]; snprintf(b, sizeof(b), "%.2f", x / 100.0f); return std::string(b);'

        # Speaker zones
        - label: { text: "SPEAKERS", x: 560, y: 70, text_font: f_small, text_color: $c_text2 }
        - button:
            x: 560
            y: 92
            width: 200
            height: 44
            styles: st_glass
            pad_all: 10
