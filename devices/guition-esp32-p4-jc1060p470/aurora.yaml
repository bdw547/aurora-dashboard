      - lvgl.widget.update: { id: src_btn_johnwick, bg_color: !lambda 'return id(g_room) == std::string("JOHN-WICK") ? lv_color_hex(0x2ED5B8) : lv_color_hex(0x161B24);' }
      - lvgl.widget.update: { id: src_btn_kitchen, bg_color: !lambda 'return id(g_room) == std::string("Kitchen") ? lv_color_hex(0x2ED5B8) : lv_color_hex(0x161B24);' }
