              else if (c=="lightning") g="\U000F0593";
              else if (c=="lightning-rainy") g="\U000F067E";
              else if (c=="windy"||c=="windy-variant") g="\U000F059D";
              else g="\U000F0026";
              lv_label_set_text(L[i], g.c_str());
              if (nl==std::string::npos) break; p = nl+1;
