                  height: 52
                  widgets: [label: { text: "󰒮", align: center, text_font: f_icon, text_color: $c_text } ]
                  on_click:
                    - homeassistant.action: { action: media_player.media_previous_track, data: { entity_id: media_player.spotifyplus_ben_walton } }
              - button:
                  align: bottom_mid
                  y: -72
                  width: 88
                  height: 52
                  bg_color: $c_teal
                  bg_grad_color: $c_purple
                  widgets: [label: { id: ic_playpause, text: "󰐊", align: center, text_font: f_icon, text_color: $c_bg } ]
                  on_click:
                    - homeassistant.action: { action: media_player.media_play_pause, data: { entity_id: media_player.spotifyplus_ben_walton } }
              - button:
                  align: bottom_right
                  x: 0
                  y: -72
                  width: 78
                  height: 52
                  widgets: [label: { text: "󰒭", align: center, text_font: f_icon, text_color: $c_text } ]
                  on_click:
