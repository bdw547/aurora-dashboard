        - label: { text: "Lights", x: 100, y: 26, text_font: f_title, text_color: $c_text }
        - label: { text: "Tap a light to control", x: 100, y: 60, text_font: f_small, text_color: $c_text2 }

        # Left list (Living Room row shown; others follow same pattern)
