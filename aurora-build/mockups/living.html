<!doctype html><html><head><meta charset=utf-8>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css" rel="stylesheet">
<style>
html,body{margin:0;padding:0;background:#000}
.aufr{position:relative;width:1024px;height:600px;background:#08090d;background-image:radial-gradient(120% 90% at 85% 0%,rgba(46,213,184,.10),rgba(123,108,255,.07) 40%,transparent 70%);font-family:'Sora',system-ui,sans-serif;color:#EEF0F6;overflow:hidden}
.nav{position:absolute;left:8px;width:58px;height:58px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:30px;color:#EEF0F6}
.card{position:absolute;top:96px;width:120px;height:440px;background:#141720;border:1px solid #2A2E38;border-radius:22px}
.mdi{font-family:'Material Design Icons';font-style:normal;line-height:1}
.lbl{position:absolute;white-space:nowrap}
</style></head><body>
<div class="aufr">
  <div style="position:absolute;left:0;top:0;width:74px;height:600px;background:#10121A;opacity:.96"></div>
  <div class="nav mdi mdi-home" style="top:22px"></div>
  <div class="nav mdi mdi-sofa" style="top:92px;background:#2ED5B8;color:#08090D"></div>
  <div class="nav mdi mdi-lightbulb" style="top:162px"></div>
  <div class="nav mdi mdi-thermostat" style="top:232px"></div>
  <div class="nav mdi mdi-music" style="top:302px"></div>
  <div class="nav mdi mdi-shield-home" style="top:372px"></div>
  <div class="nav mdi mdi-wifi" style="top:442px"></div>
  <div class="nav mdi mdi-cog" style="top:512px"></div>
  <div class="lbl" style="left:100px;top:26px;font-size:24px;font-weight:600">Living Room</div>
  <div class="lbl" style="left:100px;top:60px;font-size:12px;color:#8A8F9E">2 of 3 active</div>
  <div style="position:absolute;left:846px;top:24px;width:152px;height:44px;border-radius:14px;background:#141720;border:1px solid #2A2E38;display:flex;align-items:center;justify-content:center;gap:8px"><span class="mdi mdi-chevron-left" style="font-size:24px;color:#8A8F9E"></span><span style="font-size:14px;color:#8A8F9E">Rooms</span></div>

  <!-- Main Lights : light slider card -->
  <div class="card" style="left:100px">
    <span class="mdi mdi-lightbulb lbl" style="left:50%;transform:translateX(-50%);top:24px;color:#FFCE54;font-size:40px"></span>
    <span class="lbl" style="left:0;width:120px;text-align:center;top:78px;font-size:15px;font-weight:600">Main Lights</span>
    <div style="position:absolute;left:42px;top:118px;width:36px;height:250px;border-radius:18px;background:#161B24;overflow:hidden"><div style="position:absolute;bottom:0;width:36px;height:185px;background:linear-gradient(0deg,#2ED5B8,#7BE8D6)"></div></div>
    <span class="lbl" style="left:0;width:120px;text-align:center;top:380px;font-size:26px;font-weight:600">74%</span>
    <div style="position:absolute;left:30px;top:424px;width:60px;height:0"></div>
  </div>

  <!-- Ceiling Fan : fan card -->
  <div class="card" style="left:240px">
    <span class="mdi mdi-fan lbl" style="left:50%;transform:translateX(-50%);top:24px;color:#2ED5B8;font-size:40px"></span>
    <span class="lbl" style="left:0;width:120px;text-align:center;top:78px;font-size:15px;font-weight:600">Ceiling Fan</span>
    <div style="position:absolute;left:42px;top:118px;width:36px;height:250px;border-radius:18px;background:#161B24;overflow:hidden"><div style="position:absolute;bottom:0;width:36px;height:125px;background:linear-gradient(0deg,#2ED5B8,#7BE8D6)"></div></div>
    <span class="lbl" style="left:0;width:120px;text-align:center;top:380px;font-size:22px;font-weight:600">Med</span>
  </div>

  <!-- Main Climate : climate card -->
  <div class="card" style="left:380px">
    <span class="mdi mdi-thermostat lbl" style="left:50%;transform:translateX(-50%);top:24px;color:#FFCE54;font-size:40px"></span>
    <span class="lbl" style="left:0;width:120px;text-align:center;top:78px;font-size:15px;font-weight:600">Climate</span>
    <span class="lbl" style="left:0;width:120px;text-align:center;top:140px;font-size:44px;font-weight:600">72&deg;</span>
    <span class="lbl" style="left:0;width:120px;text-align:center;top:206px;font-size:12px;color:#8A8F9E">target</span>
    <div style="position:absolute;left:30px;top:250px;width:60px;height:60px;border-radius:14px;background:#161B24;display:flex;align-items:center;justify-content:center"><span class="mdi mdi-chevron-up" style="font-size:30px"></span></div>
    <div style="position:absolute;left:30px;top:322px;width:60px;height:60px;border-radius:14px;background:#161B24;display:flex;align-items:center;justify-content:center"><span class="mdi mdi-chevron-down" style="font-size:30px"></span></div>
  </div>

  <!-- empty add slot -->
  <div class="card" style="left:520px;border-style:dashed;border-color:#2A2E38;background:transparent;display:flex;align-items:center;justify-content:center">
    <span class="mdi mdi-plus" style="font-size:40px;color:#3A3F4A"></span>
  </div>
</div>
</body></html>
