<!doctype html><html><head><meta charset=utf-8>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css" rel="stylesheet">
<style>
html,body{margin:0;padding:0;background:#000}
.aufr{position:relative;width:1024px;height:600px;background:#000;font-family:'Sora',system-ui,sans-serif;color:#fff;overflow:hidden}
.mdi{font-family:'Material Design Icons';font-style:normal;line-height:1}
.l{position:absolute;white-space:nowrap}
.f-disp{font-family:Sora;font-weight:600;font-size:52px}
.f-title{font-family:Sora;font-weight:600;font-size:24px}
.f-body{font-family:Sora;font-weight:500;font-size:14px}
</style></head><body>
<div class="aufr">
  <!-- full-bleed pre-baked photo composite (ss_image, centered/fills 1024x600) -->
  <div style="position:absolute;inset:0;background:linear-gradient(150deg,#243b55 0%,#3a2f4d 45%,#0f3d3a 100%)"></div>
  <div style="position:absolute;inset:0;background:radial-gradient(120% 80% at 25% 25%,rgba(255,206,84,.20),transparent 55%),radial-gradient(120% 90% at 80% 85%,rgba(46,213,184,.22),transparent 60%)"></div>

  <!-- bottom scrim: obj align bottom_mid, 1024x184, black 50% -->
  <div style="position:absolute;left:0;bottom:0;width:1024px;height:184px;background:linear-gradient(0deg,rgba(0,0,0,.62),rgba(0,0,0,.20) 70%,transparent)"></div>

  <!-- clock bottom-left: time x44 y-86, date x48 y-36 -->
  <div class="l f-disp" style="left:44px;bottom:86px">2:45</div>
  <div class="l f-body" style="left:48px;bottom:36px;color:#C8CCD6">Sunday, June 28</div>

  <!-- weather bottom-right: wx icon x-46 y-104, temp x-44 y-62 -->
  <span class="mdi l" style="right:46px;bottom:104px;font-size:30px;color:#FFFFFF">&#xF0599;</span>
  <div class="l f-title" style="right:44px;bottom:62px;color:#FFFFFF">72&deg;</div>
</div>
</body></html>
