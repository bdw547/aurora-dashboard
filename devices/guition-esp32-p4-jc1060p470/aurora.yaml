text_sensor:
  - platform: homeassistant
    id: ha_outdoor_condition
    entity_id: weather.forecast_home
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_clim_condition
            text: !lambda |-
              std::string r = x;
              for (size_t i = 0; i < r.size(); i++) { if (r[i] == '-' || r[i] == '_') r[i] = ' '; }
              if (!r.empty()) r[0] = toupper(r[0]);
              return r;
  - platform: homeassistant
    id: ha_spotify_source
    entity_id: media_player.spotifyplus_ben_walton
    attribute: source
    on_value:
      then:
        - lvgl.widget.update: { id: src_btn_dining, bg_color: !lambda 'return x == std::string("Dining Room") ? lv_color_hex(0x2ED5B8) : lv_color_hex(0x161B24);' }
        - lvgl.widget.update: { id: src_btn_gameroom, bg_color: !lambda 'return x == std::string("Gameroom") ? lv_color_hex(0x2ED5B8) : lv_color_hex(0x161B24);' }
        - lvgl.widget.update: { id: src_btn_johnwick, bg_color: !lambda 'return x == std::string("JOHN-WICK") ? lv_color_hex(0x2ED5B8) : lv_color_hex(0x161B24);' }
        - lvgl.widget.update: { id: src_btn_kitchen, bg_color: !lambda 'return x == std::string("Kitchen") ? lv_color_hex(0x2ED5B8) : lv_color_hex(0x161B24);' }
        - lvgl.widget.update: { id: src_btn_living, bg_color: !lambda 'return x == std::string("Living Room") ? lv_color_hex(0x2ED5B8) : lv_color_hex(0x161B24);' }
        - lvgl.widget.update: { id: src_btn_office, bg_color: !lambda 'return x == std::string("Office") ? lv_color_hex(0x2ED5B8) : lv_color_hex(0x161B24);' }
        - lvgl.widget.update: { id: src_btn_patio, bg_color: !lambda 'return x == std::string("Patio") ? lv_color_hex(0x2ED5B8) : lv_color_hex(0x161B24);' }
        - lvgl.widget.update: { id: src_btn_roku, bg_color: !lambda 'return x == std::string("Roku Ultra") ? lv_color_hex(0x2ED5B8) : lv_color_hex(0x161B24);' }
  - platform: homeassistant
    id: ha_media_state
    entity_id: media_player.spotifyplus_ben_walton
    on_value:
      then:
        - lambda: 'id(np_playing) = (x == std::string("playing"));'
        - if:
            condition:
              lambda: 'return x == std::string("playing");'
            then:
              - lvgl.label.update: { id: ic_playpause, text: "\U000F03E4" }
            else:
              - lvgl.label.update: { id: ic_playpause, text: "\U000F040A" }
        - script.execute: np_update
  - platform: homeassistant
    id: ha_media_title
    entity_id: media_player.spotifyplus_ben_walton
    attribute: media_title
    on_value:
      then:
        - lvgl.label.update: { id: lbl_np_title, text: !lambda 'return x.empty() ? std::string("Nothing playing") : x;' }
        - lvgl.label.update: { id: lbl_home_np, text: !lambda 'return x.empty() ? std::string("Nothing playing") : x;' }
  - platform: homeassistant
    id: ha_media_artist
    entity_id: media_player.spotifyplus_ben_walton
    attribute: media_artist
    on_value:
      then:
