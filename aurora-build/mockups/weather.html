<!doctype html><html><head><meta charset=utf-8>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css" rel="stylesheet">
<style>
html,body{margin:0;padding:0;background:#000}
.aufr{position:relative;width:1024px;height:600px;background:#08090D;background-image:radial-gradient(130% 100% at 88% -10%,rgba(46,213,184,.13),rgba(123,108,255,.08) 42%,transparent 70%);font-family:'Sora',system-ui,sans-serif;color:#EEF0F6;overflow:hidden}
/* st_glass */
.glass{position:absolute;background:rgba(20,23,32,.92);border:1px solid #2A2E38;border-radius:22px}
.mdi{font-family:'Material Design Icons';font-style:normal;line-height:1}
.l{position:absolute;white-space:nowrap}
.f-disp{font-family:Sora;font-weight:600}
.f-title{font-family:Sora;font-weight:600;font-size:24px}
.f-head{font-family:Sora;font-weight:600;font-size:34px}
.f-body{font-family:Sora;font-weight:500;font-size:14px}
.f-small{font-family:Sora;font-weight:500;font-size:12px}
/* nav rail */
.rail{position:absolute;left:0;top:0;width:74px;height:600px;background:#10121A;opacity:.96}
.nav{position:absolute;left:8px;width:58px;height:58px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:30px;color:#EEF0F6}
</style></head><body>
<div class="aufr">
  <!-- nav rail (active: home, per page_weather on_load sets nav_home -> #2ED5B8) -->
  <div class="rail"></div>
  <div class="nav mdi mdi-home" style="top:22px;background:#2ED5B8"></div>
  <div class="nav mdi mdi-sofa" style="top:92px;background:#10121A"></div>
  <div class="nav mdi mdi-lightbulb" style="top:162px;background:#10121A"></div>
  <div class="nav mdi mdi-thermometer" style="top:232px;background:#10121A"></div>
  <div class="nav mdi mdi-music" style="top:302px;background:#10121A"></div>
  <div class="nav mdi mdi-shield-home" style="top:372px;background:#10121A"></div>
  <div class="nav mdi mdi-wifi" style="top:442px;background:#10121A"></div>
  <div class="nav mdi mdi-cog" style="top:512px;background:#10121A"></div>
  <div class="l f-small" style="right:10px;bottom:26px;color:#8A8F9E">Walton-Home</div>
  <div class="l f-small" style="right:10px;bottom:8px;color:#2ED5B8">10.0.0.174</div>

  <!-- page title: label "Weather" x100 y26 f_title -->
  <div class="l f-title" style="left:100px;top:26px;color:#EEF0F6">Weather</div>

  <!-- Back pill: button align top_right x:-12 y:12, 104x44 r8, bg #1B2230, 2px teal border, teal text -->
  <div class="l" style="right:12px;top:12px;width:104px;height:44px;border-radius:8px;background:#1B2230;border:2px solid #2ED5B8;box-sizing:border-box;display:flex;align-items:center;justify-content:center">
    <span class="f-body" style="color:#2ED5B8">Back</span>
  </div>

  <!-- Current conditions hero: obj x96 y76, 908x150, st_glass (pad 20) -->
  <div class="glass" style="left:96px;top:76px;width:908px;height:150px">
    <!-- f_wxicon 72px sunny, align left_mid, x:4 -> left 20+4=24, vertical center -->
    <span class="mdi l" style="left:24px;top:50%;transform:translateY(-50%);font-size:72px;color:#FFCE54">&#xF0599;</span>
    <!-- cond x130 y30 f_head -> 20+130=150, 20+30=50 -->
    <span class="l f-head" style="left:150px;top:50px;color:#EEF0F6">Sunny</span>
    <!-- "Outdoor conditions" x132 y80 f_small -> 152, 100 (STATIC) -->
    <span class="l f-small" style="left:152px;top:100px;color:#8A8F9E">Outdoor conditions</span>
    <!-- temp align top_right x:-16 y2 f_display 52 -> right 20+16=36, top 20+2=22 -->
    <span class="l f-disp" style="right:36px;top:22px;font-size:52px;color:#EEF0F6">72&deg;</span>
    <!-- hi align top_right x:-16 y62 f_body -> right 36, top 82 -->
    <span class="l f-body" style="right:36px;top:82px;color:#C8CCD6">H 78&deg;</span>
    <!-- lo align top_right x:-16 y86 f_small -> right 36, top 106 -->
    <span class="l f-small" style="right:36px;top:106px;color:#8A8F9E">L 61&deg;</span>
  </div>

  <!-- Detail rows: obj x96 y238, 908x140, st_glass (pad 20) -->
  <div class="glass" style="left:96px;top:238px;width:908px;height:140px">
    <!-- Air pressure x4 y6 / value top_right x:-4 y6 -> left 24 top 26 / right 24 top 26 -->
    <span class="l f-body" style="left:24px;top:26px;color:#C8CCD6">Air pressure</span>
    <span class="l f-body" style="right:24px;top:26px;color:#EEF0F6">30.05 inHg</span>
    <!-- Humidity x4 y44 / value -> left 24 top 64 / right 24 top 64 -->
    <span class="l f-body" style="left:24px;top:64px;color:#C8CCD6">Humidity</span>
    <span class="l f-body" style="right:24px;top:64px;color:#EEF0F6">44%</span>
    <!-- Wind speed x4 y82 / value -> left 24 top 102 / right 24 top 102 -->
    <span class="l f-body" style="left:24px;top:102px;color:#C8CCD6">Wind speed</span>
    <span class="l f-body" style="right:24px;top:102px;color:#EEF0F6">7 mph NW</span>
  </div>

  <!-- Forecast heading: label x100 y394 f_body (STATIC) -->
  <div class="l f-body" style="left:100px;top:394px;color:#EEF0F6">Forecast</div>

  <!-- 6-day forecast columns: each width 140, text-align center; rows name/icon(f_icon 30)/hi/lo -->
  <!-- col 0 x96 -->
  <div class="l f-body"  style="left:96px;top:426px;width:140px;text-align:center;color:#EEF0F6">Mon</div>
  <span class="mdi l"    style="left:96px;top:452px;width:140px;text-align:center;font-size:30px;color:#FFCE54">&#xF0599;</span>
  <div class="l f-body"  style="left:96px;top:498px;width:140px;text-align:center;color:#EEF0F6">79&deg;</div>
  <div class="l f-small" style="left:96px;top:524px;width:140px;text-align:center;color:#8A8F9E">62&deg;</div>
  <!-- col 1 x248 -->
  <div class="l f-body"  style="left:248px;top:426px;width:140px;text-align:center;color:#EEF0F6">Tue</div>
  <span class="mdi l"    style="left:248px;top:452px;width:140px;text-align:center;font-size:30px;color:#FFCE54">&#xF0595;</span>
  <div class="l f-body"  style="left:248px;top:498px;width:140px;text-align:center;color:#EEF0F6">81&deg;</div>
  <div class="l f-small" style="left:248px;top:524px;width:140px;text-align:center;color:#8A8F9E">64&deg;</div>
  <!-- col 2 x400 -->
  <div class="l f-body"  style="left:400px;top:426px;width:140px;text-align:center;color:#EEF0F6">Wed</div>
  <span class="mdi l"    style="left:400px;top:452px;width:140px;text-align:center;font-size:30px;color:#42A5F5">&#xF0597;</span>
  <div class="l f-body"  style="left:400px;top:498px;width:140px;text-align:center;color:#EEF0F6">74&deg;</div>
  <div class="l f-small" style="left:400px;top:524px;width:140px;text-align:center;color:#8A8F9E">59&deg;</div>
  <!-- col 3 x552 -->
  <div class="l f-body"  style="left:552px;top:426px;width:140px;text-align:center;color:#EEF0F6">Thu</div>
  <span class="mdi l"    style="left:552px;top:452px;width:140px;text-align:center;font-size:30px;color:#42A5F5">&#xF0F33;</span>
  <div class="l f-body"  style="left:552px;top:498px;width:140px;text-align:center;color:#EEF0F6">70&deg;</div>
  <div class="l f-small" style="left:552px;top:524px;width:140px;text-align:center;color:#8A8F9E">57&deg;</div>
  <!-- col 4 x704 -->
  <div class="l f-body"  style="left:704px;top:426px;width:140px;text-align:center;color:#EEF0F6">Fri</div>
  <span class="mdi l"    style="left:704px;top:452px;width:140px;text-align:center;font-size:30px;color:#FFCE54">&#xF0595;</span>
  <div class="l f-body"  style="left:704px;top:498px;width:140px;text-align:center;color:#EEF0F6">77&deg;</div>
  <div class="l f-small" style="left:704px;top:524px;width:140px;text-align:center;color:#8A8F9E">60&deg;</div>
  <!-- col 5 x856 -->
  <div class="l f-body"  style="left:856px;top:426px;width:140px;text-align:center;color:#EEF0F6">Sat</div>
  <span class="mdi l"    style="left:856px;top:452px;width:140px;text-align:center;font-size:30px;color:#FFCE54">&#xF0599;</span>
  <div class="l f-body"  style="left:856px;top:498px;width:140px;text-align:center;color:#EEF0F6">82&deg;</div>
  <div class="l f-small" style="left:856px;top:524px;width:140px;text-align:center;color:#8A8F9E">65&deg;</div>

  <!-- Attribution: label align bottom_mid y:-6 f_small (STATIC) -->
  <div class="l f-small" style="left:0;right:0;bottom:6px;text-align:center;color:#4A4F5A">Forecast from met.no &middot; Norwegian Meteorological Institute</div>
</div>
</body></html>
