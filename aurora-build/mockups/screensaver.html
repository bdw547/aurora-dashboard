<!doctype html><html><head><meta charset=utf-8>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css" rel="stylesheet">
<style>
html,body{margin:0;padding:0;background:#000}
.aufr{position:relative;width:1024px;height:600px;font-family:'Sora',system-ui,sans-serif;color:#fff;overflow:hidden;background:#05070a}
.mdi{font-family:'Material Design Icons';font-style:normal;line-height:1}
.lbl{position:absolute;white-space:nowrap}
</style></head><body>
<div class="aufr">
  <!-- blurred cover fill (pre-baked server-side) -->
  <div style="position:absolute;inset:0;background:linear-gradient(135deg,#1a2340,#3a2a4d 45%,#0e2a2a);filter:blur(0)"></div>
  <div style="position:absolute;inset:0;background:radial-gradient(120% 90% at 30% 20%,rgba(123,108,255,.35),transparent 60%),radial-gradient(120% 90% at 80% 90%,rgba(46,213,184,.30),transparent 60%)"></div>
  <div style="position:absolute;inset:0;background:rgba(0,0,0,.45)"></div>
  <!-- sharp centered photo -->
  <div style="position:absolute;left:262px;top:60px;width:500px;height:480px;border-radius:18px;background:linear-gradient(135deg,#7B6CFF,#2ED5B8);box-shadow:0 20px 60px rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center">
    <span class="mdi mdi-image" style="font-size:80px;color:rgba(255,255,255,.45)"></span>
  </div>

  <!-- clock overlay -->
  <div class="lbl" style="left:48px;top:40px;font-size:88px;font-weight:600;text-shadow:0 2px 20px rgba(0,0,0,.6)">2:45</div>
  <div class="lbl" style="left:52px;top:152px;font-size:20px;color:rgba(255,255,255,.85);text-shadow:0 2px 12px rgba(0,0,0,.6)">Sunday, June 28</div>

  <!-- weather overlay bottom-left -->
  <div class="lbl" style="left:48px;bottom:48px;display:flex;align-items:center;gap:14px">
    <span class="mdi mdi-weather-sunny" style="font-size:48px;color:#FFCE54;text-shadow:0 2px 12px rgba(0,0,0,.6)"></span>
    <span style="font-size:48px;font-weight:600;text-shadow:0 2px 12px rgba(0,0,0,.6)">72&deg;</span>
    <span style="font-size:18px;color:rgba(255,255,255,.8);align-self:flex-end;padding-bottom:8px">Sunny</span>
  </div>

  <!-- photo counter -->
  <div class="lbl" style="right:40px;bottom:48px;font-size:14px;color:rgba(255,255,255,.7);text-shadow:0 2px 8px rgba(0,0,0,.6)">3 / 24</div>
</div>
</body></html>
