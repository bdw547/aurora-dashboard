# --- Live HA state (selected light = Living Room for v1) ---
sensor:
  - platform: homeassistant
    id: ha_media_volume
    entity_id: $ent_media_spotify
    attribute: volume_level
    on_value:
      then:
        - lvgl.slider.update:
            id: sld_vol
            value: !lambda 'return x * 100.0f;'
  - platform: homeassistant
    id: ha_media_position
    entity_id: $ent_media_spotify
    attribute: media_position
    on_value:
      then:
        - lambda: 'id(np_pos) = (int) x;'
        - script.execute: np_update
  - platform: homeassistant
    id: ha_media_duration
    entity_id: $ent_media_spotify
    attribute: media_duration
    on_value:
      then:
        - lambda: 'id(np_dur) = (int) x;'
        - script.execute: np_update

  - platform: homeassistant
    id: ha_outdoor_temp
    entity_id: $ent_weather
    attribute: temperature
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_home_temp
            text: !lambda |-
              char b[16]; snprintf(b, sizeof(b), "%.0f°", x); return std::string(b);
        - lvgl.label.update:
            id: lbl_home_temp_big
            text: !lambda |-
              char b[16]; snprintf(b, sizeof(b), "%.0f°", x); return std::string(b);
  # ---- Thermostats: current temp + setpoints (Main Floor / Master / Upstairs) ----
  - platform: homeassistant
    id: ha_mf_current
    entity_id: $ent_climate_main
    attribute: current_temperature
    on_value:
      then:
        - lvgl.label.update: { id: lbl_mf_cur, text: !lambda 'char b[12]; snprintf(b,sizeof(b),"· %.0f°",x); return std::string(b);' }
  - platform: homeassistant
    id: ha_mf_low
    entity_id: $ent_climate_main
    attribute: target_temp_low
    on_value:
      then:
        - lambda: 'id(g_mf_low) = x;'
        - lvgl.label.update: { id: lbl_mf_lo, text: !lambda 'char b[12]; snprintf(b,sizeof(b),"%.0f°",x); return std::string(b);' }
  - platform: homeassistant
    id: ha_mf_high
    entity_id: $ent_climate_main
    attribute: target_temp_high
    on_value:
      then:
        - lambda: 'id(g_mf_high) = x;'
        - lvgl.label.update: { id: lbl_mf_hi, text: !lambda 'char b[12]; snprintf(b,sizeof(b),"%.0f°",x); return std::string(b);' }
  - platform: homeassistant
    id: ha_mb_current
    entity_id: $ent_climate_master
    attribute: current_temperature
    on_value:
      then:
        - lvgl.label.update: { id: lbl_mb_cur, text: !lambda 'char b[12]; snprintf(b,sizeof(b),"· %.0f°",x); return std::string(b);' }
  - platform: homeassistant
    id: ha_mb_low
    entity_id: $ent_climate_master
    attribute: target_temp_low
    on_value:
      then:
        - lambda: 'id(g_mb_low) = x;'
        - lvgl.label.update: { id: lbl_mb_lo, text: !lambda 'char b[12]; snprintf(b,sizeof(b),"%.0f°",x); return std::string(b);' }
  - platform: homeassistant
    id: ha_mb_high
    entity_id: $ent_climate_master
    attribute: target_temp_high
    on_value:
      then:
        - lambda: 'id(g_mb_high) = x;'
        - lvgl.label.update: { id: lbl_mb_hi, text: !lambda 'char b[12]; snprintf(b,sizeof(b),"%.0f°",x); return std::string(b);' }
  - platform: homeassistant
    id: ha_up_current
    entity_id: $ent_climate_up
    attribute: current_temperature
    on_value:
      then:
        - lvgl.label.update: { id: lbl_up_cur, text: !lambda 'char b[12]; snprintf(b,sizeof(b),"· %.0f°",x); return std::string(b);' }
  - platform: homeassistant
    id: ha_up_low
    entity_id: $ent_climate_up
    attribute: target_temp_low
    on_value:
      then:
        - lambda: 'id(g_up_low) = x;'
        - lvgl.label.update: { id: lbl_up_lo, text: !lambda 'char b[12]; snprintf(b,sizeof(b),"%.0f°",x); return std::string(b);' }
  - platform: homeassistant
    id: ha_up_high
    entity_id: $ent_climate_up
    attribute: target_temp_high
    on_value:
      then:
        - lambda: 'id(g_up_high) = x;'
        - lvgl.label.update: { id: lbl_up_hi, text: !lambda 'char b[12]; snprintf(b,sizeof(b),"%.0f°",x); return std::string(b);' }
  # ---- Sonos volume levels (0..1) -> slider 0..100 ----
  - platform: homeassistant
    id: ha_sonos_living_vol
    entity_id: $ent_sonos_living
    attribute: volume_level
    on_value:
      then:
        - lambda: 'id(g_vol_living) = (int)(x * 100);'
        - lvgl.slider.update: { id: sld_sonos_living, value: !lambda 'return (int)(x * 100);' }
  - platform: homeassistant
    id: ha_sonos_kitchen_vol
    entity_id: $ent_sonos_kitchen
    attribute: volume_level
    on_value:
      then:
        - lambda: 'id(g_vol_kitchen) = (int)(x * 100);'
        - lvgl.slider.update: { id: sld_sonos_kitchen, value: !lambda 'return (int)(x * 100);' }
  # ---- Door lock battery levels ----
  - platform: homeassistant
    id: ha_batt_front
    entity_id: $ent_batt_front
    on_value:
      then:
        - lvgl.label.update: { id: lbl_front_batt, text: !lambda 'char b[8]; snprintf(b,sizeof(b),"%.0f%%",x); return std::string(b);' }
  - platform: homeassistant
    id: ha_batt_back
    entity_id: $ent_batt_back
    on_value:
      then:
        - lvgl.label.update: { id: lbl_back_batt, text: !lambda 'char b[8]; snprintf(b,sizeof(b),"%.0f%%",x); return std::string(b);' }
  # ---- Weather detail page (current conditions from $ent_weather attributes) ----
  - platform: homeassistant
    id: ha_wx_temp
    entity_id: $ent_weather
    attribute: temperature
    on_value:
      then:
        - lvgl.label.update: { id: lbl_wx_temp, text: !lambda 'char b[12]; snprintf(b,sizeof(b),"%.0f°",x); return std::string(b);' }
