text_sensor:
  # ---- Thermostat hvac_action (Main Floor / Master / Upstairs) ----
  - platform: homeassistant
    id: ha_mf_action
    entity_id: $ent_climate_main
    attribute: hvac_action
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_mf_action
            text: !lambda 'std::string r=x; if(!r.empty()) r[0]=toupper(r[0]); return r;'
            text_color: !lambda 'return x=="cooling"?lv_color_hex(0x4F91FF): x=="heating"?lv_color_hex(0xFF9F6B): x=="off"?lv_color_hex(0x6E727E): lv_color_hex(0x8A8F9E);'
  - platform: homeassistant
    id: ha_mb_action
    entity_id: $ent_climate_master
    attribute: hvac_action
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_mb_action
            text: !lambda 'std::string r=x; if(!r.empty()) r[0]=toupper(r[0]); return r;'
            text_color: !lambda 'return x=="cooling"?lv_color_hex(0x4F91FF): x=="heating"?lv_color_hex(0xFF9F6B): x=="off"?lv_color_hex(0x6E727E): lv_color_hex(0x8A8F9E);'
  - platform: homeassistant
    id: ha_up_action
    entity_id: $ent_climate_up
    attribute: hvac_action
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_up_action
            text: !lambda 'std::string r=x; if(!r.empty()) r[0]=toupper(r[0]); return r;'
            text_color: !lambda 'return x=="cooling"?lv_color_hex(0x4F91FF): x=="heating"?lv_color_hex(0xFF9F6B): x=="off"?lv_color_hex(0x6E727E): lv_color_hex(0x8A8F9E);'
  # ---- LG TV current app/source -> highlight active app tile ----
  - platform: homeassistant
    id: ha_tv_source
    entity_id: $ent_media_tv
    attribute: source
    on_value:
      then:
        - lvgl.label.update: { id: lbl_tv_source, text: !lambda 'return x;' }
        - lvgl.label.update: { id: lbl_tvapps_now, text: !lambda 'return x.empty() ? std::string("") : std::string("Now: ") + x;' }
        - lvgl.widget.update: { id: app_netflix,   border_width: !lambda 'return x.find("Netflix")!=std::string::npos ? 4 : 0;' }
        - lvgl.widget.update: { id: app_youtube,    border_width: !lambda 'return (x.find("YouTube")!=std::string::npos && x.find("YouTube TV")==std::string::npos) ? 4 : 0;' }
        - lvgl.widget.update: { id: app_youtubetv,  border_width: !lambda 'return x.find("YouTube TV")!=std::string::npos ? 4 : 0;' }
        - lvgl.widget.update: { id: app_disney,     border_width: !lambda 'return x.find("Disney")!=std::string::npos ? 4 : 0;' }
        - lvgl.widget.update: { id: app_prime,      border_width: !lambda 'return x.find("Prime")!=std::string::npos ? 4 : 0;' }
        - lvgl.widget.update: { id: app_max,        border_width: !lambda 'return (x.find("Max")!=std::string::npos || x.find("HBO")!=std::string::npos) ? 4 : 0;' }
        - lvgl.widget.update: { id: app_appletv,    border_width: !lambda 'return x.find("Apple")!=std::string::npos ? 4 : 0;' }
        - lvgl.widget.update: { id: app_plex,       border_width: !lambda 'return x.find("Plex")!=std::string::npos ? 4 : 0;' }
        - lvgl.widget.update: { id: app_peacock,    border_width: !lambda 'return x.find("Peacock")!=std::string::npos ? 4 : 0;' }
        - lvgl.widget.update: { id: app_spotify,    border_width: !lambda 'return x.find("Spotify")!=std::string::npos ? 4 : 0;' }
        - lvgl.widget.update: { id: app_hulu,       border_width: !lambda 'return x.find("Hulu")!=std::string::npos ? 4 : 0;' }
        - lvgl.widget.update: { id: app_paramount,  border_width: !lambda 'return x.find("Paramount")!=std::string::npos ? 4 : 0;' }
