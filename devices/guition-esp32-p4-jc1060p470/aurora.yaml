    entity_id: media_player.spotifyplus_ben_walton
    attribute: source
    on_value:
      then:
        - lvgl.widget.update: { id: src_btn_dining, bg_color: !lambda 'return x == std::string("Dining Room") ? lv_color_hex(0x2ED5B8) : lv_color_hex(0x161B24);' }
