  - platform: homeassistant
    id: ha_media_volume
    entity_id: media_player.spotifyplus_ben_walton
    attribute: volume_level
    on_value:
      then:
        - lvgl.slider.update:
            id: sld_vol
            value: !lambda 'return x * 100.0f;'
  - platform: homeassistant
    id: ha_media_position
    entity_id: media_player.spotifyplus_ben_walton
    attribute: media_position
    on_value:
      then:
        - lambda: 'id(np_pos) = (int) x;'
        - script.execute: np_update
  - platform: homeassistant
    id: ha_media_duration
    entity_id: media_player.spotifyplus_ben_walton
    attribute: media_duration
    on_value:
      then:
        - lambda: 'id(np_dur) = (int) x;'
        - script.execute: np_update

  - platform: homeassistant
    id: ha_outdoor_temp
    entity_id: weather.forecast_home
    attribute: temperature
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_outdoor
            text: !lambda |-
              char b[16]; snprintf(b, sizeof(b), "%.0f°", x); return std::string(b);
        - lvgl.label.update:
            id: lbl_home_temp
            text: !lambda |-
              char b[16]; snprintf(b, sizeof(b), "%.0f°", x); return std::string(b);
  - platform: homeassistant
