<!doctype html><html><head><meta charset=utf-8>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css" rel="stylesheet">
<style>
html,body{margin:0;padding:0;background:#000}
.aufr{position:relative;width:1024px;height:600px;background:#08090d;background-image:radial-gradient(120% 90% at 85% 0%,rgba(46,213,184,.10),rgba(123,108,255,.07) 40%,transparent 70%);font-family:'Sora',system-ui,sans-serif;color:#EEF0F6;overflow:hidden}
.nav{position:absolute;left:8px;width:58px;height:58px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:30px;color:#EEF0F6}
.c{position:absolute;background:#141720;border:1px solid #2A2E38;border-radius:22px}
.mdi{font-family:'Material Design Icons';font-style:normal;line-height:1}
.lbl{position:absolute;white-space:nowrap}
.row{position:absolute;width:404px;height:60px;border-radius:14px;background:#161B24;display:flex;align-items:center}
</style></head><body>
<div class="aufr">
  <div style="position:absolute;left:0;top:0;width:74px;height:600px;background:#10121A;opacity:.96"></div>
  <div class="nav mdi mdi-home" style="top:22px"></div>
  <div class="nav mdi mdi-sofa" style="top:92px"></div>
  <div class="nav mdi mdi-lightbulb" style="top:162px"></div>
  <div class="nav mdi mdi-thermostat" style="top:232px"></div>
  <div class="nav mdi mdi-music" style="top:302px"></div>
  <div class="nav mdi mdi-shield-home" style="top:372px;background:#2ED5B8;color:#08090D"></div>
  <div class="nav mdi mdi-wifi" style="top:442px"></div>
  <div class="nav mdi mdi-cog" style="top:512px"></div>
  <div class="lbl" style="left:100px;top:26px;font-size:24px;font-weight:600">Security</div>
  <div class="lbl" style="left:100px;top:60px;font-size:12px;color:#2ED5B8">All secure &middot; Armed Home</div>

  <!-- camera feed -->
  <div class="c" style="left:100px;top:104px;width:452px;height:452px;overflow:hidden;padding:0">
    <div style="position:absolute;inset:0;background:#0c0e13;background-image:radial-gradient(80% 60% at 50% 30%,rgba(123,108,255,.18),transparent)"></div>
    <span class="mdi mdi-cctv lbl" style="left:0;width:452px;text-align:center;top:170px;font-size:64px;color:#2A2E38"></span>
    <span class="lbl" style="left:0;width:452px;text-align:center;top:250px;font-size:14px;color:#6E727E">Front Door &middot; Live</span>
    <div style="position:absolute;left:18px;top:18px;display:flex;align-items:center;gap:8px"><span style="width:9px;height:9px;border-radius:5px;background:#FF6B6B"></span><span style="font-size:12px;color:#EEF0F6">REC</span></div>
    <span class="lbl" style="right:18px;top:18px;font-size:12px;color:#8A8F9E">2:45 PM</span>
    <div style="position:absolute;left:18px;bottom:18px;width:60px;height:60px;border-radius:14px;background:rgba(20,23,32,.8);display:flex;align-items:center;justify-content:center"><span class="mdi mdi-microphone" style="font-size:26px"></span></div>
    <div style="position:absolute;left:88px;bottom:18px;width:60px;height:60px;border-radius:14px;background:rgba(20,23,32,.8);display:flex;align-items:center;justify-content:center"><span class="mdi mdi-fullscreen" style="font-size:26px"></span></div>
  </div>

  <!-- status panel -->
  <div class="c" style="left:568px;top:104px;width:436px;height:452px">
    <span class="lbl" style="left:24px;top:20px;font-size:12px;color:#8A8F9E;letter-spacing:.06em">DOORS &amp; LOCKS</span>
    <div class="row" style="left:16px;top:48px"><span class="mdi mdi-lock" style="position:absolute;left:16px;color:#2ED5B8;font-size:26px"></span><span style="position:absolute;left:54px;font-size:15px">Front Door</span><span style="position:absolute;right:16px;font-size:14px;color:#2ED5B8">Locked</span></div>
    <div class="row" style="left:16px;top:116px"><span class="mdi mdi-lock" style="position:absolute;left:16px;color:#2ED5B8;font-size:26px"></span><span style="position:absolute;left:54px;font-size:15px">Back Door</span><span style="position:absolute;right:16px;font-size:14px;color:#2ED5B8">Locked</span></div>
    <div class="row" style="left:16px;top:184px"><span class="mdi mdi-garage" style="position:absolute;left:16px;color:#8A8F9E;font-size:26px"></span><span style="position:absolute;left:54px;font-size:15px">Garage</span><span style="position:absolute;right:16px;font-size:14px;color:#8A8F9E">Closed</span></div>
    <span class="lbl" style="left:24px;top:264px;font-size:12px;color:#8A8F9E;letter-spacing:.06em">SENSORS</span>
    <div class="row" style="left:16px;top:292px"><span class="mdi mdi-motion-sensor" style="position:absolute;left:16px;color:#8A8F9E;font-size:26px"></span><span style="position:absolute;left:54px;font-size:15px">Motion</span><span style="position:absolute;right:16px;font-size:14px;color:#8A8F9E">Clear</span></div>
    <div class="row" style="left:16px;top:360px"><span class="mdi mdi-smoke-detector" style="position:absolute;left:16px;color:#2ED5B8;font-size:26px"></span><span style="position:absolute;left:54px;font-size:15px">Smoke / CO</span><span style="position:absolute;right:16px;font-size:14px;color:#2ED5B8">OK</span></div>
  </div>
</div>
</body></html>
