<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Aurora card comparison library</title>
<style>
:root{color-scheme:dark;--bg:#090b0f;--line:#2b333e;--muted:#9da8b6;--text:#f4f7fa;--accent:#61d7c3}
*{box-sizing:border-box}body{margin:0;min-height:100vh;background:var(--bg);color:var(--text);font:15px/1.45 Inter,system-ui,sans-serif;letter-spacing:0}
button,select{font:inherit}header{min-height:72px;display:flex;align-items:center;justify-content:space-between;gap:24px;padding:14px 24px;border-bottom:1px solid var(--line);background:#0c0f14}
h1{margin:0;font-size:21px;letter-spacing:0}header p{margin:3px 0 0;color:var(--muted)}.controls{display:flex;align-items:end;gap:12px;flex-wrap:wrap}
label{display:grid;gap:5px;color:var(--muted);font-size:12px}select,button{min-height:38px;border:1px solid var(--line);border-radius:5px;background:#171c23;color:var(--text);padding:7px 10px}
select{min-width:190px}button{cursor:pointer}button:hover,button:focus-visible,select:focus-visible{border-color:var(--accent);outline:none}
.app{display:grid;grid-template-columns:250px minmax(0,1fr);height:calc(100vh - 73px)}aside{border-right:1px solid var(--line);overflow:auto;background:#0d1015}
.list-head{position:sticky;top:0;z-index:1;padding:16px;border-bottom:1px solid var(--line);background:#0d1015}.list-head strong{display:block;font-size:16px}.list-head span{color:var(--muted);font-size:13px}
#variants{list-style:none;margin:0;padding:8px}#variants button{width:100%;display:grid;grid-template-columns:52px 1fr;align-items:center;text-align:left;margin:2px 0;border-color:transparent;background:transparent}
#variants button:hover{background:#171c23}#variants button.active{border-color:#377c72;background:#142522}.size{font-weight:700;color:var(--accent)}.area{color:var(--muted);font-size:12px}
main{min-width:0;overflow:auto;padding:20px 24px 30px}.detail-head{display:flex;align-items:center;justify-content:space-between;gap:20px;margin-bottom:16px}
h2{margin:0;font-size:22px;letter-spacing:0}#position{color:var(--muted)}.nav{display:flex;gap:8px}.comparison{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px}
figure{margin:0;min-width:0}figcaption{display:flex;justify-content:space-between;align-items:baseline;margin:0 0 8px}figcaption strong{font-size:16px}figcaption span{color:var(--muted);font-size:12px}
.shot{display:block;width:100%;aspect-ratio:16/10;object-fit:contain;border:1px solid var(--line);border-radius:6px;background:#05070a;cursor:zoom-in}
.hint{margin:14px 0 0;color:var(--muted);font-size:13px}dialog{width:min(96vw,1600px);max-width:none;border:1px solid var(--line);border-radius:6px;padding:10px;background:#07090c;color:var(--text)}
dialog::backdrop{background:rgba(0,0,0,.85)}dialog img{display:block;max-width:calc(96vw - 22px);max-height:90vh;margin:auto}dialog button{position:absolute;right:14px;top:14px;background:#11151b}
@media(max-width:900px){header{align-items:flex-start;flex-direction:column}.app{grid-template-columns:1fr;height:auto}aside{border-right:0;border-bottom:1px solid var(--line);max-height:180px}.comparison{grid-template-columns:1fr}}
</style>
</head>
<body>
<header><div><h1>Aurora card comparison library</h1><p>294 card-size pairs from the emulator and web configurator</p></div>
<div class="controls"><label>Card type<select id="type"></select></label><label>Sort sizes<select id="sort"><option value="catalog">Catalog order</option><option value="area-asc">Smallest first</option><option value="area-desc">Largest first</option><option value="width">Width</option><option value="height">Height</option></select></label><label>Comparison view<select id="view"><option value="focused">Focused cards</option><option value="full">Full screens</option></select></label></div></header>
<div class="app"><aside><div class="list-head"><strong id="typeName"></strong><span id="typeCount"></span></div><ol id="variants"></ol></aside>
<main><div class="detail-head"><div><h2 id="title"></h2><div id="position"></div></div><div class="nav"><button id="prev">Previous</button><button id="next">Next</button></div></div>
<section class="comparison"><figure><figcaption><strong>ESPHome emulator</strong><span id="emuMeta">Focused crop</span></figcaption><img class="shot" id="emulator" alt="ESPHome emulator card"></figure>
<figure><figcaption><strong>Web configurator</strong><span id="webMeta">Focused crop</span></figcaption><img class="shot" id="web" alt="Web configurator card"></figure></section>
<p class="hint">Select an image to inspect it at full size. Use the left and right arrow keys to move through sizes.</p></main></div>
<dialog id="lightbox"><button id="close">Close</button><img id="full" alt="Full-size card capture"></dialog>
