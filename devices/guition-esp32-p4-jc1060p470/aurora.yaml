            on_click:
              - homeassistant.action:
                  action: light.toggle
                  data: { entity_id: light.dining_room_chandelier }
        - button:
            x: 96
            y: 526
            width: 266
            height: 56
            styles: st_glass
            pad_all: 12
            widgets:
              - obj: { width: 11, height: 11, radius: 6, bg_color: 0xFFE6C0, align: left_mid, x: 4, border_width: 0 }
              - label: { text: "Master Ceiling", align: left_mid, x: 24, text_font: f_body, text_color: 0xEEF0F6 }
            on_click:
              - homeassistant.action:
                  action: light.toggle
                  data: { entity_id: light.master_bedroom_ceiling_fan_light }

        # Right detail panel
        - obj:
            x: 386
            y: 26
            width: 612
            height: 548
            styles: st_glass
            widgets:
              - label: { text: "Living Room", x: 4, y: 0, text_font: f_title, text_color: $c_text }
              - switch:
                  id: sw_sel
                  align: top_right
                  x: -4
                  y: 2
                  on_click:
                    - homeassistant.action:
                        action: light.toggle
                        data: { entity_id: light.living_room_main }
              - arc:
                  id: arc_brightness
                  align: center
                  y: -10
                  width: 212
                  height: 212
                  min_value: 0
                  max_value: 100
                  value: 74
                  arc_width: 14
                  indicator:
                    arc_color: 0xFFD9A0
                    arc_width: 14
                  on_release:
                    - homeassistant.action:
                        action: light.turn_on
                        data:
                          entity_id: light.living_room_main
                          brightness_pct: !lambda 'return std::to_string((int) x);'
              - label: { id: lbl_brightness_pct, text: "74%", align: center, y: -22, text_font: f_display, text_color: $c_text }
              - label: { text: "Brightness", align: center, y: 30, text_font: f_small, text_color: $c_text2 }

    # ---------- CLIMATE (stub — no climate entity yet) ----------
    - id: page_climate
      bg_opa: 0
      widgets:
        - image: { src: img_aurora_bg, x: 0, y: 0 }
        - label: { text: "Climate", x: 100, y: 26, text_font: f_title, text_color: $c_text }
        - label: { text: "Read-only · outdoor from weather", x: 100, y: 60, text_font: f_small, text_color: $c_text2 }
        - obj:
            x: 100
            y: 110
            width: 360
            height: 200
