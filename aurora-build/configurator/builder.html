<!doctype html><html><head><meta charset="utf-8">
<title>Aurora Page Builder</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css">
<style>
:root{
  --canvas:#0A0B0F; --nav:#0C0D12; --card:#14161C; --inset:#0F1117; --bd:#23262F;
  --tx:#F3F5F8; --t2:#868CA0; --t3:#5D6470; --teal:#2ED5B8; --ink:#06231D;
  --amber:#F2B84B; --blue:#4FA8F5; --red:#F2685A; --violet:#B06CFF; --onbd:#2A5048;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:#070809;color:var(--tx);font-family:'Sora',system-ui,sans-serif;font-size:14px;height:100vh;height:100dvh;overflow:hidden;display:flex;flex-direction:column}
.mono{font-family:'IBM Plex Mono',monospace}
button{font-family:inherit;cursor:pointer;border:0}
#top{min-height:56px;display:flex;align-items:center;gap:14px;padding:8px 18px;background:#0B0C11;border-bottom:1px solid var(--bd);flex:0 0 auto;flex-wrap:wrap}
#top .brand{font-weight:800;font-size:17px;letter-spacing:-.3px}
#top .brand b{background:linear-gradient(90deg,var(--teal),var(--violet));-webkit-background-clip:text;background-clip:text;color:transparent}
#top .sp{flex:1}
.top-connect,.top-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.top-connect{flex:1 1 560px}
.top-actions{justify-content:flex-end}
#top input{background:#0F1117;border:1px solid var(--bd);border-radius:9px;color:var(--tx);padding:8px 10px;font:inherit;font-size:12px}
#top .pill{font-size:11px;color:var(--t2);display:flex;align-items:center;gap:6px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--t3)}.dot.ok{background:var(--teal)}
.btn{background:var(--teal);color:var(--ink);border-radius:9px;padding:9px 14px;font-weight:700;font-size:13px}
.btn.ghost{background:#12141b;color:var(--tx);border:1px solid var(--bd)}
.btn.amber{background:var(--amber);color:#241a05}
#app{display:flex;flex:1 1 auto;min-height:0;position:relative;overflow:hidden}
#palette{width:clamp(216px,16vw,248px);flex:0 0 auto;background:#0A0B0F;border-right:1px solid var(--bd);overflow-y:auto;padding:14px}
#center{flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;overflow:auto;padding:18px;background:#070809}
#inspector{width:clamp(264px,19vw,300px);flex:0 0 auto;background:#0A0B0F;border-left:1px solid var(--bd);overflow-y:auto;padding:16px}
#mobileTools,#panelShade{display:none}
h3.sec{font-size:11px;letter-spacing:1.4px;text-transform:uppercase;color:var(--t3);font-weight:600;margin:6px 0 10px}
.pcat{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--t3);margin:14px 0 6px}
.pitem{display:flex;align-items:center;gap:10px;padding:9px 10px;border:1px solid var(--bd);border-radius:10px;background:#0E0F14;margin-bottom:7px;cursor:pointer;transition:.12s}
.pitem:hover{border-color:var(--teal);background:#10141a}
.pitem .ic{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex:0 0 auto}
.pitem .nm{font-size:13px;font-weight:600}.pitem .sz{font-size:10px;color:var(--t2)}
#navbuild{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.navitem{display:flex;align-items:center;gap:7px;background:#0E0F14;border:1px solid var(--bd);border-radius:10px;padding:6px 10px;font-size:12px;cursor:pointer}
.navitem .mdi{font-size:18px;color:var(--teal)}
.navitem.locked{opacity:.7;cursor:default}
.navitem .x{color:var(--t3);font-size:14px;cursor:pointer}
.addnav{border:1px dashed var(--bd);color:var(--t2);border-radius:10px;padding:7px 11px;font-size:12px;background:transparent}
#tabs{display:flex;gap:6px;margin-bottom:10px;align-items:center;flex-wrap:wrap}
.tab{padding:6px 12px;border-radius:8px;background:#0E0F14;border:1px solid var(--bd);font-size:12px;color:var(--t2);cursor:pointer}
.tab.on{background:var(--teal);color:var(--ink);font-weight:700;border-color:var(--teal)}
.tab .x{margin-left:6px;opacity:.7}
.stagewrap{display:flex;justify-content:flex-start;position:relative;flex:0 0 auto}
#frame{width:1024px;height:600px;background:var(--canvas);position:relative;border-radius:18px;border:1px solid #1b1d26;
  background-image:radial-gradient(130% 100% at 88% -10%,rgba(46,213,184,.10),rgba(123,108,255,.06) 42%,transparent 70%);
  flex:0 0 auto;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.5);transform-origin:top left}
#rail{position:absolute;left:0;top:0;width:74px;height:600px;background:var(--nav);border-right:1px solid #15171e;display:flex;flex-direction:column;align-items:center;padding-top:14px;gap:12px}
#rail .ni{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--t3)}
#rail .ni.on{background:var(--teal);color:var(--ink)}
#phead{position:absolute;left:94px;top:16px;width:910px;height:66px;display:none;align-items:center;justify-content:space-between}
#phead.on{display:flex}
#phead .greet{font-size:27px;font-weight:700;letter-spacing:-.4px}
#phead .subln{font-size:13px;color:var(--t2);margin-top:3px;display:flex;align-items:center;gap:6px}
#phead .subln .teal{color:var(--teal);font-weight:600}
.chip{display:flex;align-items:center;gap:7px;background:#101218;border:1px solid var(--bd);border-radius:12px;padding:8px 13px;font-size:14px;font-weight:600}
#grid{position:absolute;left:94px;top:22px;width:910px;height:556px;display:grid;
  grid-template-columns:repeat(6,140px);grid-template-rows:repeat(5,100px);gap:14px}
.gcell{border:1px dashed #1b1e27;border-radius:12px}
.pc{position:relative;border-radius:18px;background:var(--card);border:1px solid var(--bd);overflow:hidden;cursor:grab;display:flex;flex-direction:column;padding:14px;min-width:0}
.pc.on{background:linear-gradient(180deg,#14161C,#13201d);border-color:var(--onbd)}
.pc.sel{outline:2px solid var(--teal);outline-offset:-1px}
.pc.rsz{z-index:20;opacity:.94}
.pc.cutsrc{opacity:.35;filter:saturate(.4)}
.pc .rzh{position:absolute;right:3px;bottom:3px;width:20px;height:20px;border-radius:6px;background:var(--teal);color:var(--ink);display:none;align-items:center;justify-content:center;font-size:13px;cursor:nwse-resize;z-index:9;touch-action:none}
.pc.sel .rzh{display:flex}
.pc .szbadge{position:absolute;right:27px;bottom:4px;background:#0B0C11;border:1px solid var(--onbd);color:var(--teal);font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;padding:2px 7px;border-radius:7px;z-index:9;pointer-events:none}
.pc .toprow{display:flex;align-items:center;justify-content:space-between;gap:8px}
.pc .ci{font-size:24px;flex:0 0 auto}
.pc .tg{width:50px;height:28px;border-radius:14px;background:var(--teal);position:relative;flex:0 0 auto}
.pc .tg i{position:absolute;top:3px;right:3px;width:22px;height:22px;border-radius:50%;background:var(--ink)}
.pc .tg.off{background:#2a2e38}.pc .tg.off i{left:3px;right:auto;background:var(--t3)}
.pc .ct{font-size:16px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:8px}
.pc .csub{font-size:12px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pc .big{font-size:32px;font-weight:700;color:var(--teal);letter-spacing:-.5px;margin-top:2px}
.pc .hbar{height:8px;border-radius:4px;background:#0f1117;border:1px solid var(--bd);position:relative;overflow:hidden;margin-top:auto}
.pc .hbar i{position:absolute;left:0;top:0;bottom:0;background:linear-gradient(90deg,#1a9c86,var(--teal))}
.pc .vstrip{flex:1;width:42px;align-self:center;border-radius:21px;background:#0f1117;border:1px solid var(--bd);position:relative;overflow:hidden;margin:12px 0}
.pc .vstrip i{position:absolute;left:0;right:0;bottom:0;background:linear-gradient(180deg,var(--teal),#1a9c86)}
.pc .cbadge{position:absolute;right:8px;top:8px;font-size:9px;color:var(--t3)}
.pc .row{display:flex;align-items:center;gap:8px}
.pc .seg{display:flex;gap:4px;background:#0f1117;border:1px solid var(--bd);border-radius:10px;padding:4px;margin-top:auto}
.pc .seg div{flex:1;text-align:center;font-size:11px;font-weight:600;color:var(--t2);padding:5px 0;border-radius:7px}
.pc .seg div.on{background:var(--teal);color:var(--ink)}
.pc .dial{flex:1;display:flex;align-items:center;justify-content:center;position:relative}
.pc .ring{border-radius:50%;border:6px solid #1c2330;border-top-color:var(--blue);border-right-color:var(--blue);transform:rotate(40deg)}
.pc .art{border-radius:10px;background:linear-gradient(135deg,#5468FF,#2ED5B8);flex:0 0 auto}
.pc .tbtn{width:46px;height:46px;border-radius:50%;background:#0f1117;display:flex;align-items:center;justify-content:center;color:var(--tx);font-size:21px}
.pc .tbtn.main{background:var(--teal);color:var(--ink)}
.pc .rpill{background:#0f1117;border:1px solid var(--bd);border-radius:10px;display:flex;align-items:center;justify-content:center;gap:4px;color:var(--tx);font-size:12px;font-weight:600;padding:8px 6px;min-width:0;white-space:nowrap}
/* TV remote (responsive) */
.pc .tvr{flex:1;display:flex;gap:14px;min-height:0;margin-top:6px}
.pc .tvapps{width:150px;display:flex;flex-direction:column;gap:8px;flex:0 0 auto}
.pc .tvapps-h{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1px;color:var(--t3);text-transform:uppercase}
.pc .tvapp{flex:1;border-radius:12px;background:#0f1117;border:1px solid var(--bd);display:flex;align-items:center;gap:10px;padding:0 14px;font-size:15px;font-weight:700;color:var(--tx);min-width:0}
.pc .tvapp.on{color:#fff;border:0}
.pc .tvmain{flex:1;display:flex;flex-direction:column;min-width:0}
.pc .tvhdr{display:flex;align-items:center;gap:10px}
.pc .pwr{width:46px;height:40px;border-radius:11px;background:#2a1414;display:flex;align-items:center;justify-content:center;color:var(--red);font-size:20px;flex:0 0 auto}
.pc .tvcenter{flex:1;display:flex;align-items:center;justify-content:center;gap:18px}
.pc .vcc{width:56px;align-self:center;max-height:250px;border-radius:28px;background:#0f1117;border:1px solid var(--bd);display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:16px 0;color:var(--t2);font-size:25px;flex:0 0 auto}
.pc .vcc .vcl{font-size:11px;color:var(--t3);font-weight:600}
.pc .dpad{border-radius:50%;background:#0f1117;position:relative;flex:0 0 auto;display:flex;align-items:center;justify-content:center}
.pc .dpad .ok{border-radius:50%;background:var(--teal);color:var(--ink);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px}
.pc .dpad .ar{position:absolute;color:var(--t2);font-size:30px}
.pc .dpad .ar.up{top:14px;left:50%;transform:translateX(-50%)}
.pc .dpad .ar.dn{bottom:14px;left:50%;transform:translateX(-50%)}
.pc .dpad .ar.lf{left:16px;top:50%;transform:translateY(-50%)}
.pc .dpad .ar.rt{right:16px;top:50%;transform:translateY(-50%)}
.pc .tvbar{display:flex;gap:8px;align-items:stretch;height:60px;margin-top:8px}
.pc .tvbtn{background:#0f1117;border:1px solid var(--bd);border-radius:12px;display:flex;align-items:center;justify-content:center;gap:8px;color:var(--t2);font-size:22px;padding:0 16px;flex:0 0 auto}
.pc .tvbtn.pad{background:#13201d;border-color:var(--onbd);color:var(--teal);font-size:13px;font-weight:700}
.pc .tvbtn.trans{flex:1;gap:16px}
.pc .tvov{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:#0E1524;border:2px solid var(--teal);border-radius:16px;z-index:5;text-align:center;cursor:pointer}
.pc .srcchip{background:#0f1117;border:1px solid var(--bd);border-radius:8px;padding:8px 13px;font-size:13px;color:var(--t2);white-space:nowrap}
.pc .srcchip.on{background:var(--teal);color:var(--ink);font-weight:700;border-color:var(--teal)}
.pc .vrow{background:#0f1117;border:1px solid var(--bd);border-radius:11px;display:flex;align-items:center;gap:8px;padding:9px 12px;color:var(--t2);font-size:13px;font-weight:600}
/* outlets */
.pc .opwr{width:60px;height:60px;border-radius:50%;background:linear-gradient(180deg,#14201c,#0f1714);border:1px solid var(--onbd);display:flex;align-items:center;justify-content:center;color:var(--teal);font-size:26px}
.pc .ogrid{flex:1;display:grid;gap:8px;margin-top:8px}
.pc .ocell{background:#0f1117;border:1px solid var(--bd);border-radius:10px;display:flex;align-items:center;gap:8px;padding:8px 10px;min-width:0}
.pc .osq{width:38px;height:38px;border-radius:10px;background:var(--teal);color:var(--ink);display:flex;align-items:center;justify-content:center;font-size:21px;flex:0 0 auto}
.pc .ohead{display:flex;flex-direction:column;align-items:center;gap:6px;min-width:0}
.pc .ogrid2{flex:1;display:grid;gap:10px;margin-top:10px;min-height:0}
.pc .ocell2{background:linear-gradient(180deg,#13201d,#0f1714);border:1px solid var(--onbd);border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;min-height:0;min-width:0}
.pc .ocl{font-size:12px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.pc .opb{width:48px;height:48px;border-radius:50%;background:#0f1714;border:1px solid var(--onbd);display:flex;align-items:center;justify-content:center;color:var(--teal);font-size:24px;flex:0 0 auto}
.pc .opb.on{background:rgba(46,213,184,.14)}
.pc .cambg{position:absolute;inset:0;background:linear-gradient(160deg,#1a2030,#0e1118);display:flex;align-items:center;justify-content:center;color:#2a3346;font-size:30px}
/* group / multi */
.pc .ggrid{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.pc .gslot{background:#0f1117;border:1px solid var(--bd);border-radius:10px;padding:7px 9px;display:flex;align-items:center;gap:8px;min-width:0}
.pc .gslot.empty{border-style:dashed;color:var(--t3);align-items:center;justify-content:center;font-size:18px}
.pc .gslot .mdi{font-size:18px;flex:0 0 auto}
.pc .gv{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pc .gl{font-size:10px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pc .lggrid{flex:1;display:grid;gap:6px;margin-top:10px;min-height:0}
.pc .lgbtn{background:#0f1117;border:1px solid var(--bd);border-radius:9px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--t3);min-width:0;padding:4px;overflow:hidden}
.pc .lgbtn.on{background:linear-gradient(180deg,#14161C,#13201d);border-color:var(--onbd);color:var(--amber)}
.pc .lgbtn .mdi{font-size:17px;flex:0 0 auto}
.pc .lgbtn .lgn{font-size:9px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;color:var(--tx)}
.pc .scgrid{flex:1;display:grid;gap:8px;margin-top:10px;min-height:0}
.pc .scbtn{background:#161B24;border:1px solid #2c3340;border-radius:11px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;color:var(--tx);min-width:0;padding:6px;overflow:hidden}
.pc .scbtn.empty{background:transparent;border-style:dashed;color:var(--t3)}
.pc .scbtn .mdi{font-size:20px;color:var(--teal)}
.pc .scbtn.empty .mdi{color:var(--t3)}
.pc .scn{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.pc .ddrop{margin-top:auto;background:#0f1117;border:1px solid var(--bd);border-radius:10px;padding:10px 12px;display:flex;align-items:center;justify-content:space-between;font-size:13px}
.pc .spkgrid{flex:1;display:grid;gap:7px;margin-top:10px}
.pc .spk{background:#0f1117;border:1px solid var(--bd);border-radius:10px;display:flex;align-items:center;gap:6px;padding:0 10px;font-size:12px;color:var(--t2);white-space:nowrap;overflow:hidden}
.pc .spk.on{background:var(--teal);color:var(--ink);font-weight:700;border-color:var(--teal)}
.pc .spk .mdi{font-size:15px}
.pc .spkrib{display:flex;align-items:center;gap:8px;background:#123021;border-radius:12px;padding:10px 12px;font-size:14px}
.pc .spkung{background:#10141C;border-radius:8px;padding:5px 10px;font-size:12px;color:var(--t2);display:flex;align-items:center;gap:5px;white-space:nowrap}
.pc .spkgrid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px;flex:1}
.pc .spktile{background:#10141C;border-radius:12px;padding:12px;display:flex;flex-direction:column;min-width:0}
.pc .spkjoin{background:#0F1117;border:1px solid var(--bd);border-radius:9px;padding:6px 12px;font-size:13px;color:var(--teal);font-weight:600;display:inline-flex;align-items:center;gap:5px;justify-content:center;white-space:nowrap}
.pc .orow{display:flex;align-items:center;gap:8px;background:#0f1117;border:1px solid var(--bd);border-radius:10px;padding:7px 10px;margin-top:8px}
.pc .orow .mdi{font-size:18px}
.pc .trklist{flex:1;display:flex;flex-direction:column;gap:5px;margin-top:8px;overflow:hidden}
.pc .trk{background:#0f1117;border-radius:8px;padding:6px 10px;display:flex;justify-content:space-between;gap:8px;font-size:12px}
#pageDots{position:absolute;left:94px;bottom:12px;width:910px;height:34px;display:none;align-items:center;justify-content:center;z-index:5}
#pageDots .page-dot-target{width:34px;height:34px;display:flex;align-items:center;justify-content:center;background:transparent;color:#3A4150;padding:0;border:0}
#pageDots .page-dot-target::before{content:'';width:10px;height:10px;border-radius:50%;background:currentColor}
#pageDots .page-dot-target.on{color:var(--teal)}
.field{margin-bottom:14px}.field label{display:block;font-size:11px;color:var(--t2);margin-bottom:5px}
.field input,.field select{width:100%;background:#0F1117;border:1px solid var(--bd);border-radius:9px;color:var(--tx);padding:9px 10px;font:inherit;font-size:13px}
.szrow{display:flex;flex-wrap:wrap;gap:6px}
.szb{padding:6px 9px;border-radius:8px;background:#0E0F14;border:1px solid var(--bd);font-size:12px;color:var(--t2);cursor:pointer}
.szb.on{background:var(--teal);color:var(--ink);font-weight:700;border-color:var(--teal)}
.ipick input{width:100%;background:#0F1117;border:1px solid var(--bd);border-radius:9px;color:var(--tx);padding:8px 10px;font:inherit;font-size:13px;margin-bottom:8px}
.ipgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(42px,1fr));gap:6px;max-height:264px;overflow:auto;padding:2px}
.ipgrid .ic{display:flex;align-items:center;justify-content:center;height:42px;border-radius:8px;background:#0E0F14;border:1px solid var(--bd);color:var(--t2);cursor:pointer}
.ipgrid .ic:hover{border-color:var(--teal);color:var(--tx)}
.ipgrid .ic.on{background:var(--teal);color:var(--ink);border-color:var(--teal)}
.ipgrid .ic .mdi{font-size:21px}
.iphint{font-size:11px;color:var(--t3);margin-top:6px}
.empty{color:var(--t3);font-size:13px;line-height:1.6;padding:14px 0}
.tgl{display:flex;align-items:center;justify-content:space-between;background:#0E0F14;border:1px solid var(--bd);border-radius:10px;padding:10px 12px;margin-bottom:12px;cursor:pointer}
.tgl .sw{width:46px;height:26px;border-radius:13px;background:#2a2e38;position:relative}
.tgl .sw i{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:var(--t3)}
.tgl.on .sw{background:var(--teal)}.tgl.on .sw i{left:auto;right:3px;background:var(--ink)}
.elrow{display:flex;align-items:center;justify-content:space-between;gap:8px;background:#0E0F14;border:1px solid var(--bd);border-radius:9px;padding:7px 10px;margin-bottom:6px;font-size:12px}
.elrow .x{color:var(--red);cursor:pointer;font-size:15px}
#modal{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:50}
.mbox{width:min(520px,calc(100vw - 24px));max-height:calc(100dvh - 24px);background:#101116;border:1px solid var(--bd);border-radius:16px;padding:20px;overflow:auto}
.mbox h2{font-size:18px;margin-bottom:4px}.mbox p{color:var(--t2);font-size:12px;margin-bottom:14px}
.elist{max-height:300px;overflow:auto;border:1px solid var(--bd);border-radius:10px}
.erow{padding:9px 12px;border-bottom:1px solid #15171e;cursor:pointer;font-size:13px;display:flex;justify-content:space-between;gap:10px}
.erow:hover{background:#15171e}.erow.on{background:rgba(46,213,184,.12)}
.erow .eid{color:var(--t3);font-size:11px}
.mfoot{display:flex;justify-content:flex-end;gap:10px;margin-top:16px}
#flashbox{position:fixed;right:18px;bottom:18px;width:min(440px,calc(100vw - 36px));max-height:50vh;background:#0B0C11;border:1px solid var(--bd);border-radius:14px;padding:14px;display:none;z-index:40}
#flashlog{white-space:pre-wrap;font-family:'IBM Plex Mono',monospace;font-size:11px;color:#c2c7d2;max-height:32vh;overflow:auto;background:#08090c;border-radius:8px;padding:10px;margin-top:8px}
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#101116;border:1px solid var(--onbd);color:var(--teal);padding:10px 18px;border-radius:10px;font-size:13px;z-index:60;display:none}
@media (max-width:1300px){
  #top .sp{display:none}
  .top-actions{margin-left:auto}
  #palette,#inspector{position:absolute;top:0;bottom:0;z-index:31;width:min(320px,calc(100vw - 32px));transition:transform .18s ease,visibility .18s ease;box-shadow:0 18px 48px rgba(0,0,0,.55)}
  #palette{left:0;transform:translateX(-105%)}
  #inspector{right:0;transform:translateX(105%)}
  #palette.open,#inspector.open{transform:translateX(0)}
  #palette:not(.open),#inspector:not(.open){visibility:hidden;pointer-events:none}
  #panelShade.on{display:block;position:absolute;inset:0;z-index:30;background:rgba(0,0,0,.48)}
  #mobileTools{display:flex;align-self:stretch;justify-content:space-between;gap:8px;margin-bottom:10px}
  #mobileTools .btn{display:flex;align-items:center;gap:6px}
  #mobileTools .btn.on{border-color:var(--teal);color:var(--teal)}
}
@media (max-width:760px){
  #top{gap:8px;padding:8px 10px}
  #top .brand,.top-connect,.top-actions{width:100%}
  .top-connect{flex-basis:auto}
  .top-actions{justify-content:flex-start;margin-left:0}
  #haurl{width:180px!important}
  #hatok{width:140px!important}
  #panip{width:130px!important}
  #center{padding:10px}
  #navbuild,#tabs{align-self:stretch}
  #hint{text-align:center;line-height:1.5}
  #flashbox{right:12px;bottom:12px;width:calc(100vw - 24px)}
}
</style></head>
<body>
<div id="top">
  <div class="brand">Aurora <b>Page Builder</b></div>
  <div class="top-connect">
  <input id="haurl" placeholder="HA URL  http://10.0.0.208:8123" style="width:210px">
  <input id="hatok" placeholder="Long-lived token" type="password" style="width:150px">
  <input id="panip" placeholder="Panel IP  10.0.0.174" style="width:140px">
  <label id="usbWrap" title="Flash over the USB cable — bypasses the OTA boot-confirm rollback" style="display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--t2);opacity:.55"><input type="checkbox" id="usbChk" style="width:auto" disabled> <span id="usbLbl">No USB panel</span></label>
  <button class="btn ghost" id="rescanBtn" title="Re-scan for a USB-connected panel" style="padding:8px 10px"><span class="mdi mdi-refresh"></span></button>
  <button class="btn ghost" id="connect">Connect</button>
  <span class="pill"><span class="dot" id="cdot"></span><span id="cstat">not connected</span></span>
  </div>
  <div class="sp"></div>
  <div class="top-actions">
  <div id="capWrap" title="Device capacity — an estimate of how full the generated firmware is vs the panel's memory limit. Too many cards can overflow the panel's memory and stop it booting." style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--t2)">
    <span id="capTxt">Capacity</span>
    <div style="width:92px;height:8px;background:#10121a;border:1px solid var(--hair);border-radius:5px;overflow:hidden"><div id="capBar" style="height:100%;width:0%;background:var(--teal);transition:width .2s,background .2s"></div></div>
    <span id="capPct" style="min-width:30px">0%</span>
  </div>
  <button class="btn ghost" id="roomBtn" title="Build a room page from a Home Assistant area">+ Room</button>
  <button class="btn ghost" id="pagesBtn">Pages</button>
  <button class="btn ghost" id="tplBtn">Templates</button>
  <button class="btn ghost" id="verBtn">Versions</button>
  <button class="btn ghost" id="saveBtn">Save</button>
  <button class="btn amber" id="flashBtn">Build &amp; Flash</button>
  <button class="btn ghost" id="acctBtn" title="Change access password"><span class="mdi mdi-key-variant"></span></button>
  <button class="btn ghost" id="lockBtn" title="Lock / sign out"><span class="mdi mdi-lock"></span></button>
  </div>
</div>

<div id="app">
  <div id="panelShade"></div>
  <div id="palette"><h3 class="sec">Card palette</h3>
    <div style="font-size:12px;color:var(--t2);margin-bottom:6px">Click a card to add it to the page — then drag to move, and drag its corner handle to resize.</div>
    <div id="palContent"></div></div>

  <div id="center">
    <div id="mobileTools">
      <button class="btn ghost" id="paletteToggle"><span class="mdi mdi-view-grid-plus"></span> Cards</button>
      <button class="btn ghost" id="inspectorToggle"><span class="mdi mdi-tune"></span> Inspector</button>
    </div>
    <div id="navbuild"></div>
    <div id="tabs"></div>
    <div class="stagewrap"><div id="frame">
      <div id="rail"></div>
      <div id="phead"></div>
      <div id="grid"></div>
      <div id="pageDots" aria-label="Sub-page navigation"></div>
    </div></div>
    <div style="color:var(--t3);font-size:11px;margin-top:10px" class="mono" id="hint">6×5 grid · 1024×600 · drag a card to move it · drag its corner handle to resize</div>
  </div>

  <div id="inspector"><div id="insp"></div></div>
</div>

<div id="modal"><div class="mbox" id="mbox"></div></div>
<div id="flashbox"><div style="display:flex;justify-content:space-between;align-items:center"><b style="font-size:13px">Build &amp; Flash</b><span class="mdi mdi-close" style="cursor:pointer;color:var(--t2)" onclick="document.getElementById('flashbox').style.display='none'"></span></div><div id="flashlog"></div></div>
<div class="toast" id="toast"></div>

  for(let i=0;i<COLS*ROWS;i++){ const cell=document.createElement('div'); cell.className='gcell'; cell.style.gridColumn=(i%COLS)+1; cell.style.gridRow=Math.floor(i/COLS)+1; g.appendChild(cell); }
  for(const c of curCards()){ const def=C[c.ck];
    const d=document.createElement('div'); d.className='pc'+(sel===c.id?' sel':'')+(['light','dial','toggle'].includes(def.ctrl)?' on':'')+(isCutSrc(c)?' cutsrc':'');
    d.style.gridColumn=`${c.x} / span ${c.w}`; d.style.gridRow=`${c.y} / span ${c.h}`;
    d.innerHTML=cardInner(c); wireCalendarPreview(d); d.dataset.id=c.id; d.onclick=(e)=>{e.stopPropagation(); sel=c.id; renderInspector(); markSel();}; attachDrag(d,c); attachResize(d,c); g.appendChild(d); }
  const dots=document.getElementById('pageDots'), nsub=L.pages[curPage].subpages.length; dots.innerHTML='';
  if(nsub>1){ dots.style.display='flex';
    for(let i=0;i<nsub;i++){ const dot=document.createElement('button'); dot.className='page-dot-target'+(i===curSub?' on':''); dot.type='button'; dot.title='Sub-page '+(i+1); dot.setAttribute('aria-label','Show sub-page '+(i+1));
      dot.onclick=(e)=>{ e.stopPropagation(); curSub=i; sel=null; renderAll(); }; dots.appendChild(dot); }
  } else dots.style.display='none'; }
function markSel(){ document.querySelectorAll('.pc').forEach(p=>p.classList.toggle('sel', p.dataset.id===sel)); }

// ===== free drag-resize (bottom-right handle, shown on the selected card) =====
// Grid renders 1:1 at device px: 140×100 cells, 14px gutters.
const CELL_W=140, CELL_H=100, GUT=14;
function attachResize(d,c){
  const hnd=document.createElement('div'); hnd.className='rzh'; hnd.title='Drag to resize';
  hnd.innerHTML='<span class="mdi mdi-resize-bottom-right"></span>'; d.appendChild(hnd);
  hnd.addEventListener('pointerdown',(e)=>{ e.stopPropagation(); e.preventDefault();   // never let the handle start a move-drag
    sel=c.id; markSel();
    const [mw,mh]=(C[c.ck].min||[1,1]); const maxW=COLS-c.x+1, maxH=ROWS-c.y+1;
    const grid=document.getElementById('grid');
    const badge=document.createElement('div'); badge.className='szbadge';
    const apply=()=>{ d.style.gridColumn=`${c.x} / span ${c.w}`; d.style.gridRow=`${c.y} / span ${c.h}`;
      d.innerHTML=cardInner(c); d.appendChild(hnd); badge.textContent=c.w+'×'+c.h; d.appendChild(badge); };   // live preview re-render at the new span
    d.setPointerCapture(e.pointerId); d.classList.add('rsz'); apply();                 // capture on the CARD so re-rendering innerHTML can't kill the drag
    const move=(ev)=>{ const r=grid.getBoundingClientRect();
      const sx=r.width/(COLS*CELL_W+(COLS-1)*GUT), sy=r.height/(ROWS*CELL_H+(ROWS-1)*GUT);
      const stepX=(CELL_W+GUT)*sx, stepY=(CELL_H+GUT)*sy;
      const px=ev.clientX-(r.left+(c.x-1)*stepX), py=ev.clientY-(r.top+(c.y-1)*stepY);
      let tw=Math.max(mw,Math.min(maxW,Math.round((px+GUT*sx)/stepX)));
      let th=Math.max(mh,Math.min(maxH,Math.round((py+GUT*sy)/stepY)));
      let nw=c.w, nh=c.h;                                                              // clamp growth at the first obstruction, per axis
      if(fits(c.x,c.y,tw,th,c.id)){ nw=tw; nh=th; }
      else if(fits(c.x,c.y,tw,c.h,c.id)) nw=tw;
      else if(fits(c.x,c.y,c.w,th,c.id)) nh=th;
      if(nw!==c.w||nh!==c.h){ c.w=nw; c.h=nh; apply(); } };
    const up=(ev)=>{ try{ d.releasePointerCapture(ev.pointerId); }catch(_){}
      d.classList.remove('rsz');
      d.removeEventListener('pointermove',move); d.removeEventListener('pointerup',up); d.removeEventListener('pointercancel',up);
      renderGrid(); renderInspector(); };                                              // w/h already persisted on c — full re-render
    d.addEventListener('pointermove',move); d.addEventListener('pointerup',up); d.addEventListener('pointercancel',up); });
}

// ===== copy / cut / paste (across pages and sub-pages) =====
function selCard(){ return sel?curCards().find(x=>x.id===sel):null; }
function isCutSrc(c){ return !!(CLIP&&CLIP.cut&&CLIP.cut.id===c.id&&CLIP.cut.page===curPage&&CLIP.cut.sub===curSub); }
function copySel(cut){ const c=selCard(); if(!c) return;
  CLIP={card:JSON.parse(JSON.stringify(c)), cut:cut?{page:curPage,sub:curSub,id:c.id}:null};
  renderGrid(); renderTabs();
  toast((cut?'Cut':'Copied')+' “'+(c.name||C[c.ck].label)+'” — Ctrl+V pastes to the current sub-page'); }
function pasteClip(){ if(!CLIP||!CLIP.card) return; ROWS=rowsFor();
  const clone=JSON.parse(JSON.stringify(CLIP.card)); clone.id=uid();                   // new id — unique across ALL pages (firmware widget ids)
  if(C[clone.ck]&&C[clone.ck].multi&&!clone.entities) clone.entities=[];
  if(clone.ck==='shortcuts'&&!clone.shortcuts) clone.shortcuts=[];
  if(clone.ck==='tv_apps'&&!clone.sources) clone.sources=[];
  const [mw,mh]=(C[clone.ck]&&C[clone.ck].min)||[1,1];
  const w=Math.max(mw,Math.min(clone.w,COLS)), h=Math.max(mh,Math.min(clone.h,ROWS));
  let x=clone.x, y=clone.y;
  // Pasting a CUT card onto its own sub-page: its original footprint must not
  // count as an obstruction (it is removed on successful placement below).
  const exc=(CLIP.cut&&CLIP.cut.page===curPage&&CLIP.cut.sub===curSub)?CLIP.cut.id:null;
  if(!fits(x,y,w,h,exc)){ const f=firstFit(w,h,exc);
    if(!f){ toast('No room on this sub-page — resize or move a card, or add a sub-page'); return; }   // keep CLIP; abort
    x=f[0]; y=f[1]; }
  clone.x=x; clone.y=y; clone.w=w; clone.h=h;
  curCards().push(clone); sel=clone.id;
  if(CLIP.cut){ const cc=CLIP.cut, pg=L.pages[cc.page], arr=pg&&pg.subpages&&pg.subpages[cc.sub];   // remove the original only AFTER a successful placement
    if(arr){ const i=arr.findIndex(k=>k&&k.id===cc.id); if(i>=0) arr.splice(i,1); }
    CLIP.cut=null; }                                                                   // a second paste acts as copy
  renderAll(); toast('Pasted ✓'); }
function isEditable(t){ return !!(t&&(t.tagName==='INPUT'||t.tagName==='TEXTAREA'||t.tagName==='SELECT'||t.isContentEditable)); }
document.addEventListener('keydown',(e)=>{ if(!L) return;
  const modalOpen=document.getElementById('modal').style.display==='flex';
  if(e.key==='Escape'){
    if(modalOpen) closeModal();
    else if(!closeBuilderPanels()&&sel){ sel=null; renderInspector(); markSel(); }
    return; }
  if(!(e.ctrlKey||e.metaKey)||modalOpen||isEditable(document.activeElement)) return;
  const k=(e.key||'').toLowerCase();
  // Don't hijack Ctrl+C when the user is copying selected TEXT (e.g. inspector readouts).
  if(k==='c'&&window.getSelection&&String(window.getSelection())) return;
  if(k==='c'&&selCard()){ e.preventDefault(); copySel(false); }
  else if(k==='x'&&selCard()){ e.preventDefault(); copySel(true); }
  else if(k==='v'&&CLIP){ e.preventDefault(); pasteClip(); } });

// shared inspector footer for a selected card: size/position readout + Copy/Cut/Delete
function cardActionsHTML(c){ return `<div class="field"><label>Size &amp; position</label><div class="mono" style="font-size:12px;color:var(--t2)">${c.w}×${c.h} at col ${c.x}, row ${c.y} — drag the card to move · drag its corner handle to resize</div></div>
    <div style="display:flex;gap:6px;margin-bottom:8px">
      <button class="btn ghost" id="copyCard" style="flex:1"><span class="mdi mdi-content-copy"></span> Copy</button>
      <button class="btn ghost" id="cutCard" style="flex:1"><span class="mdi mdi-content-cut"></span> Cut</button>
    </div>
    <button class="btn ghost" id="delCard" style="width:100%;color:var(--red);border-color:#3a2422">Delete card</button>`; }
function wireCardActions(el,c){
  el.querySelector('#copyCard').onclick=()=>copySel(false);
  el.querySelector('#cutCard').onclick=()=>copySel(true);
  el.querySelector('#delCard').onclick=()=>{ const a=curCards(), i=a.indexOf(c); if(i>=0) a.splice(i,1); sel=null; renderGrid(); renderInspector(); }; }
function dragHandleHTML(){ return '<span class="dragHandle mdi mdi-drag-vertical" title="Drag to reorder" style="cursor:grab;color:var(--t2);font-size:20px;touch-action:none"></span>'; }
function wireSortableRow(row,a,i,refresh){
  const handle=row.querySelector('.dragHandle'); row.dataset.orderIndex=i; row.draggable=false;
  handle.onmousedown=()=>{row.draggable=true;}; handle.onmouseup=()=>{row.draggable=false;};
  row.ondragstart=(e)=>{ if(!row.draggable){e.preventDefault();return;} e.dataTransfer.effectAllowed='move'; e.dataTransfer.setData('text/plain',String(i)); row.style.opacity='.5'; };
  row.ondragend=()=>{row.style.opacity='';row.draggable=false;};
  row.ondragover=(e)=>{e.preventDefault();e.dataTransfer.dropEffect='move';};
  row.ondrop=(e)=>{e.preventDefault(); const from=Number(e.dataTransfer.getData('text/plain')),to=i; if(!Number.isInteger(from)||from===to||from<0||from>=a.length)return; const [item]=a.splice(from,1); a.splice(to,0,item); refresh();};
}

// ---- Device capacity meter ----
// Weighted "load score" ~ how big the generated setup() gets. Heavy cards pre-build
// many widgets/rows. Calibrated so Ben's known-good 116-card layout (score ~324,
// boots fine on the 32KB loopTask stack) sits at ~54%. Exceeding ~100% risks a
// boot-loop stack overflow — warn well before that. It's an ESTIMATE, not exact.
const LOAD_W={ tvremote:8, chart:6, speakers:5,
  songlist:4, sonos_library:4, shortcuts:4, volumes:4, group:4, lightgroup:4,
  media:3, spotify:3, sonos:3, camera:7, climate:2, weather:2, cover:2, outletgroup:2,
  spotify_playlists:2, playlist:2, sonos_fav:2, volume:2, tv_dpad:2, tv_transport:2,
  tv_channel:2, tv_volume:2, tv_trackpad:2, tv_sources:2, sonos_sources:2,
  tv_app:2, tv_apps:3 };
// Cards whose pre-built row count is a per-card 'rows' option. per = load per row,
// set so the default count matches the old fixed weight (tracks 50->8, speakers 14->5),
// so the meter's calibration is unchanged at defaults but drops as you trim rows.
const ROW_CFG={ spotify_tracks:{def:50,max:50,per:0.16}, spotify_queue:{def:30,max:30,per:0.16}, spotify_speakers:{def:14,max:24,per:0.357}, cal_agenda:{def:8,max:20,per:0.16} };
const LOAD_DEFAULT=1, LOAD_BUDGET=600, LOAD_WARN=0.75, LOAD_DANGER=0.90;
function cardRows(c){ const cf=ROW_CFG[c.ck]; if(!cf) return null; let v=parseInt(c.rows,10); if(isNaN(v)) v=cf.def; return Math.max(4,Math.min(cf.max,v)); }
function layoutLoad(){ let s=0; if(!L||!L.pages) return 0;
  for(const k in L.pages){ for(const sp of (L.pages[k].subpages||[])){ for(const c of sp){
    const cf=ROW_CFG[c.ck];
    if(cf){ s+=cardRows(c)*cf.per; }
    else { s+=LOAD_W[c.ck]||LOAD_DEFAULT; s+=0.3*((c.entities&&c.entities.length)||0); } } } }
  return s; }
function capacityPct(){ return layoutLoad()/LOAD_BUDGET; }
function renderCapacity(){ const bar=document.getElementById('capBar'); if(!bar) return;
  const f=capacityPct(), pct=Math.round(f*100);
  const col=f>=LOAD_DANGER?'var(--red)':(f>=LOAD_WARN?'#E6A700':'var(--teal)');
  bar.style.width=Math.min(100,pct)+'%'; bar.style.background=col;
  const lbl=document.getElementById('capPct'); lbl.textContent=pct+'%'; lbl.style.color=col;
  const txt=document.getElementById('capTxt'); txt.textContent=f>=LOAD_DANGER?'⚠ Capacity':'Capacity'; txt.style.color=f>=LOAD_WARN?col:'var(--t2)';
  document.getElementById('capWrap').title = f>=LOAD_DANGER
      ? 'DANGER ('+pct+'%): this layout is at/over the panel memory limit and may fail to boot (stack overflow / boot-loop). Remove some cards or pages before flashing.'
    : f>=LOAD_WARN ? 'Getting large ('+pct+'%): approaching the panel memory limit. Still OK to flash, but avoid adding many more heavy cards (media, TV remote, track/speaker lists).'
    : 'Device capacity ('+pct+'%): estimated fullness of the generated firmware vs the panel memory limit.'; }

function fitStage(){
  stageFitRequest=0;
  const center=document.getElementById('center'), wrap=document.querySelector('.stagewrap');
  const frame=document.getElementById('frame'), hint=document.getElementById('hint');
  if(!center||!wrap||!frame||!hint) return;
  const cs=getComputedStyle(center), centerRect=center.getBoundingClientRect(), wrapRect=wrap.getBoundingClientRect();
  const padX=parseFloat(cs.paddingLeft)+parseFloat(cs.paddingRight);
  const padBottom=parseFloat(cs.paddingBottom);
  const availableW=Math.max(160,center.clientWidth-padX);
  const availableH=Math.max(168,centerRect.bottom-wrapRect.top-hint.offsetHeight-10-padBottom);
  const scale=Math.max(.28,Math.min(1,availableW/1024,availableH/600));
  frame.style.transform='scale('+scale+')';
  wrap.style.width=(1024*scale)+'px'; wrap.style.height=(600*scale)+'px';
  wrap.dataset.scale=scale.toFixed(4); }
function scheduleStageFit(){
  if(stageFitRequest) cancelAnimationFrame(stageFitRequest);
  stageFitRequest=requestAnimationFrame(fitStage); }

  if(!isCompactBuilder()) closeBuilderPanels();

function attachDrag(el,c){ el.addEventListener('pointerdown',(e)=>{ if(e.target.closest('button')) return;
  sel=c.id; renderInspector(); markSel(); const grid=document.getElementById('grid');
  el.setPointerCapture(e.pointerId); el.style.cursor='grabbing'; el.style.zIndex=20; el.style.opacity=.85;
  const move=(ev)=>{ const r=grid.getBoundingClientRect();
    const sx=r.width/(COLS*CELL_W+(COLS-1)*GUT), sy=r.height/(ROWS*CELL_H+(ROWS-1)*GUT);
    const stepX=(CELL_W+GUT)*sx, stepY=(CELL_H+GUT)*sy;
    const cardW=(c.w*CELL_W+(c.w-1)*GUT)*sx, cardH=(c.h*CELL_H+(c.h-1)*GUT)*sy;
    let nx=Math.round((ev.clientX-r.left-cardW/2)/stepX)+1; nx=Math.max(1,Math.min(COLS-c.w+1,nx));
    let ny=Math.round((ev.clientY-r.top-cardH/2)/stepY)+1; ny=Math.max(1,Math.min(ROWS-c.h+1,ny));
    if((nx!==c.x||ny!==c.y)&&fits(nx,ny,c.w,c.h,c.id)){ c.x=nx;c.y=ny; el.style.gridColumn=`${c.x} / span ${c.w}`; el.style.gridRow=`${c.y} / span ${c.h}`; } };
  const up=(ev)=>{ try{ el.releasePointerCapture(ev.pointerId); }catch(_){}
    el.style.cursor='grab'; el.style.zIndex=''; el.style.opacity='';
    el.removeEventListener('pointermove',move); el.removeEventListener('pointerup',up); el.removeEventListener('pointercancel',up); };
  el.addEventListener('pointermove',move); el.addEventListener('pointerup',up); el.addEventListener('pointercancel',up); }); }

// Add a card of kind `ck` directly to the current sub-page: catalog default size
// (shrunk toward the kind's min only if that's what it takes to fit), at the first
// free spot scanning rows left→right, top→bottom. No armed "place mode", no pending
// state — if nothing fits we toast and do nothing.
function addCard(ck,entity,name){ const def=C[ck]; ROWS=rowsFor();
  const [mw,mh]=def.min||[1,1];
  let w=Math.max(mw,Math.min(def.def[0],COLS)), h=Math.max(mh,Math.min(def.def[1],ROWS));
  let spot=firstFit(w,h);
  if(!spot){ const cands=[];                              // shrink toward min, biggest area first
    for(let ww=w;ww>=mw;ww--) for(let hh=h;hh>=mh;hh--){ if(ww===w&&hh===h) continue; cands.push([ww,hh]); }
    cands.sort((a,b)=>b[0]*b[1]-a[0]*a[1]);
    for(const [ww,hh] of cands){ const f=firstFit(ww,hh); if(f){ w=ww; h=hh; spot=f; break; } } }
  if(!spot){ toast('No room on this sub-page — resize or move a card, or add a sub-page'); return null; }
  const card=mk(ck,entity,name,spot[0],spot[1],w,h);
  curCards().push(card); sel=card.id; renderAll();
  if(def.multi) toast('Added — add its entities in the inspector on the right');
  return card; }

function openTemplates(){ const mbox=document.getElementById('mbox');

// Normalize a page object (from a restored version or an applied template) so it
// has the fields the renderer expects — mirrors boot()'s per-page fixups.
function normPage(p){ if(typeof p.header!=='object'||p.header===null) p.header=defHeader(p.header===true);
  if(typeof p.room!=='string') p.room='';
  if(!Array.isArray(p.header.right)) p.header.right=['weather_current','secured']; if(!p.header.left) p.header.left='greeting';
  if(!Array.isArray(p.subpages)||!p.subpages.length) p.subpages=[[]];
  p.subpages.forEach(sp=>sp.forEach(c=>{ if(C[c.ck]&&C[c.ck].multi&&!c.entities)c.entities=[]; if(c.ck==='shortcuts'&&!c.shortcuts)c.shortcuts=[]; if(c.ck==='tv_apps'&&!c.sources)c.sources=[]; }));
  if(!p.title) p.title='Page'; return p; }

// Insert an applied page template as a NEW page (+ nav item if there's room).
function insertPageTemplate(page,name){ const pg=normPage(JSON.parse(JSON.stringify(page)));
  const b=(pg.title||name||'page').toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,'')||'page';
  let key=b, i=2; while(L.pages[key]){ key=b+'_'+i; i++; }
  L.pages[key]=pg;
  if(L.nav.length<8){ L.nav.push({id:uid(),icon:'view-dashboard-variant',label:pg.title||name,page:key}); toast('Inserted “'+name+'” as a new page ✓'); }
  else{ toast('Page added — nav is full (8); open it from the Pages manager'); }
  curPage=key; curSub=0; sel=null; closeModal(); renderAll(); }

// ===== Build-a-Room wizard: a Home Assistant area -> a laid-out room page =====
// domain -> card kind. Sizes are NOT hardcoded here — each card uses C[ck].def
// (the same default the add-card modal uses), so the wizard tracks the catalog.
// binary_sensor -> the dedicated 'binary' card (device-class labels + lights up
// when active); a numeric 'sensor' card would atof("on")==0 and show a bogus 0.
const ROOM_DOMAIN_CK={light:'light',fan:'fan',cover:'cover',climate:'climate',lock:'lock',media_player:'media',switch:'switch',sensor:'sensor',binary_sensor:'binary'};
const RM_PRECHECK=new Set(['light','fan','cover','climate','lock','media_player']); // primary controls: checked by default
const RM_DOMORDER=['light','fan','cover','climate','lock','media_player','switch','sensor','binary_sensor'];
let RMitems=[], RMarea='';
function escH(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
// Mirror gen.py slug(): lowercase, non-alnum runs -> "_", strip ends. Keeping the
// page key == slug(roomName) lets a room:<Name> shortcut resolve too (the wizard
// itself uses the more direct page:<key>, which is collision-safe).
function roomSlug(s){ return ((s||'').toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_+|_+$/g,''))||'room'; }

// Shelf packer: flow L->R, top->bottom; wrap to the next shelf (advance by the
// tallest card on the current shelf) when a card won't fit the remaining columns;
// start a new subpage when it won't fit the remaining rows. No overlap.
function packRoomCards(cards, usableRows){
  const cols=6, subs=[]; let sp=[], col=1, row=1, shelfH=0;
  const flush=()=>{ if(sp.length){ subs.push(sp); sp=[]; } col=1; row=1; shelfH=0; };
  for(const c of cards){
    const w=Math.max(1,Math.min(c.w,cols)), h=Math.max(1,Math.min(c.h,usableRows));
    if(col+w-1>cols){ row+=shelfH; col=1; shelfH=0; }   // no room in this shelf -> next shelf
    if(row+h-1>usableRows){ flush(); }                  // no room on this page -> new subpage
    c.x=col; c.y=row; c.w=w; c.h=h; sp.push(c);
    col+=w; if(h>shelfH) shelfH=h;
  }
  if(sp.length) subs.push(sp);
  return subs.length?subs:[[]];
}

// target: 'new' (＋Room — a new orphan room page + a Rooms-hub tile) or 'home'
// ("Build Home from this room" — overwrite the Home page's cards). The entity-
// curation UI is identical; only the heading/intro, the (name) field, the
// primary button and its action differ. A stray Event arg (onclick=roomWizard)
// is not 'home', so it reads as 'new' — the shipped ＋Room behavior is unchanged.
function roomWizard(target){ const isHome=(target==='home'); const mbox=document.getElementById('mbox');
  const ids=Object.keys(AREAS);

    document.getElementById('modal').style.display='flex'; mbox.querySelector('#mCancel').onclick=closeModal; return; }
  const opts=ids.map(id=>[id,AREAS[id].name||id]).sort((a,b)=>a[1].localeCompare(b[1]))
    .map(([id,nm])=>`<option value="${escH(id)}">${escH(nm)}</option>`).join('');
  mbox.innerHTML=`<h2>${isHome?'Build Home from a room':'Build a Room'}</h2>
    <p>${isHome?'Pick an area and choose which entities to include — this rebuilds the Home page’s cards. The Home page’s title and top bar are kept.':'Turn a Home Assistant area into a room page. Pick which entities to include — Aurora lays them out on a new page and links it from a Rooms hub.'}</p>
    <div class="field"><label>Area</label><select id="rmArea">${opts}</select></div>
    ${isHome?'':`<div class="field"><label>Room name</label><input id="rmName" placeholder="Room"></div>`}
    <div style="font-size:12px;color:var(--t2);margin:12px 0 4px">Entities to include <span style="color:var(--t3)">— primary controls are pre-checked</span></div>
    <div id="rmEnts" style="max-height:44vh;overflow:auto;border:1px solid var(--bd);border-radius:10px;padding:4px 8px"></div>
    <div class="mfoot"><button class="btn ghost" id="mCancel">Cancel</button><button class="btn" id="rmCreate">${isHome?'Build Home':'Create Room'}</button></div>`;
  document.getElementById('modal').style.display='flex';
  mbox.querySelector('#mCancel').onclick=closeModal;
  mbox.querySelector('#rmCreate').onclick=isHome?buildHomeFromRoom:createRoom;
  const areaSel=mbox.querySelector('#rmArea'), nameInp=mbox.querySelector('#rmName');   // nameInp is null in 'home' mode
  // 'home': pre-select the area whose NAME matches L.install_room (blank/unknown -> leave default, don't block)
  const homeRoom=isHome&&L.pages.home?(L.pages.home.room||L.install_room):'';
  if(homeRoom){ const hit=Object.keys(AREAS).find(id=>((AREAS[id].name)||id)===homeRoom); if(hit) areaSel.value=hit; }
  const sync=()=>{ RMarea=areaSel.value; if(nameInp) nameInp.value=(AREAS[RMarea]&&AREAS[RMarea].name)||RMarea; loadAreaEnts(); };
  areaSel.onchange=sync; sync(); }

async function loadAreaEnts(){ const box=document.getElementById('rmEnts'); if(!box) return;
  box.innerHTML='<div class="muted" style="padding:14px;font-size:12px"><span class="mdi mdi-loading mdi-spin"></span> Loading entities…</div>';
  RMitems=[]; const forArea=RMarea;
  try{ const r=await j('/api/ha/area-entities?area='+encodeURIComponent(RMarea));
    if(forArea!==RMarea) return;                        // a newer area pick superseded this fetch
    RMitems=(r.items||[]).filter(it=>ROOM_DOMAIN_CK[it.domain])
      .map(it=>({entity_id:it.entity_id,domain:it.domain,name:it.name||it.entity_id,checked:RM_PRECHECK.has(it.domain)}));
  }catch(e){ box.innerHTML='<div style="padding:14px;font-size:12px;color:var(--red)">Could not load entities: '+escH(e.message)+'</div>'; return; }
  renderAreaEnts(); }

function renderAreaEnts(){ const box=document.getElementById('rmEnts'); if(!box) return;
  if(!RMitems.length){ box.innerHTML='<div class="muted" style="padding:14px;font-size:12px">No supported entities in this area.</div>'; return; }
  const byDom={}; RMitems.forEach(it=>{ (byDom[it.domain]=byDom[it.domain]||[]).push(it); });
  let html='';
  RM_DOMORDER.forEach(dom=>{ const list=byDom[dom]; if(!list||!list.length) return;
    const gi=GICON[dom]||['shape-outline','var(--t2)']; const allOn=list.every(it=>it.checked);
    html+=`<div style="display:flex;align-items:center;justify-content:space-between;margin:8px 2px 4px">
        <span style="font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--t2)"><span class="mdi mdi-${gi[0]}" style="color:${gi[1]};margin-right:5px"></span>${escH(dom)} <span style="color:var(--t3)">(${list.length})</span></span>
        <button type="button" class="btn ghost" style="padding:3px 9px;font-size:11px" data-domall="${escH(dom)}">${allOn?'None':'All'}</button></div>`;
    list.forEach(it=>{ const idx=RMitems.indexOf(it);
      html+=`<label class="elrow" style="cursor:pointer">
          <span style="display:flex;align-items:center;gap:8px;min-width:0">
            <input type="checkbox" data-idx="${idx}" ${it.checked?'checked':''} style="width:auto;flex:none">
            <span class="mdi mdi-${gi[0]}" style="color:${gi[1]};flex:none"></span>
            <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escH(it.name)}</span></span>
          <span class="eid" style="color:var(--t3);white-space:nowrap">${escH(it.entity_id)}</span></label>`; }); });
  box.innerHTML=html;
  box.querySelectorAll('input[type=checkbox][data-idx]').forEach(cb=>{ cb.onchange=()=>{ RMitems[+cb.dataset.idx].checked=cb.checked; }; });
  box.querySelectorAll('button[data-domall]').forEach(b=>{ b.onclick=()=>{ const dom=b.dataset.domall, list=RMitems.filter(it=>it.domain===dom), allOn=list.every(it=>it.checked); list.forEach(it=>it.checked=!allOn); renderAreaEnts(); }; }); }

// Build cards from the CHECKED entities using the domain->ck map + each ck's
// catalog default size. Shared by the 'new' room page and the 'home' rebuild.
function roomCardsFromChecked(){ const cards=[];
  for(const it of RMitems){ if(!it.checked) continue;
    const ck=ROOM_DOMAIN_CK[it.domain];
    if(!ck){ console.log('Room wizard: no card kind for domain', it.domain, it.entity_id); continue; }
    const [w,h]=C[ck].def;                              // reuse the catalog's default size
    const c=mk(ck, it.entity_id, it.name, 0,0, w,h);
    if(ck==='sensor'||ck==='binary') applyEntityMeta(c, it.entity_id);  // device_class/unit/stype for a good render
    cards.push(c); }
  return cards; }

function createRoom(){
  const nameInp=document.getElementById('rmName');
  const roomName=((nameInp&&nameInp.value)||'').trim()||(AREAS[RMarea]&&AREAS[RMarea].name)||'Room';
  const cards=roomCardsFromChecked();
  if(!cards.length){ toast('Pick at least one entity to include'); return; }
  const hdr=defHeader(true), usableRows=hdr.on?4:5;
  const subpages=packRoomCards(cards, usableRows);
  // unique page key; prefer key == slug(roomName) so room:<Name> shortcuts resolve too
  const base=roomSlug(roomName); let key=base, i=2; while(L.pages[key]){ key=base+'_'+i; i++; }
  L.pages[key]=normPage({title:roomName, room:roomName, type:'custom', header:hdr, subpages});  // orphan page (not added to nav)
  ensureRoomsHub(roomName, key);
  curPage=key; curSub=0; sel=null; closeModal(); renderAll();                    // open it in the editor (Phase-1 idiom)
  toast('Room “'+roomName+'” created ('+cards.length+' card'+(cards.length===1?'':'s')+') — Save to keep it'); }

// 'Build Home from this room': overwrite the Home page's cards with the checked
// entities, PRESERVING the Home page's title + header. No new page, no Rooms
// tile, no nav change. Confirms first (destructive), then rebuilds. No auto-save.
function buildHomeFromRoom(){
  const home=L.pages.home;
  if(!home){ toast('No Home page (key “home”) to rebuild'); return; }
  const cards=roomCardsFromChecked();
  if(!cards.length){ toast('Pick at least one entity to include'); return; }
  if(!confirm('Replace the Home page layout with these cards? Your current Home cards will be overwritten.')) return;
  const usableRows=(home.header&&home.header.on)?4:5;            // pack for the Home page's OWN header
  home.subpages=packRoomCards(cards, usableRows);                // replace subpages; title + header untouched
  home.room=(AREAS[RMarea]&&AREAS[RMarea].name)||RMarea||home.room||'';
  home.subpages.forEach(sp=>sp.forEach(c=>{ if(C[c.ck]&&C[c.ck].multi&&!c.entities)c.entities=[]; if(c.ck==='shortcuts'&&!c.shortcuts)c.shortcuts=[]; }));
  curPage='home'; curSub=0; sel=null; closeModal(); renderAll();
  toast('Home rebuilt from room ('+cards.length+' card'+(cards.length===1?'':'s')+') — Save to keep it'); }

// Ensure a Rooms hub page (single shortcuts card filling the grid) exists and holds
// a tile linking to the new room. Adds one nav item if the rail has room (<7).
function ensureRoomsHub(roomName, key){
  let hub=L.pages['rooms'], sub=0;
  if(!hub){
    const sc=mk('shortcuts','','Rooms',1,1,6,4);        // 6x4 = 24 tiles, fills a header-on page
    hub=normPage({title:'Rooms', type:'custom', header:defHeader(true), subpages:[[sc]]});
    L.pages['rooms']=hub;
    if(L.nav.length<8) L.nav.push({id:uid(),icon:'sofa',label:'Rooms',page:'rooms'});
    else toast('Rooms hub added — nav is full (8); open it from the Pages manager');
  }
  let card=null; (hub.subpages||[]).forEach((sp,si)=>(sp||[]).forEach(c=>{ if(!card && c.ck==='shortcuts'){ card=c; sub=si; } }));
  const usable=(hub.header&&hub.header.on)?4:5;
  if(!card){ card=mk('shortcuts','','Rooms',1,1,6,usable); hub.subpages.push([card]); sub=hub.subpages.length-1; } // foreign 'rooms' page had none
  if(!Array.isArray(card.shortcuts)) card.shortcuts=[];
  const target='page:'+key;                              // page:<key> resolves by exact key in gen.py's pagemap
  if(card.shortcuts.some(s=>s&&s.target===target)) return;   // already linked — don't duplicate
  card.shortcuts.push({label:roomName, icon:'sofa', target});
  // gen.py's c_shortcuts only renders the first w*h tiles, so grow the card (down,
  // within page bounds, without overlapping a neighbor) so the new tile is visible.
  const need=Math.ceil(card.shortcuts.length/card.w);
  if(need>card.h){
    let maxH=usable-card.y+1;
    (hub.subpages[sub]||[]).forEach(o=>{ if(o===card) return;
      const xOverlap=!(card.x+card.w-1 < o.x || o.x+o.w-1 < card.x);
      if(xOverlap && o.y>=card.y) maxH=Math.min(maxH, o.y-card.y); });   // stop above the neighbor
    const grown=Math.min(need, maxH);
    if(grown>card.h) card.h=grown;
    if(card.shortcuts.length > card.w*card.h) toast('Rooms hub is full — “'+roomName+'” was added but won’t show until you enlarge the Rooms shortcuts card');
  }
}

// Page manager: lists EVERY page in L.pages (nav + orphan) and makes each one
// selectable/editable, so pages that aren't wired into the 8-slot nav rail are
// still reachable. slug() mirrors gen.py's slug() so room-shortcut references
// (target "room:<area name>" -> page key slug(area name)) are detected on delete.
function pagesModal(){ const mbox=document.getElementById('mbox');
  const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const slug=s=>((s||'').toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_+|_+$/g,''))||'x';
  const cardCount=p=>(p.subpages||[]).reduce((n,sp)=>n+((sp&&sp.length)||0),0);
  mbox.innerHTML=`<h2>Pages</h2><p>Every page in this dashboard — including ones not in the nav rail. Open a page to edit it, add or remove it from the nav, rename its title, or delete it. Changes take effect on Save.</p>
    <div id="pgList" style="max-height:62vh;overflow:auto"></div>
    <div class="mfoot"><button class="btn ghost" id="mCancel">Close</button></div>`;
  document.getElementById('modal').style.display='flex'; mbox.querySelector('#mCancel').onclick=closeModal;
  const listEl=mbox.querySelector('#pgList');
  const mkBtn=(html,cls,fn,title)=>{ const b=document.createElement('button'); b.className=cls; b.style.padding='7px 9px'; b.innerHTML=html; if(title)b.title=title; b.onclick=fn; return b; };
  function draw(){ listEl.innerHTML='';
    const keys=Object.keys(L.pages); const onlyPage=keys.length<=1;
    keys.forEach(key=>{ const p=L.pages[key]; const navItem=L.nav.find(x=>x.page===key); const inNav=!!navItem;
      const isHome=!!(L.nav[0]&&L.nav[0].page===key); const cc=cardCount(p); const editing=key===curPage;
      const d=document.createElement('div'); d.className='pitem'; d.style.marginBottom='6px'; d.style.cursor='default';
      const info=document.createElement('div'); info.style.cssText='flex:1;min-width:0';
      const navChip=inNav
        ? `<span style="font-size:10px;color:var(--teal);border:1px solid var(--onbd);border-radius:6px;padding:1px 6px;white-space:nowrap">in nav · ${esc(navItem.label)}</span>`
        : `<span style="font-size:10px;color:var(--t3);border:1px solid var(--bd);border-radius:6px;padding:1px 6px;white-space:nowrap">not in nav</span>`;
      info.innerHTML=`<div class="nm" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(p.title||key)}${editing?' <span style="color:var(--teal);font-size:11px;font-weight:600">· editing</span>':''}</div>
        <div style="display:flex;gap:8px;align-items:center;margin-top:3px;flex-wrap:wrap">
          <span class="eid mono">${esc(key)}</span>${navChip}
          <span style="font-size:11px;color:var(--t2)">${cc} card${cc===1?'':'s'}</span></div>`;
      d.appendChild(info);
      const bar=document.createElement('div'); bar.style.cssText='display:flex;gap:6px;flex:none;align-items:center';
      // Open/Edit — mirrors the nav-rail click: set curPage + reset sub/sel, then re-render.
      bar.appendChild(mkBtn('Open','btn',()=>{ curPage=key; curSub=0; sel=null; closeModal(); renderAll(); },'Edit this page'));
      // Toggle in nav (respect the 7-item cap).
      if(inNav) bar.appendChild(mkBtn('<span class="mdi mdi-star"></span>','btn ghost',()=>{
          const i=L.nav.findIndex(x=>x.page===key); if(i>=0) L.nav.splice(i,1); renderAll(); draw(); },'In nav — click to remove from the rail'));
      else bar.appendChild(mkBtn('<span class="mdi mdi-star-outline"></span>','btn ghost',()=>{
          if(L.nav.length>=8){ toast('Nav is full (8) — remove an item first'); return; }
          L.nav.push({id:uid(),icon:'view-dashboard-variant',label:p.title||key,page:key}); renderAll(); draw(); },'Not in nav — click to add to the rail'));
      // Rename — display title only; the page KEY is left alone (shortcuts/nav reference it).
      bar.appendChild(mkBtn('<span class="mdi mdi-pencil"></span>','btn ghost',()=>{
          const n=prompt('Rename page (display title only — the page key “'+key+'” stays the same)', p.title||key);
          if(n&&n.trim()){ p.title=n.trim(); renderAll(); draw(); } },'Rename title'));
      // Delete — splice nav too; warn about shortcut cards that point here.
      const delBtn=mkBtn('<span class="mdi mdi-close"></span>','btn ghost',()=>{
          if(onlyPage){ toast('Can’t delete the only page'); return; }
          if(isHome){ toast('Can’t delete the home page (first nav item)'); return; }
          const refs=[]; Object.entries(L.pages).forEach(([pk,pp])=>{ (pp.subpages||[]).forEach(sp=>(sp||[]).forEach(c=>{
            if(c.ck==='shortcuts'&&Array.isArray(c.shortcuts)) c.shortcuts.forEach(s=>{ const t=(s&&s.target)||'';
              if(t==='page:'+key||t==='room:'+key||(t.slice(0,5)==='room:'&&slug(t.slice(5))===key)) refs.push(pp.title||pk); }); })); });
          let msg='Delete page “'+(p.title||key)+'” ('+key+')?';
          if(inNav) msg+='\nIt will also be removed from the nav rail.';
          if(refs.length) msg+='\n\nWarning: '+refs.length+' shortcut(s) point here (on '+[...new Set(refs)].join(', ')+') and will fall back to Home.';
          if(!confirm(msg)) return;
          delete L.pages[key];
          if(CLIP&&CLIP.cut&&CLIP.cut.page===key) CLIP.cut=null;   // cut source page is gone — paste degrades to copy
          const i=L.nav.findIndex(x=>x.page===key); if(i>=0) L.nav.splice(i,1);
          if(curPage===key){ curPage=L.nav[0]?L.nav[0].page:Object.keys(L.pages)[0]; curSub=0; sel=null; }
          renderAll(); draw(); toast('Deleted “'+(p.title||key)+'”'); },'Delete page');
      if(onlyPage||isHome){ delBtn.disabled=true; delBtn.style.opacity='.4'; delBtn.style.cursor='default'; delBtn.title=onlyPage?'Can’t delete the only page':'Can’t delete the home page (first nav item)'; }
      bar.appendChild(delBtn);
      d.appendChild(bar); listEl.appendChild(d); }); }
  draw(); }

    <div class="mfoot"><button class="btn ghost" id="mCancel">Close</button></div>`;
  document.getElementById('modal').style.display='flex'; mbox.querySelector('#mCancel').onclick=closeModal;
  const P={method:'POST',headers:{'Content-Type':'application/json'}};
  const post=(u,o)=>j(u,{...P,body:JSON.stringify(o)});
  const row=(it,btns)=>{ const d=document.createElement('div'); d.className='pitem'; d.style.marginBottom='6px';
    d.innerHTML=`<div style="flex:1;min-width:0"><div class="nm" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(it.name)}</div><div class="muted" style="font-size:11px">${esc(it.created||'')}</div></div><div style="display:flex;gap:6px;flex:none"></div>`;
    const bar=d.querySelector('div:last-child'); btns.forEach(([lbl,cls,fn])=>{ const b=document.createElement('button'); b.className=cls; b.style.padding='7px 10px'; b.innerHTML=lbl; b.onclick=fn; bar.appendChild(b); }); return d; };
  async function refreshVer(){ const el=mbox.querySelector('#verList'); let items=[]; try{items=(await j('/api/versions')).items||[];}catch(e){}
    el.innerHTML=''; if(!items.length){ el.innerHTML='<div class="muted" style="font-size:12px">No saved versions yet.</div>'; return; }
    items.forEach(it=>el.appendChild(row(it,[
      ['Restore','btn',async()=>{ if(!confirm('Restore “'+it.name+'”? This replaces the current dashboard.'))return; const r=await post('/api/versions/restore',{id:it.id}); L=r.layout; Object.values(L.pages).forEach(normPage); curPage=L.nav[0]?L.nav[0].page:Object.keys(L.pages)[0]; curSub=0; sel=null; closeModal(); renderAll(); toast('Restored “'+it.name+'” ✓'); }],
      ['<span class="mdi mdi-pencil"></span>','btn ghost',async()=>{ const n=prompt('Rename version',it.name); if(n){ await post('/api/versions/rename',{id:it.id,name:n}); refreshVer(); } }],
      ['<span class="mdi mdi-close"></span>','btn ghost',async()=>{ if(!confirm('Delete version “'+it.name+'”?'))return; await post('/api/versions/delete',{id:it.id}); refreshVer(); }] ]))); }
  async function refreshTpl(){ const el=mbox.querySelector('#tplList'); let items=[]; try{items=(await j('/api/page-templates')).items||[];}catch(e){}
    el.innerHTML=''; if(!items.length){ el.innerHTML='<div class="muted" style="font-size:12px">No page templates yet.</div>'; return; }
    items.forEach(it=>el.appendChild(row(it,[
      ['New page','btn',async()=>{ const r=await post('/api/page-templates/apply',{id:it.id}); insertPageTemplate(r.page,r.name); }],
      ['Replace','btn ghost',async()=>{ if(!confirm('Replace the current page (“'+((L.pages[curPage]&&L.pages[curPage].title)||curPage)+'”) with “'+it.name+'”?'))return; const r=await post('/api/page-templates/apply',{id:it.id}); const pg=normPage(JSON.parse(JSON.stringify(r.page))); pg.title=L.pages[curPage].title; L.pages[curPage]=pg; curSub=0; sel=null; closeModal(); renderAll(); toast('Applied “'+it.name+'” ✓'); }],
      ['<span class="mdi mdi-pencil"></span>','btn ghost',async()=>{ const n=prompt('Rename template',it.name); if(n){ await post('/api/page-templates/rename',{id:it.id,name:n}); refreshTpl(); } }],
      ['<span class="mdi mdi-close"></span>','btn ghost',async()=>{ if(!confirm('Delete template “'+it.name+'”?'))return; await post('/api/page-templates/delete',{id:it.id}); refreshTpl(); }] ]))); }
  mbox.querySelector('#verSave').onclick=async()=>{ await post('/api/versions/save',{name:mbox.querySelector('#verName').value,layout:L}); mbox.querySelector('#verName').value=''; refreshVer(); toast('Version saved ✓'); };
  mbox.querySelector('#tplSave').onclick=async()=>{ await post('/api/page-templates/save',{name:mbox.querySelector('#tplName').value,page:L.pages[curPage]}); mbox.querySelector('#tplName').value=''; refreshTpl(); toast('Page template saved ✓'); };
  refreshVer(); refreshTpl(); }

async function logout(){ try{ await j('/api/logout',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'}); }catch(e){} location.reload(); }
function accountModal(){ const mbox=document.getElementById('mbox');
  mbox.innerHTML=`<h2>Change access password</h2><p>This password gates the whole configurator. Default is “Admin”.</p>
    <div class="field"><label>Current password</label><input id="pwCur" type="password"></div>
    <div class="field"><label>New password</label><input id="pwNew" type="password"></div>
    <div class="mfoot"><button class="btn ghost" id="mCancel">Cancel</button><button class="btn" id="mOk">Change</button></div>`;
  document.getElementById('modal').style.display='flex'; mbox.querySelector('#mCancel').onclick=closeModal;
  mbox.querySelector('#mOk').onclick=async()=>{ try{ await j('/api/change-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({current:mbox.querySelector('#pwCur').value,new:mbox.querySelector('#pwNew').value})}); closeModal(); toast('Password changed ✓'); }catch(e){ toast(e.message); } }; }
async function connect(){ const url=document.getElementById('haurl').value.trim(), tok=document.getElementById('hatok').value.trim(), ip=document.getElementById('panip').value.trim();
  document.getElementById('cstat').textContent='saving…';
  try{ const r=await j('/api/config',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ha_url:url,panel_ip:ip,ha_token:tok})});
    document.getElementById('hatok').value=''; document.getElementById('hatok').placeholder=r.has_token?'•••• saved (blank = keep)':'Long-lived token'; }catch(e){}
  document.getElementById('cstat').textContent='connecting…';
  try{ ENTS=await j('/api/entities',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});
    try{ AREAS=(await j('/api/ha/areas',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'}))||{}; }catch(e){ AREAS={}; }
    try{ HA_LOC=(await j('/api/ha/location'))||{}; }catch(e){ HA_LOC={}; }
    document.getElementById('cdot').className='dot ok'; document.getElementById('cstat').textContent=ENTS.length+' entities · '+Object.keys(AREAS).length+' areas';
    renderPalette(); renderInspector(); toast('Connected to Home Assistant');
  }catch(e){ document.getElementById('cdot').className='dot'; document.getElementById('cstat').textContent='not connected'; toast('Connect failed: '+e.message); } }
async function loadHaLocation(){ try{ HA_LOC=(await j('/api/ha/location'))||{}; }catch(e){ HA_LOC={}; return; }
  if(!Number.isFinite(Number(HA_LOC.latitude))||!Number.isFinite(Number(HA_LOC.longitude))) return;
  Object.values(L.pages).forEach(p=>p.subpages.forEach(sp=>sp.forEach(c=>{ if(c.ck==='radar'&&(!Number.isFinite(Number(c.lat))||!Number.isFinite(Number(c.lon))||(Number(c.lat)===0&&Number(c.lon)===0))){ c.lat=Number(HA_LOC.latitude); c.lon=Number(HA_LOC.longitude); c.zoom=Number(c.zoom)||6; } })));
  if(sel&&curCards().some(c=>c.id===sel&&c.ck==='radar')) renderInspector(); }
async function save(){ try{
  if(ENTS.length) L.home_lights=ENTS.filter(e=>e.domain==='light'&&!(e.entity_id.startsWith('light.espcontrol_')&&e.entity_id.endsWith('_display_backlight'))).map(e=>e.entity_id);
  await j('/api/layout',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(L)}); toast('Layout saved ✓');
}catch(e){ toast('Save failed: '+e.message); } }
let SERIAL_DEV='';
// Re-check for a USB-attached panel and update the serial control live (no page
// reload). The option is always visible: enabled when /dev/ttyACM* is present,
// otherwise disabled with a hint (the panel isn't attached to WSL — usbipd).
async function scanSerial(){ const chk=document.getElementById('usbChk'), lbl=document.getElementById('usbLbl'), wrap=document.getElementById('usbWrap');
  const wasNone=chk.disabled; let fd={}; try{ fd=await j('/api/flash-devices'); }catch(e){}
  const has=!!(fd.serial&&fd.serial.length); SERIAL_DEV=has?fd.serial[0]:'';
  chk.disabled=!has; if(!has){ chk.checked=false; } else if(wasNone){ chk.checked=true; }
  lbl.textContent=has?('USB ('+SERIAL_DEV.replace('/dev/','')+')'):'No USB panel';
  wrap.style.opacity=has?'1':'.55'; return has; }
async function flash(){
  const f=capacityPct();
  if(f>=LOAD_DANGER && !confirm('This layout is at '+Math.round(f*100)+'% of the estimated panel memory capacity. It may fail to boot (stack overflow / boot-loop). Remove some cards or pages first, or flash anyway?')) return;
  await save();
  const useSerial=SERIAL_DEV && document.getElementById('usbChk').checked;
  const device=useSerial?SERIAL_DEV:document.getElementById('panip').value.trim();
  if(!device){ toast('Enter the panel IP, or plug in USB for serial'); return; }
  document.getElementById('flashbox').style.display='block'; const log=document.getElementById('flashlog');
  log.textContent='Starting '+(useSerial?('serial flash via '+device):('OTA to '+device))+'…';
  try{ await j('/api/flash',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({device})});
    const t=setInterval(async()=>{ const s=await j('/api/flash-status'); log.textContent=s.log||''; log.scrollTop=log.scrollHeight; if(s.done){clearInterval(t); toast(s.ok?'Flash complete ✓':'Flash did not confirm');} },1200);
  }catch(e){ log.textContent='Error: '+e.message; } }

async function boot(){ try{ L=await j('/api/layout'); if(!L||!L.pages||!Object.keys(L.pages).length) L=defaultLayout(); }catch(e){ L=defaultLayout(); }
  Object.values(L.pages).forEach(p=>{ if(typeof p.header!=='object'||p.header===null) p.header=defHeader(p.header===true);
    if(typeof p.room!=='string') p.room='';
    if(!Array.isArray(p.header.right)) p.header.right=['weather_current','secured']; if(!p.header.left) p.header.left='greeting';
    p.subpages.forEach(sp=>sp.forEach(c=>{ if(C[c.ck]&&C[c.ck].multi&&!c.entities)c.entities=[]; if(c.ck==='shortcuts'&&!c.shortcuts)c.shortcuts=[]; if(c.ck==='tv_apps'&&!c.sources)c.sources=[]; })); });
  curPage=L.nav[0]?L.nav[0].page:Object.keys(L.pages)[0]; curSub=0;
  let cfg={}; try{ cfg=await j('/api/config'); }catch(e){ cfg={}; }
  document.getElementById('haurl').value=cfg.ha_url||'';
  document.getElementById('panip').value=cfg.panel_ip||'';
  document.getElementById('hatok').placeholder=cfg.has_token?'•••• saved (blank = keep)':'Long-lived token';
  scanSerial();
  renderPalette(); renderAll();
  loadHaLocation();
  document.getElementById('connect').onclick=connect; document.getElementById('saveBtn').onclick=save;
  document.getElementById('flashBtn').onclick=flash; document.getElementById('tplBtn').onclick=openTemplates;
  document.getElementById('lockBtn').onclick=logout; document.getElementById('acctBtn').onclick=accountModal;
  document.getElementById('verBtn').onclick=versionsModal; document.getElementById('pagesBtn').onclick=pagesModal;
  document.getElementById('roomBtn').onclick=roomWizard;
  document.getElementById('rescanBtn').onclick=async()=>{ const has=await scanSerial(); toast(has?('USB panel found: '+SERIAL_DEV.replace('/dev/','')):'No USB panel — plug it in, then run on Windows:  usbipd attach --wsl --busid <id>'); };
  document.addEventListener('click',(e)=>{
    if(!sel||e.target.closest('.pc,#inspector,#inspectorToggle,#modal')) return;
    sel=null; renderInspector(); markSel();
  });
  document.getElementById('paletteToggle').onclick=()=>toggleBuilderPanel('palette');
  document.getElementById('inspectorToggle').onclick=()=>toggleBuilderPanel('inspector');
  document.getElementById('panelShade').onclick=closeBuilderPanels;
  window.addEventListener('resize',syncBuilderLayout);
  if('ResizeObserver' in window){
    builderObserver=new ResizeObserver(scheduleStageFit);
    builderObserver.observe(document.getElementById('center'));
    builderObserver.observe(document.getElementById('top'));
    builderObserver.observe(document.getElementById('navbuild'));
    builderObserver.observe(document.getElementById('tabs'));
  }
  scheduleStageFit();
  if(cfg.has_token||cfg.ha_url) connect();
}
boot();
</script>
</body></html>
