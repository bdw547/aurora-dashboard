# =====================================================================
# Aurora panel — Spotify Library data feed (Home Assistant package)
# =====================================================================
# Install:
#   1. Copy to:  <config>/packages/aurora_spotify_library.yaml
#      (create the `packages/` folder if it doesn't exist)
#   2. In configuration.yaml add (once):
#         homeassistant:
#           packages: !include_dir_named packages
#   3. Developer Tools -> YAML -> Check Configuration, then Restart HA.
#   4. Run action `script.aurora_spotify_refresh_playlists` once to populate
#      the playlist list (and re-run whenever you add playlists).
#
# Provides for the panel:
#   sensor.aurora_spotify_playlists  attr names = "\n"-joined playlist names
#                                    attr uris  = "\n"-joined matching uris
#   sensor.aurora_spotify_tracks     attr names = "\n"-joined "Title — Artist"
#   sensor.aurora_spotify_queue      attr names = "\n"-joined upcoming songs
#   sensor.aurora_spotify_favorite   attr is_favorite = current track saved state
#   script.aurora_spotify_refresh_queue
#   script.aurora_spotify_toggle_favorite
#   script.aurora_spotify_load_playlist(playlist_uri)  loads a playlist's tracks
#
# Owning entity: media_player.spotifyplus_ben_walton
# Spotify caps one fetch at 50 items, so lists are limited to ~50.
#
# If a list comes back empty, the SpotifyPlus response shape differs from the
# guess below — run the get_* action in Developer Tools with a response
# variable and share the YAML so these templates can be corrected.
# =====================================================================

template:
  - trigger:
      - trigger: event
        event_type: aurora_spotify_playlists_updated
    sensor:
      - name: Aurora Spotify Playlists
        unique_id: aurora_spotify_playlists
        state: "{{ trigger.event.data.names | count }}"
        attributes:
          names: "{{ trigger.event.data.names | join('\n') }}"
          uris: "{{ trigger.event.data.uris | join('\n') }}"

  - trigger:
      - trigger: event
        event_type: aurora_spotify_tracks_updated
    sensor:
      - name: Aurora Spotify Tracks
        unique_id: aurora_spotify_tracks
        state: "{{ trigger.event.data.names | count }}"
        attributes:
          names: "{{ trigger.event.data.names | join('\n') }}"

  - trigger:
      - trigger: event
        event_type: aurora_spotify_queue_updated
    sensor:
      - name: Aurora Spotify Queue
        unique_id: aurora_spotify_queue
        state: "{{ trigger.event.data.names | count }}"
        attributes:
          names: "{{ trigger.event.data.names | join('\n') }}"

  - trigger:
      - trigger: event
        event_type: aurora_spotify_favorite_updated
    sensor:
      - name: Aurora Spotify Favorite
        unique_id: aurora_spotify_favorite
        state: "{{ trigger.event.data.is_favorite | bool }}"
        attributes:
          is_favorite: "{{ trigger.event.data.is_favorite | bool }}"
          track_id: "{{ trigger.event.data.track_id | default('') }}"

automation:
  - alias: Aurora Spotify - Refresh Current Track Details
    id: aurora_spotify_refresh_current_track_details
    triggers:
      - trigger: homeassistant
        event: start
      - trigger: state
        entity_id: media_player.spotifyplus_ben_walton
        attribute: media_content_id
    actions:
      - action: script.aurora_spotify_refresh_queue
      - action: script.aurora_spotify_refresh_favorite

script:
  # Fetch the user's playlists and publish names + uris to the panel.
  aurora_spotify_refresh_playlists:
    alias: Aurora Spotify - Refresh Playlists
    sequence:
      - action: spotifyplus.get_playlist_favorites
        data:
          entity_id: media_player.spotifyplus_ben_walton
          limit: 50
          limit_total: 50
          sort_result: true
        response_variable: pl
      - variables:
          items: "{{ pl.result['items'] }}"
      - event: aurora_spotify_playlists_updated
        event_data:
          names: "{{ items | map(attribute='name') | list }}"
          uris: "{{ items | map(attribute='uri') | list }}"

  # Called by the panel when a playlist is selected; loads its tracks.
  aurora_spotify_load_playlist:
    alias: Aurora Spotify - Load Playlist Tracks
    fields:
      playlist_uri:
        description: Spotify playlist URI (spotify:playlist:...)
        example: "spotify:playlist:37i9dQZF1DXcBWIGoYBM5M"
    sequence:
      - action: spotifyplus.get_playlist_items
        data:
          entity_id: media_player.spotifyplus_ben_walton
          playlist_id: "{{ playlist_uri.split(':')[-1] }}"
          limit: 50
          limit_total: 50
        response_variable: tr
      - variables:
          items: "{{ tr.result['items'] }}"
      - event: aurora_spotify_tracks_updated
        event_data:
          names: >-
            {% set out = namespace(rows=[]) %}
            {% for it in items %}
              {% set t = it.track if it.track is defined else it %}
              {% set artist = (t.artists | map(attribute='name') | join(', ')) if t.artists is defined else '' %}
              {% set out.rows = out.rows + [ t.name ~ (' — ' ~ artist if artist else '') ] %}
            {% endfor %}
            {{ out.rows }}

  # Called by the panel's "Play Track": plays the playlist context starting
  # at the selected track. Wrapped in a script so 'offset' is rendered as a
  # native integer (the panel can only send strings over the ESPHome API).
  aurora_spotify_play_track:
    alias: Aurora Spotify - Play Track
    fields:
      context_uri:
        description: Playlist/album context URI (spotify:playlist:...)
        example: "spotify:playlist:7bcaKHOEMf24xY35x6YC5f"
      position:
        description: Zero-based track index within the context
        example: 0
      device:
        description: Spotify Connect device name (room) to play on; blank = active device
        example: "Living Room"
    sequence:
      - action: spotifyplus.player_media_play_context
        data:
          entity_id: media_player.spotifyplus_ben_walton
          context_uri: "{{ context_uri }}"
          offset_position: "{{ position | int }}"
          device_id: "{{ device | default('', true) }}"

  aurora_spotify_refresh_queue:
    alias: Aurora Spotify - Refresh Queue
    sequence:
      - action: spotifyplus.get_player_queue_info
        data:
          entity_id: media_player.spotifyplus_ben_walton
        response_variable: queue_response
      - variables:
          items: "{{ queue_response.result.queue | default([], true) }}"
      - event: aurora_spotify_queue_updated
        event_data:
          names: >-
            {% set out = namespace(rows=[]) %}
            {% for item in items[:30] %}
              {% set artist = (item.artists | map(attribute='name') | join(', ')) if item.artists is defined else '' %}
              {% set out.rows = out.rows + [item.name ~ ('  -  ' ~ artist if artist else '')] %}
            {% endfor %}
            {{ out.rows }}

  aurora_spotify_refresh_favorite:
    alias: Aurora Spotify - Refresh Favorite
    sequence:
      - variables:
          current_uri: "{{ state_attr('media_player.spotifyplus_ben_walton', 'media_content_id') | default('', true) }}"
          current_id: "{{ current_uri.split(':')[-1] if current_uri.startswith('spotify:track:') else '' }}"
      - action: spotifyplus.check_track_favorites
        data:
          entity_id: media_player.spotifyplus_ben_walton
          ids: "{{ current_id }}"
        response_variable: favorite_response
        continue_on_error: true
      - variables:
          favorite_items: "{{ favorite_response.result | default([], true) }}"
          is_favorite: >-
            {% if favorite_items is mapping %}
              {% set keyed_value = favorite_items.get(current_uri, favorite_items.get(current_id)) %}
              {% if keyed_value is not none %}
                {{ keyed_value | bool }}
              {% else %}
                {{ favorite_items.get('is_favorite', favorite_items.get('is_saved', false)) | bool }}
              {% endif %}
            {% elif favorite_items is sequence and favorite_items | count > 0 %}
              {% set first = favorite_items[0] %}
              {{ first.get('is_favorite', first.get('is_saved', false)) | bool if first is mapping else first | bool }}
            {% else %}
              {{ false }}
            {% endif %}
      - event: aurora_spotify_favorite_updated
        event_data:
          is_favorite: "{{ is_favorite }}"
          track_id: "{{ current_uri }}"

  aurora_spotify_toggle_favorite:
    alias: Aurora Spotify - Toggle Favorite
    sequence:
      - variables:
          is_favorite: "{{ state_attr('sensor.aurora_spotify_favorite', 'is_favorite') | bool }}"
          current_uri: "{{ state_attr('media_player.spotifyplus_ben_walton', 'media_content_id') | default('', true) }}"
          current_id: "{{ current_uri.split(':')[-1] if current_uri.startswith('spotify:track:') else '' }}"
      - condition: template
        value_template: "{{ current_id | length > 0 }}"
      - choose:
          - conditions: "{{ is_favorite }}"
            sequence:
              - action: spotifyplus.remove_track_favorites
                data:
                  entity_id: media_player.spotifyplus_ben_walton
                  ids: "{{ current_id }}"
        default:
          - action: spotifyplus.save_track_favorites
            data:
              entity_id: media_player.spotifyplus_ben_walton
              ids: "{{ current_id }}"
      - delay:
          milliseconds: 350
      - action: script.aurora_spotify_refresh_favorite
