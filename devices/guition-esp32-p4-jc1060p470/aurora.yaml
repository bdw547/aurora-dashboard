globals:
  - id: sel_light
    type: std::string
    restore_value: false
    initial_value: '"light.living_room_main"'
  - id: light_bri
    type: std::map<std::string, int>
    restore_value: false
  - id: light_on
    type: std::map<std::string, bool>
    restore_value: false
  - id: np_pos
    type: int
    restore_value: false
    initial_value: '0'
  - id: np_dur
    type: int
    restore_value: false
    initial_value: '0'
  - id: np_playing
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: g_pl_uris
    type: std::string
    restore_value: false
  - id: g_cur_pl_uri
    type: std::string
    restore_value: false

script:
  - id: np_update
    then:
      - lvgl.bar.update:
          id: bar_progress
          value: !lambda 'return id(np_dur) > 0 ? (int)(1000.0f * id(np_pos) / id(np_dur)) : 0;'
      - lvgl.label.update:
          id: lbl_pos
          text: !lambda |-
            int v = id(np_pos); if (v < 0) v = 0;
            char b[8]; snprintf(b, sizeof(b), "%d:%02d", v / 60, v % 60); return std::string(b);
      - lvgl.label.update:
          id: lbl_rem
          text: !lambda |-
            int r = id(np_dur) - id(np_pos); if (r < 0) r = 0;
            char b[10]; snprintf(b, sizeof(b), "-%d:%02d", r / 60, r % 60); return std::string(b);

time:
  - platform: homeassistant
    id: ha_time

interval:
  - interval: 10s
    then:
      - lvgl.label.update:
          id: lbl_clock
          text: !lambda |-
            auto t = id(ha_time).now();
            if (!t.is_valid()) return std::string("--:--");
            int h = t.hour % 12; if (h == 0) h = 12;
            char c[8]; snprintf(c, sizeof(c), "%d:%02d", h, t.minute); return std::string(c);
      - lvgl.label.update:
          id: lbl_ampm
          text: !lambda |-
            auto t = id(ha_time).now();
            if (!t.is_valid()) return std::string("");
            return std::string(t.hour < 12 ? "AM" : "PM");
      - lvgl.label.update:
          id: lbl_greeting
          text: !lambda |-
            auto t = id(ha_time).now();
            if (!t.is_valid()) return std::string("Welcome home, Ben");
            const char* g = t.hour < 12 ? "Good morning" : (t.hour < 18 ? "Good afternoon" : "Good evening");
            const char* d[] = {"Sun","Mon","Tue","Wed","Thu","Fri","Sat"};
            const char* m[] = {"Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"};
            char c[56]; snprintf(c, sizeof(c), "%s, Ben \u00b7 %s %s %d", g, d[t.day_of_week-1], m[t.month-1], t.day_of_month); return std::string(c);
  - interval: 1s
    then:
      - if:
          condition:
            lambda: 'return id(np_playing) && id(np_dur) > 0 && id(np_pos) < id(np_dur);'
          then:
            - lambda: 'id(np_pos) += 1;'
            - script.execute: np_update

lvgl:
  id: main_lvgl
  displays: my_display
  rotation: 180
  byte_order: little_endian
  touchscreens:
    - touchscreen_id: my_touchscreen

  style_definitions:
    - id: st_glass
      bg_color: $c_card
      bg_opa: 92%
      border_color: $c_hair
      border_width: 1
      radius: 22
      pad_all: 20

  # Persistent left nav rail + clock on every page
