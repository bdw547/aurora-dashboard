                align: top_mid
                y: 410
                width: 64
                height: 64
                bg_color: 0x10121A
                widgets: [label: { text: "󰤨", align: center, text_font: f_icon, text_color: $c_text } ]
                on_click:
                  - lvgl.page.show: page_network
                  - lvgl.widget.update: { id: nav_home, bg_color: 0x10121A }
                  - lvgl.widget.update: { id: nav_lights, bg_color: 0x10121A }
                  - lvgl.widget.update: { id: nav_climate, bg_color: 0x10121A }
                  - lvgl.widget.update: { id: nav_media, bg_color: 0x10121A }
                  - lvgl.widget.update: { id: nav_security, bg_color: 0x10121A }
                  - lvgl.widget.update: { id: nav_network, bg_color: 0x10121A }
                  - lvgl.widget.update: { id: nav_network, bg_color: 0x2ED5B8 }
      - label:
          id: lbl_ssid
          text: "no network"
          align: bottom_right
          x: -10
          y: -26
          text_font: f_small
          text_color: 0x8A8F9E
      - label:
          id: lbl_ip
          text: "WiFi: connecting..."
          align: bottom_right
          x: -10
          y: -8
          text_font: f_small
          text_color: 0x2ED5B8

  pages:
    # ---------- HOME ----------
    - id: page_home
      bg_opa: 0
      widgets:
        - image: { src: img_aurora_bg, x: 0, y: 0 }
        - label: { text: "Good evening, Ben", x: 100, y: 28, text_font: f_title, text_color: $c_text }
        - label: { text: "Aurora · Walton Home", x: 100, y: 62, text_font: f_small, text_color: $c_text2 }
        - label: { id: lbl_ip_home, text: "WiFi: connecting...", x: 100, y: 92, text_font: f_body, text_color: 0x2ED5B8 }
        - obj:
            styles: st_glass
            x: 100
            y: 124
            width: 280
            height: 150
            widgets:
              - label: { text: "LIGHTS", x: 4, y: 0, text_font: f_small, text_color: $c_text2 }
              - label: { text: "Tap to control", x: 4, y: 26, text_font: f_body, text_color: $c_text }
