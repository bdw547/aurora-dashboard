            x: 96
            y: 70
            width: 440
            height: 360
            styles: st_glass
            widgets:
              - obj: { x: 4, y: 4, width: 120, height: 120, radius: 16, bg_color: $c_purple, border_width: 0 }
              - image: { id: lbl_np_art, src: art_image, x: 4, y: 4 }
              - label: { id: lbl_np_title, text: "Nothing playing", x: 138, y: 14, text_font: f_title, text_color: $c_text }
              - label: { id: lbl_np_artist, text: "", x: 138, y: 50, text_font: f_body, text_color: $c_text2 }
              # progress
              - label: { id: lbl_pos, text: "0:00", x: 138, y: 86, text_font: f_small, text_color: $c_text2 }
              - label: { id: lbl_rem, text: "-0:00", x: 372, y: 86, text_font: f_small, text_color: $c_text2 }
              - bar:
                  id: bar_progress
                  x: 138
                  y: 108
                  width: 286
                  height: 6
                  min_value: 0
                  max_value: 1000
                  value: 0
                  radius: 3
                  bg_color: 0x2A2F3A
                  border_width: 0
                  indicator:
                    bg_color: 0x2ED5B8
                    radius: 3
              # transport
