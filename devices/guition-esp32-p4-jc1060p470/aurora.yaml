# =============================================================================
# AURORA — standalone custom dashboard firmware for Guition JC1060P470
# =============================================================================
# Self-contained ESPHome config (stock components only): reuses the proven
# hardware bring-up (mipi_dsi JC1060P470 display, GT911 touch, ESP32-C6 hosted
# WiFi) WITHOUT espcontrol's button-grid component, and renders the custom
# Aurora UI wired to real Home Assistant entities.
# Flash first via esptool-js (browser), then OTA. secrets.yaml supplies wifi.
# =============================================================================
substitutions:
  name: "aurora-panel"
  friendly_name: "Aurora Panel"
  # Aurora palette
  c_bg: "0x08090D"
  c_card: "0x141720"
  c_hair: "0x2A2E38"
  c_text: "0xEEF0F6"
  c_text2: "0x8A8F9E"
  c_text3: "0x6E727E"
  c_teal: "0x2ED5B8"
  c_purple: "0x7B6CFF"
  c_warn: "0xFF9F6B"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  on_boot:
    # Static `rotation:` is a no-op on this DSI panel; rotate at runtime late.
    - priority: -100
      then:
        - lvgl.display.set_rotation: 0

esp32:
  variant: esp32p4
  flash_size: 16MB
  cpu_frequency: 360MHZ
  engineering_sample: true
  framework:
    type: esp-idf
    version: 5.5.2
    platform_version: 55.03.37
    advanced:
      enable_idf_experimental_features: true
      execute_from_psram: true
    # Board-specific options carried over from the proven stock firmware.
    # The ESP_HOSTED mempool/SPIRAM + stack settings are required or the C6
    # WiFi init fails ("HS_MP: mempool create failed: no mem") and boot-loops.
    sdkconfig_options:
      CONFIG_SDMMC_HOST_DEFAULT: "y"
      CONFIG_COMPILER_OPTIMIZATION_SIZE: "y"
      CONFIG_ESP_MAIN_TASK_STACK_SIZE: "8192"
      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "60"
      CONFIG_ESP_HOSTED_USE_MEMPOOL: "n"
      CONFIG_ESP_HOSTED_DFLT_TASK_FROM_SPIRAM: "y"
      CONFIG_FREERTOS_THREAD_LOCAL_STORAGE_POINTERS: "1"
      CONFIG_LOG_DEFAULT_LEVEL: "2"

psram:
  mode: hex
  speed: 200MHz

# Internal LDO powering the MIPI-DSI PHY (required by the P4 DSI display)
esp_ldo:
  - channel: 3
    id: dsi_phy_enable
    voltage: 2.5V

# ESP32-C6 hosted WiFi/BLE over SDIO
esp32_hosted:
  variant: esp32c6
  reset_pin: GPIO54
  cmd_pin: GPIO19
  clk_pin: GPIO18
  d0_pin: GPIO14
  d1_pin: GPIO15
  d2_pin: GPIO16
  d3_pin: GPIO17
  active_high: true
  sdio_frequency: 20MHz

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

api:
ota:
  - platform: esphome
logger:
  level: INFO

# --- Backlight ---
output:
  - platform: ledc
    pin: GPIO23
    id: gpio_backlight_pwm
    frequency: 1000Hz
light:
  - platform: monochromatic
    output: gpio_backlight_pwm
    name: Display Backlight
    id: display_backlight
    restore_mode: RESTORE_DEFAULT_ON
    default_transition_length: 0s

# --- I2C + GT911 touch ---
i2c:
  - id: bus_a
    sda: GPIO07
    scl: GPIO08
    frequency: 400kHz
    sda_pullup_enabled: false
    scl_pullup_enabled: false
touchscreen:
  - platform: gt911
    id: my_touchscreen
    display: my_display
    i2c_id: bus_a
    reset_pin: GPIO22
    interrupt_pin: GPIO21

# --- Display (stock mipi_dsi, built-in model) ---
display:
  - platform: mipi_dsi
    id: my_display
    model: JC1060P470
    color_order: RGB
    reset_pin:
      number: GPIO05
    update_interval: never
    auto_clear_enabled: false

# --- Assets ---
image:
  - id: img_aurora_bg
    file: ../../aurora-build/assets/aurora_bg_1024x600.png
    type: RGB565
    resize: 1024x600

font:
  - file: "gfonts://Sora@600"
    id: f_display
    size: 52
    glyphs: "0123456789%°:"
  - file: "gfonts://Sora@600"
    id: f_title
    size: 24
  - file: "gfonts://Sora@500"
    id: f_body
    size: 14
  - file: "gfonts://Sora@500"
    id: f_small
    size: 12
  # Material Design Icons (v7.4.47) — nav, transport, controls
  - file: 'https://github.com/Templarian/MaterialDesign-Webfont/raw/v7.4.47/fonts/materialdesignicons-webfont.ttf'
    id: f_icon
    size: 30
    bpp: 4
    glyphs:
      - "\U000F02DC"  # home
      - "\U000F0335"  # lightbulb
      - "\U000F0336"  # lightbulb-outline
      - "\U000F0393"  # thermostat
      - "\U000F075A"  # music
      - "\U000F068A"  # shield-home
      - "\U000F0928"  # wifi
      - "\U000F040A"  # play
      - "\U000F03E4"  # pause
      - "\U000F04AD"  # skip-next
      - "\U000F04AE"  # skip-previous
      - "\U000F057E"  # volume-high
      - "\U000F0502"  # television
      - "\U000F0143"  # chevron-up
      - "\U000F0140"  # chevron-down
      - "\U000F0141"  # chevron-left
      - "\U000F0142"  # chevron-right
      - "\U000F033E"  # lock
      - "\U000F033F"  # lock-open
      - "\U000F04B9"  # sofa

