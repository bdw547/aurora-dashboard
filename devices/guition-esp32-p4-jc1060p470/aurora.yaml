              - lvgl.widget.update: { id: btn_back_lock, bg_color: 0x161B24 }
              - lvgl.widget.update: { id: btn_back_unlock, bg_color: 0xFF9F6B }

globals:
  - id: sel_light
    type: std::string
    restore_value: false
    initial_value: '"light.living_room_main"'
  - id: light_bri
    type: std::map<std::string, int>
    restore_value: false
  - id: light_on
    type: std::map<std::string, bool>
    restore_value: false

time:
  - platform: homeassistant
    id: ha_time

interval:
  - interval: 10s
    then:
      - lvgl.label.update:
          id: lbl_clock
          text: !lambda |-
            auto t = id(ha_time).now();
            if (!t.is_valid()) return std::string("--:--");
            int h = t.hour % 12; if (h == 0) h = 12;
            char c[8]; snprintf(c, sizeof(c), "%d:%02d", h, t.minute); return std::string(c);
      - lvgl.label.update:
          id: lbl_greeting
          text: !lambda |-
            auto t = id(ha_time).now();
            if (!t.is_valid()) return std::string("Welcome home, Ben");
            const char* g = t.hour < 12 ? "Good morning" : (t.hour < 18 ? "Good afternoon" : "Good evening");
            const char* d[] = {"Sun","Mon","Tue","Wed","Thu","Fri","Sat"};
            const char* m[] = {"Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"};
            char c[56]; snprintf(c, sizeof(c), "%s, Ben \u00b7 %s %s %d", g, d[t.day_of_week-1], m[t.month-1], t.day_of_month); return std::string(c);

lvgl:
  id: main_lvgl
  displays: my_display
  rotation: 180
  byte_order: little_endian
  touchscreens:
    - touchscreen_id: my_touchscreen

  style_definitions:
    - id: st_glass
      bg_color: $c_card
      bg_opa: 92%
      border_color: $c_hair
      border_width: 1
      radius: 22
      pad_all: 20

  # Persistent left nav rail + clock on every page
  top_layer:
    widgets:
      - obj:
          x: 0
          y: 0
          width: 74
          height: 600
          bg_color: 0x10121A
          bg_opa: 78%
          border_width: 0
          radius: 0
          pad_all: 0
          widgets:
            - button:
                id: nav_home
                align: top_mid
                y: 38
                width: 58
