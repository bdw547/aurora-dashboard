<!doctype html><html><head><meta charset="utf-8">
<title>Aurora Page Builder</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css">
<style>
:root{
  --canvas:#0A0B0F; --nav:#0C0D12; --card:#14161C; --inset:#0F1117; --bd:#23262F;
  --tx:#F3F5F8; --t2:#868CA0; --t3:#5D6470; --teal:#2ED5B8; --ink:#06231D;
  --amber:#F2B84B; --blue:#4FA8F5; --red:#F2685A; --violet:#B06CFF; --onbd:#2A5048;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:#070809;color:var(--tx);font-family:'Sora',system-ui,sans-serif;font-size:14px;height:100vh;overflow:hidden}
.mono{font-family:'IBM Plex Mono',monospace}
button{font-family:inherit;cursor:pointer;border:0}
#top{height:56px;display:flex;align-items:center;gap:14px;padding:0 18px;background:#0B0C11;border-bottom:1px solid var(--bd)}
#top .brand{font-weight:800;font-size:17px;letter-spacing:-.3px}
#top .brand b{background:linear-gradient(90deg,var(--teal),var(--violet));-webkit-background-clip:text;background-clip:text;color:transparent}
#top .sp{flex:1}
#top input{background:#0F1117;border:1px solid var(--bd);border-radius:9px;color:var(--tx);padding:8px 10px;font:inherit;font-size:12px}
#top .pill{font-size:11px;color:var(--t2);display:flex;align-items:center;gap:6px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--t3)}.dot.ok{background:var(--teal)}
.btn{background:var(--teal);color:var(--ink);border-radius:9px;padding:9px 14px;font-weight:700;font-size:13px}
.btn.ghost{background:#12141b;color:var(--tx);border:1px solid var(--bd)}
.btn.amber{background:var(--amber);color:#241a05}
#app{display:flex;height:calc(100vh - 56px)}
#palette{width:248px;background:#0A0B0F;border-right:1px solid var(--bd);overflow-y:auto;padding:14px}
#center{flex:1;display:flex;flex-direction:column;align-items:center;overflow:auto;padding:18px;background:#070809}
#inspector{width:300px;background:#0A0B0F;border-left:1px solid var(--bd);overflow-y:auto;padding:16px}
h3.sec{font-size:11px;letter-spacing:1.4px;text-transform:uppercase;color:var(--t3);font-weight:600;margin:6px 0 10px}
.pcat{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--t3);margin:14px 0 6px}
.pitem{display:flex;align-items:center;gap:10px;padding:9px 10px;border:1px solid var(--bd);border-radius:10px;background:#0E0F14;margin-bottom:7px;cursor:pointer;transition:.12s}
.pitem:hover{border-color:var(--teal);background:#10141a}
.pitem .ic{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex:0 0 auto}
.pitem .nm{font-size:13px;font-weight:600}.pitem .sz{font-size:10px;color:var(--t2)}
#navbuild{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.navitem{display:flex;align-items:center;gap:7px;background:#0E0F14;border:1px solid var(--bd);border-radius:10px;padding:6px 10px;font-size:12px;cursor:pointer}
.navitem .mdi{font-size:18px;color:var(--teal)}
.navitem.locked{opacity:.7;cursor:default}
.navitem .x{color:var(--t3);font-size:14px;cursor:pointer}
.addnav{border:1px dashed var(--bd);color:var(--t2);border-radius:10px;padding:7px 11px;font-size:12px;background:transparent}
#tabs{display:flex;gap:6px;margin-bottom:10px;align-items:center;flex-wrap:wrap}
.tab{padding:6px 12px;border-radius:8px;background:#0E0F14;border:1px solid var(--bd);font-size:12px;color:var(--t2);cursor:pointer}
.tab.on{background:var(--teal);color:var(--ink);font-weight:700;border-color:var(--teal)}
.tab .x{margin-left:6px;opacity:.7}
.stagewrap{display:flex;justify-content:center}
#frame{width:1024px;height:600px;background:var(--canvas);position:relative;border-radius:18px;border:1px solid #1b1d26;
  background-image:radial-gradient(130% 100% at 88% -10%,rgba(46,213,184,.10),rgba(123,108,255,.06) 42%,transparent 70%);
  flex:0 0 auto;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.5)}
#rail{position:absolute;left:0;top:0;width:74px;height:600px;background:var(--nav);border-right:1px solid #15171e;display:flex;flex-direction:column;align-items:center;padding-top:14px;gap:12px}
#rail .ni{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--t3)}
#rail .ni.on{background:var(--teal);color:var(--ink)}
#phead{position:absolute;left:94px;top:16px;width:910px;height:66px;display:none;align-items:center;justify-content:space-between}
#phead.on{display:flex}
#phead .greet{font-size:27px;font-weight:700;letter-spacing:-.4px}
#phead .subln{font-size:13px;color:var(--t2);margin-top:3px;display:flex;align-items:center;gap:6px}
#phead .subln .teal{color:var(--teal);font-weight:600}
.chip{display:flex;align-items:center;gap:7px;background:#101218;border:1px solid var(--bd);border-radius:12px;padding:8px 13px;font-size:14px;font-weight:600}
#grid{position:absolute;left:94px;top:22px;width:910px;height:556px;display:grid;
  grid-template-columns:repeat(6,140px);grid-template-rows:repeat(5,100px);gap:14px}
.gcell{border:1px dashed #1b1e27;border-radius:12px}
.gcell.hot{border-color:var(--teal);background:rgba(46,213,184,.08)}
.gcell.bad{border-color:var(--red);background:rgba(242,104,90,.08)}
.pc{position:relative;border-radius:18px;background:var(--card);border:1px solid var(--bd);overflow:hidden;cursor:grab;display:flex;flex-direction:column;padding:14px;min-width:0}
.pc.on{background:linear-gradient(180deg,#14161C,#13201d);border-color:var(--onbd)}
.pc.sel{outline:2px solid var(--teal);outline-offset:-1px}
.pc .toprow{display:flex;align-items:center;justify-content:space-between;gap:8px}
.pc .ci{font-size:24px;flex:0 0 auto}
.pc .tg{width:50px;height:28px;border-radius:14px;background:var(--teal);position:relative;flex:0 0 auto}
.pc .tg i{position:absolute;top:3px;right:3px;width:22px;height:22px;border-radius:50%;background:var(--ink)}
.pc .tg.off{background:#2a2e38}.pc .tg.off i{left:3px;right:auto;background:var(--t3)}
.pc .ct{font-size:16px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:8px}
.pc .csub{font-size:12px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pc .big{font-size:32px;font-weight:700;color:var(--teal);letter-spacing:-.5px;margin-top:2px}
.pc .hbar{height:8px;border-radius:4px;background:#0f1117;border:1px solid var(--bd);position:relative;overflow:hidden;margin-top:auto}
.pc .hbar i{position:absolute;left:0;top:0;bottom:0;background:linear-gradient(90deg,#1a9c86,var(--teal))}
.pc .vstrip{flex:1;width:42px;align-self:center;border-radius:21px;background:#0f1117;border:1px solid var(--bd);position:relative;overflow:hidden;margin:12px 0}
.pc .vstrip i{position:absolute;left:0;right:0;bottom:0;background:linear-gradient(180deg,var(--teal),#1a9c86)}
.pc .cbadge{position:absolute;right:8px;top:8px;font-size:9px;color:var(--t3)}
.pc .row{display:flex;align-items:center;gap:8px}
.pc .seg{display:flex;gap:4px;background:#0f1117;border:1px solid var(--bd);border-radius:10px;padding:4px;margin-top:auto}
.pc .seg div{flex:1;text-align:center;font-size:11px;font-weight:600;color:var(--t2);padding:5px 0;border-radius:7px}
.pc .seg div.on{background:var(--teal);color:var(--ink)}
.pc .dial{flex:1;display:flex;align-items:center;justify-content:center;position:relative}
.pc .ring{border-radius:50%;border:6px solid #1c2330;border-top-color:var(--blue);border-right-color:var(--blue);transform:rotate(40deg)}
.pc .art{border-radius:10px;background:linear-gradient(135deg,#5468FF,#2ED5B8);flex:0 0 auto}
.pc .tbtn{width:46px;height:46px;border-radius:50%;background:#0f1117;display:flex;align-items:center;justify-content:center;color:var(--tx);font-size:21px}
.pc .tbtn.main{background:var(--teal);color:var(--ink)}
.pc .rpill{background:#0f1117;border:1px solid var(--bd);border-radius:10px;display:flex;align-items:center;justify-content:center;gap:4px;color:var(--tx);font-size:12px;font-weight:600;padding:8px 6px;min-width:0;white-space:nowrap}
/* TV remote (responsive) */
.pc .tvr{flex:1;display:flex;gap:14px;min-height:0;margin-top:6px}
.pc .tvapps{width:150px;display:flex;flex-direction:column;gap:8px;flex:0 0 auto}
.pc .tvapps-h{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1px;color:var(--t3);text-transform:uppercase}
.pc .tvapp{flex:1;border-radius:12px;background:#0f1117;border:1px solid var(--bd);display:flex;align-items:center;gap:10px;padding:0 14px;font-size:15px;font-weight:700;color:var(--tx);min-width:0}
.pc .tvapp.on{color:#fff;border:0}
.pc .tvmain{flex:1;display:flex;flex-direction:column;min-width:0}
.pc .tvhdr{display:flex;align-items:center;gap:10px}
.pc .pwr{width:46px;height:40px;border-radius:11px;background:#2a1414;display:flex;align-items:center;justify-content:center;color:var(--red);font-size:20px;flex:0 0 auto}
.pc .tvcenter{flex:1;display:flex;align-items:center;justify-content:center;gap:18px}
.pc .vcc{width:56px;align-self:center;max-height:250px;border-radius:28px;background:#0f1117;border:1px solid var(--bd);display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:16px 0;color:var(--t2);font-size:25px;flex:0 0 auto}
.pc .vcc .vcl{font-size:11px;color:var(--t3);font-weight:600}
.pc .dpad{border-radius:50%;background:#0f1117;position:relative;flex:0 0 auto;display:flex;align-items:center;justify-content:center}
.pc .dpad .ok{border-radius:50%;background:var(--teal);color:var(--ink);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px}
.pc .dpad .ar{position:absolute;color:var(--t2);font-size:30px}
.pc .dpad .ar.up{top:14px;left:50%;transform:translateX(-50%)}
.pc .dpad .ar.dn{bottom:14px;left:50%;transform:translateX(-50%)}
.pc .dpad .ar.lf{left:16px;top:50%;transform:translateY(-50%)}
.pc .dpad .ar.rt{right:16px;top:50%;transform:translateY(-50%)}
.pc .tvbar{display:flex;gap:8px;align-items:stretch;height:60px;margin-top:8px}
.pc .tvbtn{background:#0f1117;border:1px solid var(--bd);border-radius:12px;display:flex;align-items:center;justify-content:center;gap:8px;color:var(--t2);font-size:22px;padding:0 16px;flex:0 0 auto}
.pc .tvbtn.pad{background:#13201d;border-color:var(--onbd);color:var(--teal);font-size:13px;font-weight:700}
.pc .tvbtn.trans{flex:1;gap:16px}
.pc .tvov{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:#0E1524;border:2px solid var(--teal);border-radius:16px;z-index:5;text-align:center;cursor:pointer}
.pc .srcchip{background:#0f1117;border:1px solid var(--bd);border-radius:8px;padding:8px 13px;font-size:13px;color:var(--t2);white-space:nowrap}
.pc .srcchip.on{background:var(--teal);color:var(--ink);font-weight:700;border-color:var(--teal)}
.pc .vrow{background:#0f1117;border:1px solid var(--bd);border-radius:11px;display:flex;align-items:center;gap:8px;padding:9px 12px;color:var(--t2);font-size:13px;font-weight:600}
/* outlets */
.pc .opwr{width:60px;height:60px;border-radius:50%;background:linear-gradient(180deg,#14201c,#0f1714);border:1px solid var(--onbd);display:flex;align-items:center;justify-content:center;color:var(--teal);font-size:26px}
.pc .ogrid{flex:1;display:grid;gap:8px;margin-top:8px}
.pc .ocell{background:#0f1117;border:1px solid var(--bd);border-radius:10px;display:flex;align-items:center;gap:8px;padding:8px 10px;min-width:0}
.pc .osq{width:38px;height:38px;border-radius:10px;background:var(--teal);color:var(--ink);display:flex;align-items:center;justify-content:center;font-size:21px;flex:0 0 auto}
.pc .ohead{display:flex;flex-direction:column;align-items:center;gap:6px;min-width:0}
.pc .ogrid2{flex:1;display:grid;gap:10px;margin-top:10px;min-height:0}
.pc .ocell2{background:linear-gradient(180deg,#13201d,#0f1714);border:1px solid var(--onbd);border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;min-height:0;min-width:0}
.pc .ocl{font-size:12px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.pc .opb{width:48px;height:48px;border-radius:50%;background:#0f1714;border:1px solid var(--onbd);display:flex;align-items:center;justify-content:center;color:var(--teal);font-size:24px;flex:0 0 auto}
.pc .opb.on{background:rgba(46,213,184,.14)}
.pc .cambg{position:absolute;inset:0;background:linear-gradient(160deg,#1a2030,#0e1118);display:flex;align-items:center;justify-content:center;color:#2a3346;font-size:30px}
/* group / multi */
.pc .ggrid{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.pc .gslot{background:#0f1117;border:1px solid var(--bd);border-radius:10px;padding:7px 9px;display:flex;align-items:center;gap:8px;min-width:0}
.pc .gslot.empty{border-style:dashed;color:var(--t3);align-items:center;justify-content:center;font-size:18px}
.pc .gslot .mdi{font-size:18px;flex:0 0 auto}
.pc .gv{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pc .gl{font-size:10px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pc .lggrid{flex:1;display:grid;gap:6px;margin-top:10px;min-height:0}
.pc .lgbtn{background:#0f1117;border:1px solid var(--bd);border-radius:9px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--t3);min-width:0;padding:4px;overflow:hidden}
.pc .lgbtn.on{background:linear-gradient(180deg,#14161C,#13201d);border-color:var(--onbd);color:var(--amber)}
.pc .lgbtn .mdi{font-size:17px;flex:0 0 auto}
.pc .lgbtn .lgn{font-size:9px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;color:var(--tx)}
.pc .scgrid{flex:1;display:grid;gap:8px;margin-top:10px;min-height:0}
.pc .scbtn{background:#161B24;border:1px solid #2c3340;border-radius:11px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;color:var(--tx);min-width:0;padding:6px;overflow:hidden}
.pc .scbtn.empty{background:transparent;border-style:dashed;color:var(--t3)}
.pc .scbtn .mdi{font-size:20px;color:var(--teal)}
.pc .scbtn.empty .mdi{color:var(--t3)}
.pc .scn{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.pc .ddrop{margin-top:auto;background:#0f1117;border:1px solid var(--bd);border-radius:10px;padding:10px 12px;display:flex;align-items:center;justify-content:space-between;font-size:13px}
.pc .spkgrid{flex:1;display:grid;gap:7px;margin-top:10px}
.pc .spk{background:#0f1117;border:1px solid var(--bd);border-radius:10px;display:flex;align-items:center;gap:6px;padding:0 10px;font-size:12px;color:var(--t2);white-space:nowrap;overflow:hidden}
.pc .spk.on{background:var(--teal);color:var(--ink);font-weight:700;border-color:var(--teal)}
.pc .spk .mdi{font-size:15px}
.pc .spkrib{display:flex;align-items:center;gap:8px;background:#123021;border-radius:12px;padding:10px 12px;font-size:14px}
.pc .spkung{background:#10141C;border-radius:8px;padding:5px 10px;font-size:12px;color:var(--t2);display:flex;align-items:center;gap:5px;white-space:nowrap}
.pc .spkgrid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px;flex:1}
.pc .spktile{background:#10141C;border-radius:12px;padding:12px;display:flex;flex-direction:column;min-width:0}
.pc .spkjoin{background:#0F1117;border:1px solid var(--bd);border-radius:9px;padding:6px 12px;font-size:13px;color:var(--teal);font-weight:600;display:inline-flex;align-items:center;gap:5px;justify-content:center;white-space:nowrap}
.pc .orow{display:flex;align-items:center;gap:8px;background:#0f1117;border:1px solid var(--bd);border-radius:10px;padding:7px 10px;margin-top:8px}
.pc .orow .mdi{font-size:18px}
.pc .trklist{flex:1;display:flex;flex-direction:column;gap:5px;margin-top:8px;overflow:hidden}
.pc .trk{background:#0f1117;border-radius:8px;padding:6px 10px;display:flex;justify-content:space-between;gap:8px;font-size:12px}
#nextaff{position:absolute;right:30px;bottom:22px;background:#12141b;border:1px solid var(--bd);border-radius:11px;padding:8px 14px;font-size:13px;color:var(--tx);display:none;align-items:center;gap:6px;z-index:5}
.field{margin-bottom:14px}.field label{display:block;font-size:11px;color:var(--t2);margin-bottom:5px}
.field input,.field select{width:100%;background:#0F1117;border:1px solid var(--bd);border-radius:9px;color:var(--tx);padding:9px 10px;font:inherit;font-size:13px}
.szrow{display:flex;flex-wrap:wrap;gap:6px}
.szb{padding:6px 9px;border-radius:8px;background:#0E0F14;border:1px solid var(--bd);font-size:12px;color:var(--t2);cursor:pointer}
.szb.on{background:var(--teal);color:var(--ink);font-weight:700;border-color:var(--teal)}
.ipick input{width:100%;background:#0F1117;border:1px solid var(--bd);border-radius:9px;color:var(--tx);padding:8px 10px;font:inherit;font-size:13px;margin-bottom:8px}
.ipgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(42px,1fr));gap:6px;max-height:264px;overflow:auto;padding:2px}
.ipgrid .ic{display:flex;align-items:center;justify-content:center;height:42px;border-radius:8px;background:#0E0F14;border:1px solid var(--bd);color:var(--t2);cursor:pointer}
.ipgrid .ic:hover{border-color:var(--teal);color:var(--tx)}
.ipgrid .ic.on{background:var(--teal);color:var(--ink);border-color:var(--teal)}
.ipgrid .ic .mdi{font-size:21px}
.iphint{font-size:11px;color:var(--t3);margin-top:6px}
.empty{color:var(--t3);font-size:13px;line-height:1.6;padding:14px 0}
.tgl{display:flex;align-items:center;justify-content:space-between;background:#0E0F14;border:1px solid var(--bd);border-radius:10px;padding:10px 12px;margin-bottom:12px;cursor:pointer}
.tgl .sw{width:46px;height:26px;border-radius:13px;background:#2a2e38;position:relative}
.tgl .sw i{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:var(--t3)}
.tgl.on .sw{background:var(--teal)}.tgl.on .sw i{left:auto;right:3px;background:var(--ink)}
.elrow{display:flex;align-items:center;justify-content:space-between;gap:8px;background:#0E0F14;border:1px solid var(--bd);border-radius:9px;padding:7px 10px;margin-bottom:6px;font-size:12px}
.elrow .x{color:var(--red);cursor:pointer;font-size:15px}
#modal{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:50}
.mbox{width:520px;max-height:82vh;background:#101116;border:1px solid var(--bd);border-radius:16px;padding:20px;overflow:auto}
.mbox h2{font-size:18px;margin-bottom:4px}.mbox p{color:var(--t2);font-size:12px;margin-bottom:14px}
.elist{max-height:300px;overflow:auto;border:1px solid var(--bd);border-radius:10px}
.erow{padding:9px 12px;border-bottom:1px solid #15171e;cursor:pointer;font-size:13px;display:flex;justify-content:space-between;gap:10px}
.erow:hover{background:#15171e}.erow.on{background:rgba(46,213,184,.12)}
.erow .eid{color:var(--t3);font-size:11px}
.mfoot{display:flex;justify-content:flex-end;gap:10px;margin-top:16px}
#flashbox{position:fixed;right:18px;bottom:18px;width:440px;max-height:50vh;background:#0B0C11;border:1px solid var(--bd);border-radius:14px;padding:14px;display:none;z-index:40}
#flashlog{white-space:pre-wrap;font-family:'IBM Plex Mono',monospace;font-size:11px;color:#c2c7d2;max-height:32vh;overflow:auto;background:#08090c;border-radius:8px;padding:10px;margin-top:8px}
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#101116;border:1px solid var(--onbd);color:var(--teal);padding:10px 18px;border-radius:10px;font-size:13px;z-index:60;display:none}
</style></head>
<body>
<div id="top">
  <div class="brand">Aurora <b>Page Builder</b></div>

  <input id="hatok" placeholder="Long-lived token" type="password" style="width:150px">
  <input id="panip" placeholder="Panel IP  10.0.0.174" style="width:140px">
  <label id="usbWrap" title="Flash over the USB cable — bypasses the OTA boot-confirm rollback" style="display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--t2);opacity:.55"><input type="checkbox" id="usbChk" style="width:auto" disabled> <span id="usbLbl">No USB panel</span></label>
  <button class="btn ghost" id="rescanBtn" title="Re-scan for a USB-connected panel" style="padding:8px 10px"><span class="mdi mdi-refresh"></span></button>
  <button class="btn ghost" id="connect">Connect</button>
  <span class="pill"><span class="dot" id="cdot"></span><span id="cstat">not connected</span></span>
  <div class="sp"></div>
  <div id="capWrap" title="Device capacity — an estimate of how full the generated firmware is vs the panel's memory limit. Too many cards can overflow the panel's memory and stop it booting." style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--t2)">
    <span id="capTxt">Capacity</span>
    <div style="width:92px;height:8px;background:#10121a;border:1px solid var(--hair);border-radius:5px;overflow:hidden"><div id="capBar" style="height:100%;width:0%;background:var(--teal);transition:width .2s,background .2s"></div></div>
    <span id="capPct" style="min-width:30px">0%</span>
  </div>
  <button class="btn ghost" id="tplBtn">Templates</button>
  <button class="btn ghost" id="verBtn">Versions</button>
  <button class="btn ghost" id="saveBtn">Save</button>
  <button class="btn amber" id="flashBtn">Build &amp; Flash</button>
  <button class="btn ghost" id="acctBtn" title="Change access password"><span class="mdi mdi-key-variant"></span></button>
  <button class="btn ghost" id="lockBtn" title="Lock / sign out"><span class="mdi mdi-lock"></span></button>
</div>

<div id="app">
  <div id="palette"><h3 class="sec">Card palette</h3>
    <div style="font-size:12px;color:var(--t2);margin-bottom:6px">Click a card → pick entity → pick size → drop on the grid.</div>
    <div id="palContent"></div></div>

  <div id="center">
    <div id="navbuild"></div>
    <div id="tabs"></div>
    <div class="stagewrap"><div id="frame">
      <div id="rail"></div>
      <div id="phead"></div>
      <div id="grid"></div>
      <div id="nextaff"><span class="mdi mdi-chevron-right"></span> Next</div>
    </div></div>
    <div style="color:var(--t3);font-size:11px;margin-top:10px" class="mono" id="hint">6×5 grid · 1024×600 · drag a placed card to move it</div>
  </div>

  <div id="inspector"><div id="insp"></div></div>
</div>

<div id="modal"><div class="mbox" id="mbox"></div></div>
<div id="flashbox"><div style="display:flex;justify-content:space-between;align-items:center"><b style="font-size:13px">Build &amp; Flash</b><span class="mdi mdi-close" style="cursor:pointer;color:var(--t2)" onclick="document.getElementById('flashbox').style.display='none'"></span></div><div id="flashlog"></div></div>
<div class="toast" id="toast"></div>

<script>

  wx_hourly:{label:'Weather — hourly', domain:'weather', icon:'clock-time-four-outline', color:'var(--blue)', spans:[[3,1],[4,1],[6,1],[4,2],[6,2]], def:[6,1], ctrl:'wx'},
  wx_daily: {label:'Weather — forecast (H/L)', domain:'weather', icon:'calendar-week', color:'var(--blue)', spans:[[2,3],[3,3],[2,4],[3,4],[2,5],[3,5]], def:[3,3], ctrl:'wx'},
  wx_stats: {label:'Weather — stats', domain:'weather', icon:'gauge', color:'var(--teal)', spans:[[2,2],[3,2],[2,3],[3,3]], def:[3,2], ctrl:'wx'},
  person:   {label:'Presence', domain:'person', icon:'account', color:'var(--blue)', spans:[[1,1],[2,1],...V], def:[1,1], ctrl:'val'},

};
const CATS = [
  ['Lighting', ['light','switch','lightgroup','outletgroup']],
  ['Comfort', ['climate','fan','cover']],
  ['Spotify', ['spotify','spotify_playlists','spotify_tracks','spotify_speakers','volume']],
  ['Sonos', ['sonos','speakers','sonos_sources','sonos_library','sonos_fav','volume']],
  ['TV', ['tvremote']],
  ['Media', ['media','volume']],
  ['Groups', ['group','shortcuts']],
  ['Safety', ['lock','camera','alarm','binary']],
  ['Info', ['sensor','weather','person','vacuum']],
  ['Actions', ['scene','script']],
];
// --- Card styles: duplicate palette entries merged into ONE card + a style option.
// Members stay real cks in C (and in gen.py's CTRL), so existing layouts load
// unchanged; the palette lists only the first (primary) ck and the inspector's
// style dropdown swaps c.ck in place. 'songlist' (static demo) has no group —
// it is retired from the palette, superseded by the live spotify_tracks card.
const STYLE_GROUPS=[
  {label:'Light style', opts:[['light','Fill strip — drag to dim'],['light_t','Simple toggle']]},
  {label:'Sensor style', opts:[['sensor','Value'],['chart','Trend chart']]},
  {label:'Player style', opts:[['spotify','Now playing'],['spotify_art','Album art + volume strip']]},
  {label:'Playlist style', opts:[['spotify_playlists','Browse all (dropdown)'],['playlist','Single playlist button']]},
  {label:'Speakers style', opts:[['spotify_speakers','All speakers (list)'],['spotify_speaker','Single speaker tile']]},
  {label:'Volume style', opts:[['volume','Single player'],['volumes','Per-speaker list']]},
  {label:'Weather section', opts:[['weather','Full page (6×5)'],['wx_current','Current conditions'],['wx_hourly','Hourly strip'],['wx_daily','Forecast (High/Low)'],['wx_stats','Stats (wind / humidity / pressure)']]},
  {label:'Remote piece', opts:[['tvremote','Full remote'],['tv_dpad','D-pad'],['tv_transport','Transport row'],['tv_channel','Channel +/-'],['tv_volume','Volume'],['tv_sources','Sources / inputs'],['tv_trackpad','Trackpad']]},
];
const STYLE_OF={}; STYLE_GROUPS.forEach(g=>g.opts.forEach(o=>STYLE_OF[o[0]]=g));
// Palette subtext — one plain-language description per palette card (sizes live
// in the add-modal + inspector; merged cards mention their styles here).
const DESC={
  light:'Dimmable light — fill-strip slider or a simple toggle',
  switch:'On/off switch or outlet — card lights up when on',
  lightgroup:'Several lights together as a card of tiles',
  outletgroup:'Power strip — one on/off button per outlet',
  climate:'Thermostat — current temp, setpoints and mode',
  fan:'Fan on/off (works with fan or switch entities)',
  cover:'Blinds / garage — open, stop, close',
  spotify:'Now-playing + transport — classic or album-art style',
  spotify_playlists:'Playlist picker — browse-all dropdown or a one-playlist button',
  spotify_tracks:'Live song list of the picked playlist — tap to play',
  spotify_speakers:'Where to play — all speakers or a single-speaker tile',
  volume:'Volume slider — one player, or a per-speaker list',
  sonos:'Sonos now-playing with transport',
  speakers:'Link / unlink Sonos rooms + per-speaker volume',
  sonos_sources:'Buttons that start a source on a speaker',
  sonos_library:'Browse the Sonos music library',
  sonos_fav:'One-tap button that plays a Sonos favorite',
  media:'Any media player — art, transport, volume',
  tvremote:'Full remote, or just one piece (D-pad, volume, sources…)',
  group:'Live status tiles for a mix of entities',
  shortcuts:'Quick-jump buttons to pages, rooms or the camera',
  lock:'Lock / unlock with live state',
  camera:'Live camera view',
  alarm:'Alarm panel — state + arm / disarm',
  binary:'Motion / door / occupancy — lights up when active',
  sensor:'Numeric reading — plain value or a trend chart, with units + color rules',
  weather:'Forecast — the full page or compact sections',
  person:'Who is home / away',
  vacuum:'Vacuum status',
  scene:'One-tap scene button',
  script:'Runs a script or button',
};
function styleField(c){ const g=STYLE_OF[c.ck]; if(!g) return '';
  return `<div class="field"><label>${g.label}</label><select id="fCkStyle">${g.opts.map(o=>`<option value="${o[0]}" ${c.ck===o[0]?'selected':''}>${o[1]}</option>`).join('')}</select></div>`; }
function wireStyle(el,c){ const s=el.querySelector('#fCkStyle'); if(s) s.onchange=(e)=>switchStyle(c,e.target.value); }
function switchStyle(c,ck){ if(c.ck===ck) return; const prev=c.ck, d=C[ck]; c.ck=ck;
  // carry the entity across the single<->multi divide so nothing gets lost
  if(d.multi && !(c.entities&&c.entities.length) && c.entity) c.entities=[c.entity];
  if(!d.multi && !c.entity && c.entities && c.entities.length) c.entity=c.entities[0];
  if(!d.spans.some(s=>s[0]===c.w&&s[1]===c.h)){ const [w,h]=d.def;
    if(fits(c.x,c.y,w,h,c.id)){ c.w=w; c.h=h; }
    else { const f=firstFit(w,h); if(f){ c.x=f[0]; c.y=f[1]; c.w=w; c.h=h; toast('Moved to fit the new style'); }
           else { c.ck=prev; toast('No room for that style’s size — clear space first'); renderInspector(); return; } } }
  renderGrid(); renderInspector(); }
const GICON={light:['lightbulb','var(--amber)'],switch:['toggle-switch','var(--teal)'],lock:['lock','var(--teal)'],binary_sensor:['motion-sensor','var(--blue)'],sensor:['thermometer','var(--red)'],cover:['blinds-horizontal','var(--blue)'],fan:['fan','var(--teal)'],person:['account','var(--blue)'],climate:['thermostat','var(--amber)'],media_player:['speaker','var(--teal)']};
const GVAL={light:'On',switch:'On',lock:'Locked',binary_sensor:'Clear',sensor:'72°',cover:'Open',fan:'Med',person:'Home',climate:'72°',media_player:'Idle'};
const NAV_ICONS = ['home-variant','sofa','lightbulb','thermostat','music','shield-home','wifi','cog','blinds','camera','weather-partly-cloudy','speaker','bed','silverware-fork-knife','desk','tree','door','stairs','garage','television','remote-tv','playlist-music'];
// --- comprehensive icon library: the full ~7,400 Material Design Icons ---
// Lazy-loaded once from /api/icons (the same dataset gen.py embeds on the device).
let MDI_ICONS=null, MDI_LOADING=null;
function loadIcons(){
  if(MDI_ICONS) return Promise.resolve(MDI_ICONS);
  if(MDI_LOADING) return MDI_LOADING;
  MDI_LOADING=fetch('/api/icons').then(r=>r.json()).then(d=>{MDI_ICONS=d.icons||[];return MDI_ICONS;})
    .catch(()=>{MDI_ICONS=NAV_ICONS.map(n=>({n,c:'',k:''}));return MDI_ICONS;});
  return MDI_LOADING;
}
const ICON_CAP=300;  // cap rendered tiles per search so the grid stays snappy
// Mount a searchable icon picker into `host`; calls onPick(name) on selection.
function mountIconPicker(host, current, onPick){
  host.className='ipick';
  host.innerHTML='<input type="text" placeholder="Search 7,000+ icons… (lamp, fan, lock…)" spellcheck="false"><div class="ipgrid"></div><div class="iphint"></div>';
  const inp=host.querySelector('input'), grid=host.querySelector('.ipgrid'), hint=host.querySelector('.iphint');
  let sel=current;
  function tiles(names, note){
    grid.innerHTML='';
    names.forEach(name=>{ const d=document.createElement('div'); d.className='ic'+(name===sel?' on':''); d.title=name;
      d.innerHTML=`<span class="mdi mdi-${name}"></span>`;
      d.onclick=()=>{ sel=name; onPick(name); grid.querySelectorAll('.ic.on').forEach(x=>x.classList.remove('on')); d.classList.add('on'); };
      grid.appendChild(d); });
    hint.textContent=note||'';
  }
  const suggested=()=>tiles([...new Set([sel,...NAV_ICONS])].filter(Boolean),'Suggested — type to search all icons');
  suggested();
  let deb;
  inp.oninput=()=>{ clearTimeout(deb); deb=setTimeout(()=>{
    const q=inp.value.trim().toLowerCase();
    if(!q){ suggested(); return; }
    loadIcons().then(all=>{
      const hits=[]; for(const it of all){ if(it.n.indexOf(q)>=0||it.k.indexOf(q)>=0){ hits.push(it.n); if(hits.length>ICON_CAP) break; } }
      const capped=hits.length>ICON_CAP;
      tiles(hits.slice(0,ICON_CAP), capped?`Showing first ${ICON_CAP} — refine your search`:(hits.length?`${hits.length} match${hits.length===1?'':'es'}`:'No icons match'));
    });
  },120); };
  loadIcons();  // warm the cache while the user reads the modal
}

// --- sensor types + threshold coloring (mirrors gen.py SENSOR_TYPES) ---
const SENSOR_TYPE_OPTS=[['','Auto (from HA)'],['temperature','Temperature (°)'],['humidity','Humidity (%)'],
  ['battery','Battery (%)'],['percentage','Percentage / CPU (%)'],['power','Power (W)'],['energy','Energy (kWh)'],
  ['illuminance','Illuminance (lx)'],['pressure','Pressure (hPa)'],['voltage','Voltage (V)'],['current','Current (A)'],
  ['co2','CO₂ (ppm)'],['speed','Speed'],['generic','Generic (number)']];
const SWITCH_TYPE_OPTS=[['','Switch (default)'],['outlet','Outlet'],['light','Light-style'],['fan','Fan'],['generic','Generic']];
const ICON_CARDS=new Set(['light','light_t','switch','sensor','chart','binary','person','vacuum','alarm','fan','cover']);
const RULE_COLORS=['0xF2685A','0xF2B84B','0x2ED5B8','0x4FA8F5','0x8FA6FF','0xB06CFF','0x868CA0'];
function hexToInput(h){ return '#'+(h||'0x000000').replace(/^0x/i,'').padStart(6,'0').slice(0,6); }
function inputToHex(v){ return '0x'+(v||'#000000').replace(/^#/,'').toUpperCase(); }
const STYPE_INFER=[['temperature',/temp|°/],['humidity',/humid/],['battery',/batt/],['power',/power|watt/],
  ['energy',/energy|kwh/],['illuminance',/illum|lux|\blx\b/],['pressure',/press/],['co2',/co2/],
  ['voltage',/volt/],['current',/current|ampere/],['percentage',/cpu|memory|\bmem\b|load|%|percent/]];
function inferStype(e){ const k=((e.dc||'')+' '+(e.unit||'')+' '+(e.name||'')+' '+(e.entity_id||'')).toLowerCase();
  for(const [t,re] of STYPE_INFER){ if(re.test(k)) return t; } return ''; }
function applyEntityMeta(c,eid){ const e=ENTS.find(x=>x.entity_id===eid); if(!e) return;
  c.device_class=e.dc||''; c.unit=e.unit||'';
  if((c.ck==='sensor'||c.ck==='chart')&&!c.stype){ const s=inferStype(e); if(s) c.stype=s; } }
function renderRules(c,box){ box.innerHTML=''; (c.rules||[]).forEach((r,i)=>{ const row=document.createElement('div');
  row.style.cssText='display:flex;gap:5px;align-items:center;margin-bottom:5px';

// capacity of a multi-entity card at its current span
function cap(c){ const k=c.ck;
  if(k==='group') return c.h*2;                       // 2 per grid-row
  if(k==='lightgroup') return c.w*Math.max(2,c.h-1);  // W cols × (H-1) rows, min 2 rows
  if(k==='shortcuts') return c.w*c.h;                 // one nav button per grid cell
  if(k==='outletgroup') return Math.max(c.w,c.h);   // 1x1=1, 1x2/2x1=2, 1x3/3x1=3
  if(k==='volumes') return Math.max(2,c.h);           // one speaker volume row per grid-row
  if(k==='speakers') return c.w>=4?8:Math.max(2,c.h+1);   // multi-room speaker list/grid
  if(k==='sonos_sources'||k==='tv_sources'){ if(c.w===1) return 99;   // dropdown (1x1/1x2/1x3)
    if(c.h===1) return c.w;                                   // single row: 2x1=2, 3x1=3
    if((c.w===2&&c.h===3)||(c.w===3&&c.h===2)) return 4;
    if(c.w===3&&c.h===3) return 6; if(c.w===5&&c.h===4) return 10;
    return Math.max(4,Math.floor(c.w*c.h/2)); }
  return 1; }

function curCards(){ return L.pages[curPage].subpages[curSub]; }
function occupancy(except){ const g=Array.from({length:ROWS},()=>Array(COLS).fill(false));
  for(const c of curCards()){ if(c.id===except) continue; for(let y=c.y-1;y<c.y-1+c.h;y++) for(let x=c.x-1;x<c.x-1+c.w;x++) if(g[y]&&g[y][x]!==undefined) g[y][x]=true; } return g; }
function fits(x,y,w,h,except){ if(x<1||y<1||x+w-1>COLS||y+h-1>ROWS) return false; const g=occupancy(except);
  for(let yy=y-1;yy<y-1+h;yy++) for(let xx=x-1;xx<x-1+w;xx++) if(g[yy][xx]) return false; return true; }
function firstFit(w,h){ for(let y=1;y<=ROWS-h+1;y++) for(let x=1;x<=COLS-w+1;x++) if(fits(x,y,w,h,null)) return [x,y]; return null; }

// ---- Device capacity meter ----
// Weighted "load score" ~ how big the generated setup() gets. Heavy cards pre-build
// many widgets/rows. Calibrated so Ben's known-good 116-card layout (score ~324,
// boots fine on the 32KB loopTask stack) sits at ~54%. Exceeding ~100% risks a
// boot-loop stack overflow — warn well before that. It's an ESTIMATE, not exact.
const LOAD_W={ tvremote:8, chart:6, speakers:5,
  songlist:4, sonos_library:4, shortcuts:4, volumes:4, group:4, lightgroup:4,
  media:3, spotify:3, sonos:3, camera:7, climate:2, weather:2, cover:2, outletgroup:2,
  spotify_playlists:2, playlist:2, sonos_fav:2, volume:2, tv_dpad:2, tv_transport:2,
  tv_channel:2, tv_volume:2, tv_trackpad:2, tv_sources:2, sonos_sources:2 };
// Cards whose pre-built row count is a per-card 'rows' option. per = load per row,
// set so the default count matches the old fixed weight (tracks 50->8, speakers 14->5),
// so the meter's calibration is unchanged at defaults but drops as you trim rows.
const ROW_CFG={ spotify_tracks:{def:50,max:50,per:0.16}, spotify_speakers:{def:14,max:24,per:0.357} };
const LOAD_DEFAULT=1, LOAD_BUDGET=600, LOAD_WARN=0.75, LOAD_DANGER=0.90;
function cardRows(c){ const cf=ROW_CFG[c.ck]; if(!cf) return null; let v=parseInt(c.rows,10); if(isNaN(v)) v=cf.def; return Math.max(4,Math.min(cf.max,v)); }
function layoutLoad(){ let s=0; if(!L||!L.pages) return 0;
  for(const k in L.pages){ for(const sp of (L.pages[k].subpages||[])){ for(const c of sp){
    const cf=ROW_CFG[c.ck];
    if(cf){ s+=cardRows(c)*cf.per; }
    else { s+=LOAD_W[c.ck]||LOAD_DEFAULT; s+=0.3*((c.entities&&c.entities.length)||0); } } } }
  return s; }
function capacityPct(){ return layoutLoad()/LOAD_BUDGET; }
function renderCapacity(){ const bar=document.getElementById('capBar'); if(!bar) return;
  const f=capacityPct(), pct=Math.round(f*100);
  const col=f>=LOAD_DANGER?'var(--red)':(f>=LOAD_WARN?'#E6A700':'var(--teal)');
  bar.style.width=Math.min(100,pct)+'%'; bar.style.background=col;
  const lbl=document.getElementById('capPct'); lbl.textContent=pct+'%'; lbl.style.color=col;
  const txt=document.getElementById('capTxt'); txt.textContent=f>=LOAD_DANGER?'⚠ Capacity':'Capacity'; txt.style.color=f>=LOAD_WARN?col:'var(--t2)';
  document.getElementById('capWrap').title = f>=LOAD_DANGER
      ? 'DANGER ('+pct+'%): this layout is at/over the panel memory limit and may fail to boot (stack overflow / boot-loop). Remove some cards or pages before flashing.'
    : f>=LOAD_WARN ? 'Getting large ('+pct+'%): approaching the panel memory limit. Still OK to flash, but avoid adding many more heavy cards (media, TV remote, track/speaker lists).'
    : 'Device capacity ('+pct+'%): estimated fullness of the generated firmware vs the panel memory limit.'; }
function renderAll(){ ROWS=rowsFor(); renderNav(); renderTabs(); renderRail(); renderHeader(); renderGrid(); renderInspector(); renderCapacity(); }

function attachDrag(el,c){ el.addEventListener('pointerdown',(e)=>{ if(e.target.closest('button')) return;
  sel=c.id; renderInspector(); markSel(); const grid=document.getElementById('grid');
  el.setPointerCapture(e.pointerId); el.style.cursor='grabbing'; el.style.zIndex=20; el.style.opacity=.85;
  const move=(ev)=>{ const r=grid.getBoundingClientRect(); const colW=r.width/COLS, rowH=r.height/ROWS;
    let nx=Math.round((ev.clientX-r.left-(colW*c.w/2))/colW)+1; nx=Math.max(1,Math.min(COLS-c.w+1,nx));
    let ny=Math.round((ev.clientY-r.top-(rowH*c.h/2))/rowH)+1; ny=Math.max(1,Math.min(ROWS-c.h+1,ny));
    if((nx!==c.x||ny!==c.y)&&fits(nx,ny,c.w,c.h,c.id)){ c.x=nx;c.y=ny; el.style.gridColumn=`${c.x} / span ${c.w}`; el.style.gridRow=`${c.y} / span ${c.h}`; } };
  const up=(ev)=>{ el.releasePointerCapture(ev.pointerId); el.style.cursor='grab'; el.style.zIndex=''; el.style.opacity=''; el.removeEventListener('pointermove',move); el.removeEventListener('pointerup',up); };
  el.addEventListener('pointermove',move); el.addEventListener('pointerup',up); }); }

function enterPlacing(ck,entity,name,w,h){ placing={ck}; sel=null;
  document.getElementById('hint').textContent='Click a grid cell to drop the '+w+'×'+h+' card · Esc to cancel';
  const grid=document.getElementById('grid');
  const onMove=(ev)=>{ const r=grid.getBoundingClientRect(); const colW=r.width/COLS,rowH=r.height/ROWS;
    let x=Math.floor((ev.clientX-r.left)/colW)+1, y=Math.floor((ev.clientY-r.top)/rowH)+1; x=Math.max(1,Math.min(COLS-w+1,x)); y=Math.max(1,Math.min(ROWS-h+1,y));
    grid.querySelectorAll('.gcell').forEach((cell,i)=>{ const cx=(i%COLS)+1,cy=Math.floor(i/COLS)+1; const inside=cx>=x&&cx<x+w&&cy>=y&&cy<y+h;
      cell.classList.toggle('hot',inside&&fits(x,y,w,h,null)); cell.classList.toggle('bad',inside&&!fits(x,y,w,h,null)); }); grid._drop=[x,y]; };
  const onClick=()=>{ if(!grid._drop) return; const[x,y]=grid._drop; if(fits(x,y,w,h,null)){ const card=mk(ck,entity,name,x,y,w,h); curCards().push(card); sel=card.id; cleanup(); renderAll(); } else toast('Doesn’t fit there'); };
  const onKey=(e)=>{ if(e.key==='Escape') cleanup(); };
  const cleanup=()=>{ placing=null; grid.removeEventListener('pointermove',onMove); grid.removeEventListener('click',onClick); document.removeEventListener('keydown',onKey);
    grid.querySelectorAll('.gcell').forEach(c=>c.classList.remove('hot','bad')); document.getElementById('hint').textContent='6×'+ROWS+' grid · 1024×600 · drag a placed card to move it'; };
  grid.addEventListener('pointermove',onMove); grid.addEventListener('click',onClick); document.addEventListener('keydown',onKey); }

  mbox.innerHTML=`<h2>Start from a template</h2><p>Pick a starting layout. This replaces the current layout.</p><div id="tpls"></div><div class="mfoot"><button class="btn ghost" id="mCancel">Cancel</button></div>`;
  const t=mbox.querySelector('#tpls'); Object.keys(TEMPLATES).forEach(name=>{ const d=document.createElement('div'); d.className='pitem'; d.style.marginBottom='8px';
    d.innerHTML=`<div class="ic" style="background:#0f1117;color:var(--teal)"><span class="mdi mdi-view-dashboard-variant"></span></div><div><div class="nm">${name}</div></div>`;
    d.onclick=()=>{ curPageInit=null; L=TEMPLATES[name](); curPage=curPageInit||Object.keys(L.pages)[0]; curSub=0; sel=null; closeModal(); renderAll(); toast('Loaded template'); }; t.appendChild(d); });
  document.getElementById('modal').style.display='flex'; mbox.querySelector('#mCancel').onclick=closeModal; }

// Normalize a page object (from a restored version or an applied template) so it
// has the fields the renderer expects — mirrors boot()'s per-page fixups.
function normPage(p){ if(typeof p.header!=='object'||p.header===null) p.header=defHeader(p.header===true);
  if(!Array.isArray(p.header.right)) p.header.right=['weather_current','secured']; if(!p.header.left) p.header.left='greeting';
  if(!Array.isArray(p.subpages)||!p.subpages.length) p.subpages=[[]];
  p.subpages.forEach(sp=>sp.forEach(c=>{ if(C[c.ck]&&C[c.ck].multi&&!c.entities)c.entities=[]; if(c.ck==='shortcuts'&&!c.shortcuts)c.shortcuts=[]; }));
  if(!p.title) p.title='Page'; return p; }

// Insert an applied page template as a NEW page (+ nav item if there's room).
function insertPageTemplate(page,name){ const pg=normPage(JSON.parse(JSON.stringify(page)));
  const b=(pg.title||name||'page').toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,'')||'page';
  let key=b, i=2; while(L.pages[key]){ key=b+'_'+i; i++; }
  L.pages[key]=pg;
  if(L.nav.length<7){ L.nav.push({id:uid(),icon:'view-dashboard-variant',label:pg.title||name,page:key}); toast('Inserted “'+name+'” as a new page ✓'); }
  else{ toast('Page added — nav is full (7), wire it up manually'); }
  curPage=key; curSub=0; sel=null; closeModal(); renderAll(); }

async function versionsModal(){ const mbox=document.getElementById('mbox');
  const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const pt=(L.pages[curPage]&&L.pages[curPage].title)||curPage;
  mbox.innerHTML=`<h2>Versions &amp; page templates</h2>
    <h3 class="sec">Dashboard versions</h3>
    <p class="muted" style="margin:2px 0 8px;font-size:12px">Snapshot the whole dashboard so you can revert to it later.</p>
    <div style="display:flex;gap:6px"><input id="verName" placeholder="Name this version (e.g. before-redesign)" style="flex:1"><button class="btn" id="verSave">Save current</button></div>
    <div id="verList" style="margin:10px 0 4px;max-height:200px;overflow:auto"></div>
    <h3 class="sec" style="margin-top:16px">Page templates</h3>
    <p class="muted" style="margin:2px 0 8px;font-size:12px">Save a page's buildout to reuse on other pages or dashboards.</p>
    <div style="display:flex;gap:6px"><input id="tplName" placeholder="Name this page template" style="flex:1"><button class="btn" id="tplSave">Save “${esc(pt)}”</button></div>
    <div id="tplList" style="margin:10px 0 4px;max-height:200px;overflow:auto"></div>
    <div class="mfoot"><button class="btn ghost" id="mCancel">Close</button></div>`;
  document.getElementById('modal').style.display='flex'; mbox.querySelector('#mCancel').onclick=closeModal;
  const P={method:'POST',headers:{'Content-Type':'application/json'}};
  const post=(u,o)=>j(u,{...P,body:JSON.stringify(o)});
  const row=(it,btns)=>{ const d=document.createElement('div'); d.className='pitem'; d.style.marginBottom='6px';
    d.innerHTML=`<div style="flex:1;min-width:0"><div class="nm" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(it.name)}</div><div class="muted" style="font-size:11px">${esc(it.created||'')}</div></div><div style="display:flex;gap:6px;flex:none"></div>`;
    const bar=d.querySelector('div:last-child'); btns.forEach(([lbl,cls,fn])=>{ const b=document.createElement('button'); b.className=cls; b.style.padding='7px 10px'; b.innerHTML=lbl; b.onclick=fn; bar.appendChild(b); }); return d; };
  async function refreshVer(){ const el=mbox.querySelector('#verList'); let items=[]; try{items=(await j('/api/versions')).items||[];}catch(e){}
    el.innerHTML=''; if(!items.length){ el.innerHTML='<div class="muted" style="font-size:12px">No saved versions yet.</div>'; return; }
    items.forEach(it=>el.appendChild(row(it,[
      ['Restore','btn',async()=>{ if(!confirm('Restore “'+it.name+'”? This replaces the current dashboard.'))return; const r=await post('/api/versions/restore',{id:it.id}); L=r.layout; Object.values(L.pages).forEach(normPage); curPage=L.nav[0]?L.nav[0].page:Object.keys(L.pages)[0]; curSub=0; sel=null; closeModal(); renderAll(); toast('Restored “'+it.name+'” ✓'); }],
      ['<span class="mdi mdi-pencil"></span>','btn ghost',async()=>{ const n=prompt('Rename version',it.name); if(n){ await post('/api/versions/rename',{id:it.id,name:n}); refreshVer(); } }],
      ['<span class="mdi mdi-close"></span>','btn ghost',async()=>{ if(!confirm('Delete version “'+it.name+'”?'))return; await post('/api/versions/delete',{id:it.id}); refreshVer(); }] ]))); }
  async function refreshTpl(){ const el=mbox.querySelector('#tplList'); let items=[]; try{items=(await j('/api/page-templates')).items||[];}catch(e){}
    el.innerHTML=''; if(!items.length){ el.innerHTML='<div class="muted" style="font-size:12px">No page templates yet.</div>'; return; }
    items.forEach(it=>el.appendChild(row(it,[
      ['New page','btn',async()=>{ const r=await post('/api/page-templates/apply',{id:it.id}); insertPageTemplate(r.page,r.name); }],
      ['Replace','btn ghost',async()=>{ if(!confirm('Replace the current page (“'+((L.pages[curPage]&&L.pages[curPage].title)||curPage)+'”) with “'+it.name+'”?'))return; const r=await post('/api/page-templates/apply',{id:it.id}); const pg=normPage(JSON.parse(JSON.stringify(r.page))); pg.title=L.pages[curPage].title; L.pages[curPage]=pg; curSub=0; sel=null; closeModal(); renderAll(); toast('Applied “'+it.name+'” ✓'); }],
      ['<span class="mdi mdi-pencil"></span>','btn ghost',async()=>{ const n=prompt('Rename template',it.name); if(n){ await post('/api/page-templates/rename',{id:it.id,name:n}); refreshTpl(); } }],
      ['<span class="mdi mdi-close"></span>','btn ghost',async()=>{ if(!confirm('Delete template “'+it.name+'”?'))return; await post('/api/page-templates/delete',{id:it.id}); refreshTpl(); }] ]))); }
  mbox.querySelector('#verSave').onclick=async()=>{ await post('/api/versions/save',{name:mbox.querySelector('#verName').value,layout:L}); mbox.querySelector('#verName').value=''; refreshVer(); toast('Version saved ✓'); };
  mbox.querySelector('#tplSave').onclick=async()=>{ await post('/api/page-templates/save',{name:mbox.querySelector('#tplName').value,page:L.pages[curPage]}); mbox.querySelector('#tplName').value=''; refreshTpl(); toast('Page template saved ✓'); };
  refreshVer(); refreshTpl(); }

async function logout(){ try{ await j('/api/logout',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'}); }catch(e){} location.reload(); }
function accountModal(){ const mbox=document.getElementById('mbox');
  mbox.innerHTML=`<h2>Change access password</h2><p>This password gates the whole configurator. Default is “Admin”.</p>
    <div class="field"><label>Current password</label><input id="pwCur" type="password"></div>
    <div class="field"><label>New password</label><input id="pwNew" type="password"></div>
    <div class="mfoot"><button class="btn ghost" id="mCancel">Cancel</button><button class="btn" id="mOk">Change</button></div>`;
  document.getElementById('modal').style.display='flex'; mbox.querySelector('#mCancel').onclick=closeModal;
  mbox.querySelector('#mOk').onclick=async()=>{ try{ await j('/api/change-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({current:mbox.querySelector('#pwCur').value,new:mbox.querySelector('#pwNew').value})}); closeModal(); toast('Password changed ✓'); }catch(e){ toast(e.message); } }; }
async function connect(){ const url=document.getElementById('haurl').value.trim(), tok=document.getElementById('hatok').value.trim(), ip=document.getElementById('panip').value.trim();
  document.getElementById('cstat').textContent='saving…';
  try{ const r=await j('/api/config',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ha_url:url,panel_ip:ip,ha_token:tok})});
    document.getElementById('hatok').value=''; document.getElementById('hatok').placeholder=r.has_token?'•••• saved (blank = keep)':'Long-lived token'; }catch(e){}
  document.getElementById('cstat').textContent='connecting…';
  try{ ENTS=await j('/api/entities',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});
    try{ AREAS=(await j('/api/ha/areas',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'}))||{}; }catch(e){ AREAS={}; }
    document.getElementById('cdot').className='dot ok'; document.getElementById('cstat').textContent=ENTS.length+' entities · '+Object.keys(AREAS).length+' areas';
    renderPalette(); renderInspector(); toast('Connected to Home Assistant');
  }catch(e){ document.getElementById('cdot').className='dot'; document.getElementById('cstat').textContent='not connected'; toast('Connect failed: '+e.message); } }
async function save(){ try{ await j('/api/layout',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(L)}); toast('Layout saved ✓'); }catch(e){ toast('Save failed: '+e.message); } }
let SERIAL_DEV='';
// Re-check for a USB-attached panel and update the serial control live (no page
// reload). The option is always visible: enabled when /dev/ttyACM* is present,
// otherwise disabled with a hint (the panel isn't attached to WSL — usbipd).
async function scanSerial(){ const chk=document.getElementById('usbChk'), lbl=document.getElementById('usbLbl'), wrap=document.getElementById('usbWrap');
  const wasNone=chk.disabled; let fd={}; try{ fd=await j('/api/flash-devices'); }catch(e){}
  const has=!!(fd.serial&&fd.serial.length); SERIAL_DEV=has?fd.serial[0]:'';
  chk.disabled=!has; if(!has){ chk.checked=false; } else if(wasNone){ chk.checked=true; }
  lbl.textContent=has?('USB ('+SERIAL_DEV.replace('/dev/','')+')'):'No USB panel';
  wrap.style.opacity=has?'1':'.55'; return has; }
async function flash(){
  const f=capacityPct();
  if(f>=LOAD_DANGER && !confirm('This layout is at '+Math.round(f*100)+'% of the estimated panel memory capacity. It may fail to boot (stack overflow / boot-loop). Remove some cards or pages first, or flash anyway?')) return;
  await save();
  const useSerial=SERIAL_DEV && document.getElementById('usbChk').checked;
  const device=useSerial?SERIAL_DEV:document.getElementById('panip').value.trim();
  if(!device){ toast('Enter the panel IP, or plug in USB for serial'); return; }
  document.getElementById('flashbox').style.display='block'; const log=document.getElementById('flashlog');
  log.textContent='Starting '+(useSerial?('serial flash via '+device):('OTA to '+device))+'…';
  try{ await j('/api/flash',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({device})});
    const t=setInterval(async()=>{ const s=await j('/api/flash-status'); log.textContent=s.log||''; log.scrollTop=log.scrollHeight; if(s.done){clearInterval(t); toast(s.ok?'Flash complete ✓':'Flash did not confirm');} },1200);
  }catch(e){ log.textContent='Error: '+e.message; } }

async function boot(){ try{ L=await j('/api/layout'); if(!L||!L.pages||!Object.keys(L.pages).length) L=defaultLayout(); }catch(e){ L=defaultLayout(); }
  Object.values(L.pages).forEach(p=>{ if(typeof p.header!=='object'||p.header===null) p.header=defHeader(p.header===true);
    if(!Array.isArray(p.header.right)) p.header.right=['weather_current','secured']; if(!p.header.left) p.header.left='greeting';
    p.subpages.forEach(sp=>sp.forEach(c=>{ if(C[c.ck]&&C[c.ck].multi&&!c.entities)c.entities=[]; if(c.ck==='shortcuts'&&!c.shortcuts)c.shortcuts=[]; })); });
  curPage=L.nav[0]?L.nav[0].page:Object.keys(L.pages)[0]; curSub=0;
  let cfg={}; try{ cfg=await j('/api/config'); }catch(e){ cfg={}; }
  document.getElementById('haurl').value=cfg.ha_url||'';
  document.getElementById('panip').value=cfg.panel_ip||'';
  document.getElementById('hatok').placeholder=cfg.has_token?'•••• saved (blank = keep)':'Long-lived token';
  scanSerial();
  renderPalette(); renderAll();
  document.getElementById('connect').onclick=connect; document.getElementById('saveBtn').onclick=save;
  document.getElementById('flashBtn').onclick=flash; document.getElementById('tplBtn').onclick=openTemplates;
  document.getElementById('lockBtn').onclick=logout; document.getElementById('acctBtn').onclick=accountModal;
  document.getElementById('verBtn').onclick=versionsModal;
  document.getElementById('rescanBtn').onclick=async()=>{ const has=await scanSerial(); toast(has?('USB panel found: '+SERIAL_DEV.replace('/dev/','')):'No USB panel — plug it in, then run on Windows:  usbipd attach --wsl --busid <id>'); };
  document.getElementById('grid').addEventListener('click',(e)=>{ if(e.target.classList.contains('gcell')&&!placing){ sel=null; renderInspector(); markSel(); }});
  if(cfg.has_token||cfg.ha_url) connect();
}
boot();
</script>
