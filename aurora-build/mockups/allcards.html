<!doctype html><html><head><meta charset=utf-8>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css" rel="stylesheet">
<style>
html,body{margin:0;padding:0;background:#000}
.aufr{position:relative;width:1024px;height:600px;background:#08090d;background-image:radial-gradient(120% 90% at 85% 0%,rgba(46,213,184,.10),rgba(123,108,255,.07) 40%,transparent 70%);font-family:'Sora',system-ui,sans-serif;color:#EEF0F6;overflow:hidden}
.nav{position:absolute;left:8px;width:58px;height:58px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:30px;color:#EEF0F6}
.card{position:absolute;top:96px;width:120px;height:440px;background:#141720;border:1px solid #2A2E38;border-radius:22px}
.mdi{font-family:'Material Design Icons';font-style:normal;line-height:1}
.lbl{position:absolute;white-space:nowrap}
.title{left:0;width:120px;text-align:center;top:78px;font-size:14px;font-weight:600}
.ico{left:50%;transform:translateX(-50%);top:24px;font-size:38px}
.track{position:absolute;left:42px;top:118px;width:36px;height:230px;border-radius:18px;background:#161B24;overflow:hidden}
.fill{position:absolute;bottom:0;width:36px;background:linear-gradient(0deg,#2ED5B8,#7BE8D6)}
.tag{position:absolute;left:0;width:120px;text-align:center;font-weight:600}
</style></head><body>
<div class="aufr">
  <div style="position:absolute;left:0;top:0;width:74px;height:600px;background:#10121A;opacity:.96"></div>
  <div class="nav mdi mdi-home" style="top:22px"></div>
  <div class="nav mdi mdi-sofa" style="top:92px;background:#2ED5B8;color:#08090D"></div>
  <div class="nav mdi mdi-lightbulb" style="top:162px"></div>
  <div class="nav mdi mdi-thermostat" style="top:232px"></div>
  <div class="nav mdi mdi-music" style="top:302px"></div>
  <div class="nav mdi mdi-shield-home" style="top:372px"></div>
  <div class="nav mdi mdi-wifi" style="top:442px"></div>
  <div class="nav mdi mdi-cog" style="top:512px"></div>
  <div class="lbl" style="left:100px;top:26px;font-size:24px;font-weight:600">All Card Types</div>
  <div class="lbl" style="left:100px;top:60px;font-size:12px;color:#8A8F9E">light &middot; fan &middot; switch &middot; sensor &middot; lock &middot; climate &middot; media &middot; cover</div>

  <!-- light -->
  <div class="card" style="left:100px"><span class="mdi mdi-lightbulb ico lbl" style="color:#FFCE54"></span><span class="lbl title">Light</span><div class="track"></div><div class="fill" style="left:42px;top:118px;height:170px"></div><span class="lbl tag" style="top:360px;font-size:24px">74%</span></div>
  <!-- fan -->
  <div class="card" style="left:230px"><span class="mdi mdi-fan ico lbl" style="color:#2ED5B8"></span><span class="lbl title">Fan</span><div class="track"></div><div class="fill" style="left:42px;top:118px;height:115px"></div><span class="lbl tag" style="top:360px;font-size:22px">Med</span></div>
  <!-- switch -->
  <div class="card" style="left:360px"><span class="mdi mdi-toggle-switch ico lbl" style="color:#2ED5B8"></span><span class="lbl title">Switch</span><div style="position:absolute;left:30px;top:150px;width:60px;height:120px;border-radius:30px;background:#2ED5B8"></div><div style="position:absolute;left:38px;top:200px;width:44px;height:44px;border-radius:22px;background:#08090D"></div><span class="lbl tag" style="top:360px;font-size:22px;color:#2ED5B8">On</span></div>
  <!-- sensor -->
  <div class="card" style="left:490px"><span class="mdi mdi-thermometer ico lbl" style="color:#FF8A65"></span><span class="lbl title">Sensor</span><span class="lbl tag" style="top:180px;font-size:40px">68&deg;</span><span class="lbl tag" style="top:240px;font-size:13px;color:#8A8F9E">Temperature</span></div>
  <!-- lock -->
  <div class="card" style="left:620px"><span class="mdi mdi-lock ico lbl" style="color:#2ED5B8"></span><span class="lbl title">Lock</span><div style="position:absolute;left:25px;top:150px;width:70px;height:70px;border-radius:18px;background:#161B24;display:flex;align-items:center;justify-content:center"><span class="mdi mdi-lock" style="font-size:34px;color:#2ED5B8"></span></div><span class="lbl tag" style="top:250px;font-size:18px;color:#2ED5B8">Locked</span></div>
  <!-- climate -->
  <div class="card" style="left:750px"><span class="mdi mdi-thermostat ico lbl" style="color:#FFCE54"></span><span class="lbl title">Climate</span><span class="lbl tag" style="top:140px;font-size:40px">72&deg;</span><div style="position:absolute;left:30px;top:210px;width:60px;height:54px;border-radius:14px;background:#161B24;display:flex;align-items:center;justify-content:center"><span class="mdi mdi-chevron-up" style="font-size:28px"></span></div><div style="position:absolute;left:30px;top:272px;width:60px;height:54px;border-radius:14px;background:#161B24;display:flex;align-items:center;justify-content:center"><span class="mdi mdi-chevron-down" style="font-size:28px"></span></div></div>
  <!-- media -->
  <div class="card" style="left:880px;width:120px"><span class="mdi mdi-music ico lbl" style="color:#7B6CFF"></span><span class="lbl title">Media</span><div style="position:absolute;left:25px;top:120px;width:70px;height:70px;border-radius:12px;background:linear-gradient(135deg,#7B6CFF,#2ED5B8)"></div><span class="lbl tag" style="top:200px;font-size:12px">Midnight City</span><div style="position:absolute;left:30px;top:240px;width:60px;height:60px;border-radius:30px;background:#2ED5B8;display:flex;align-items:center;justify-content:center"><span class="mdi mdi-pause" style="font-size:30px;color:#08090D"></span></div></div>
</div>
<!-- cover card on second row note (8th type) -->
<div style="position:absolute;left:100px;top:548px;width:824px;height:0"></div>
</body></html>
