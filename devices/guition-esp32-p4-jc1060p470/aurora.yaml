            on_click: [homeassistant.action: { action: media_player.media_play_pause, data: { entity_id: media_player.living_room } } ]
        - button:
            x: 560
            y: 144
            width: 200
            height: 44
            styles: st_glass
            pad_all: 10
            widgets: [label: { text: "Kitchen", align: left_mid, text_font: f_body, text_color: $c_text } ]
            on_click: [homeassistant.action: { action: media_player.media_play_pause, data: { entity_id: media_player.kitchen } } ]
        - button:
            x: 560
            y: 196
            width: 200
            height: 44
            styles: st_glass
            pad_all: 10
            widgets: [label: { text: "Dining (Juke)", align: left_mid, text_font: f_body, text_color: $c_text } ]
            on_click: [homeassistant.action: { action: media_player.media_play_pause, data: { entity_id: media_player.living_room_juke_audio_dining_room_zone } } ]

        # webOS TV remote (media_player.lg_g3_living_room_2)
        - label: { text: "LG G3 OLED", x: 790, y: 70, text_font: f_small, text_color: $c_text2 }
        - button:
            x: 880
            y: 150
            width: 60
            height: 48
            styles: st_glass
            widgets: [label: { text: "󰅃", align: center, text_font: f_icon, text_color: $c_text } ]
            on_click: [homeassistant.action: { action: webostv.button, data: { entity_id: media_player.lg_g3_living_room_2, button: UP } } ]
        - button:
            x: 810
            y: 206
            width: 60
            height: 48
            styles: st_glass
            widgets: [label: { text: "󰅁", align: center, text_font: f_icon, text_color: $c_text } ]
            on_click: [homeassistant.action: { action: webostv.button, data: { entity_id: media_player.lg_g3_living_room_2, button: LEFT } } ]
        - button:
            x: 880
            y: 206
            width: 60
            height: 48
            bg_color: $c_teal
            widgets: [label: { text: "OK", align: center, text_font: f_body, text_color: $c_bg } ]
            on_click: [homeassistant.action: { action: webostv.button, data: { entity_id: media_player.lg_g3_living_room_2, button: ENTER } } ]
        - button:
            x: 950
            y: 206
            width: 60
            height: 48
            styles: st_glass
            widgets: [label: { text: "󰐊", align: center, text_font: f_icon, text_color: $c_text } ]
            on_click: [homeassistant.action: { action: webostv.button, data: { entity_id: media_player.lg_g3_living_room_2, button: RIGHT } } ]
        - button:
            x: 880
            y: 262
            width: 60
            height: 48
            styles: st_glass
            widgets: [label: { text: "󰅀", align: center, text_font: f_icon, text_color: $c_text } ]
            on_click: [homeassistant.action: { action: webostv.button, data: { entity_id: media_player.lg_g3_living_room_2, button: DOWN } } ]
        - button:
            x: 810
            y: 330
            width: 90
            height: 44
            styles: st_glass
            widgets: [label: { text: "VOL -", align: center, text_font: f_body, text_color: $c_text } ]
            on_click: [homeassistant.action: { action: media_player.volume_down, data: { entity_id: media_player.lg_g3_living_room_2 } } ]
        - button:
            x: 920
            y: 330
