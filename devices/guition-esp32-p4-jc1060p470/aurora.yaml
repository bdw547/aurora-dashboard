        - label: { text: "PLAYLIST", x: 100, y: 80, text_font: f_small, text_color: $c_text2 }
        - dropdown:
            id: dd_playlist
            x: 100
            y: 102
            width: 500
            options:
              - "—"
            on_value:
              then:
                - lambda: |-
                    int idx = lv_dropdown_get_selected(id(dd_playlist)->obj);
                    std::string &u = id(g_pl_uris);
                    int line = 0; size_t start = 0; std::string uri;
                    for (size_t i = 0; i <= u.size(); i++) {
                      if (i == u.size() || u[i] == '\n') {
                        if (line == idx) { uri = u.substr(start, i - start); break; }
                        line++; start = i + 1;
                      }
                    }
                    id(g_cur_pl_uri) = uri;
                - homeassistant.action:
                    action: script.aurora_spotify_load_playlist
                    data:
                      playlist_uri: !lambda 'return id(g_cur_pl_uri);'
