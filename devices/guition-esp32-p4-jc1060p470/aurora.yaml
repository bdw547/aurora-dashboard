                    - lvgl.widget.update: { id: to_1, bg_color: 0x161B24 }
                    - lvgl.widget.update: { id: to_5, bg_color: 0x2ED5B8 }
                    - lvgl.widget.update: { id: to_15, bg_color: 0x161B24 }
              - button:
