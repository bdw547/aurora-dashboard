<!doctype html><html><head><meta charset=utf-8>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css" rel="stylesheet">
<style>
html,body{margin:0;padding:0;background:#000}
.aufr{position:relative;width:1024px;height:600px;background:#08090D;background-image:radial-gradient(130% 100% at 88% -10%,rgba(46,213,184,.13),rgba(123,108,255,.08) 42%,transparent 70%);font-family:'Sora',system-ui,sans-serif;color:#EEF0F6;overflow:hidden}
/* st_glass */
.glass{position:absolute;background:rgba(20,23,32,.92);border:1px solid #2A2E38;border-radius:22px}
.mdi{font-family:'Material Design Icons';font-style:normal;line-height:1}
.l{position:absolute;white-space:nowrap}
.f-disp{font-family:Sora;font-weight:600}
.f-title{font-family:Sora;font-weight:600;font-size:24px}
.f-head{font-family:Sora;font-weight:600;font-size:34px}
.f-body{font-family:Sora;font-weight:500;font-size:14px}
.f-small{font-family:Sora;font-weight:500;font-size:12px}
/* nav rail */
.rail{position:absolute;left:0;top:0;width:74px;height:600px;background:#10121A;opacity:.96}
.nav{position:absolute;left:8px;width:58px;height:58px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:30px;color:#EEF0F6}
.qbtn{position:absolute;width:122px;height:62px;border-radius:12px;background:#161B24;display:flex;align-items:center;justify-content:center;font-size:14px}
</style></head><body>
<div class="aufr">
  <!-- nav rail (active: home) -->
  <div class="rail"></div>
  <div class="nav mdi mdi-home" style="top:22px;background:#2ED5B8"></div>
  <div class="nav mdi mdi-sofa" style="top:92px;background:#10121A"></div>
  <div class="nav mdi mdi-lightbulb" style="top:162px;background:#10121A"></div>
  <div class="nav mdi mdi-thermometer" style="top:232px;background:#10121A"></div>
  <div class="nav mdi mdi-music" style="top:302px;background:#10121A"></div>
  <div class="nav mdi mdi-shield-home" style="top:372px;background:#10121A"></div>
  <div class="nav mdi mdi-wifi" style="top:442px;background:#10121A"></div>
  <div class="nav mdi mdi-cog" style="top:512px;background:#10121A"></div>
  <div class="l f-small" style="right:10px;bottom:26px;color:#8A8F9E">Walton-Home</div>
  <div class="l f-small" style="right:10px;bottom:8px;color:#2ED5B8">10.0.0.174</div>

  <!-- clock + greeting -->
  <div class="l" style="left:96px;top:8px;height:62px;display:flex;align-items:flex-end;gap:10px"><span class="f-disp" style="font-size:52px">2:45</span><span class="f-title" style="color:#8A8F9E;padding-bottom:8px">PM</span></div>
  <div class="l f-body" style="left:100px;top:70px;color:#8A8F9E">Welcome home, Ben</div>

  <!-- status chips -->
  <div class="glass" style="left:600px;top:24px;width:150px;height:40px"><span class="mdi l" style="left:12px;top:50%;transform:translateY(-50%);color:#FFCE54;font-size:30px">&#xF0599;</span><span class="l f-body" style="left:50px;top:50%;transform:translateY(-50%)">72&deg;</span></div>
  <div class="glass" style="left:760px;top:24px;width:118px;height:40px"><span class="l" style="left:14px;top:50%;transform:translateY(-50%);width:8px;height:8px;border-radius:4px;background:#2ED5B8"></span><span class="l f-small" style="left:30px;top:50%;transform:translateY(-50%)">Home</span></div>
  <div class="glass" style="left:888px;top:24px;width:126px;height:40px"><span class="mdi l" style="left:12px;top:50%;transform:translateY(-50%);color:#2ED5B8;font-size:30px">&#xF033E;</span><span class="l f-small" style="left:46px;top:50%;transform:translateY(-50%)">Secured</span></div>

  <!-- media card (pad 0) -->
  <div class="glass" style="left:96px;top:104px;width:300px;height:452px">
    <span class="l" style="left:20px;top:22px;width:8px;height:8px;border-radius:4px;background:#2ED5B8"></span>
    <span class="l f-small" style="left:36px;top:16px;color:#2ED5B8;letter-spacing:.04em">PLAYING</span>
    <div style="position:absolute;left:26px;top:44px;width:248px;height:248px;border-radius:16px;background:linear-gradient(135deg,#7B6CFF,#2ED5B8)"></div>
    <span class="l f-title" style="left:26px;top:302px;width:248px;overflow:hidden;text-overflow:ellipsis">Midnight City</span>
    <span class="l f-body" style="left:26px;top:334px;color:#8A8F9E">M83</span>
    <div style="position:absolute;left:50px;top:374px;width:48px;height:48px;border-radius:8px;background:#161B24;display:flex;align-items:center;justify-content:center"><span class="mdi" style="font-size:30px">&#xF04AE;</span></div>
    <div style="position:absolute;left:118px;top:366px;width:64px;height:64px;border-radius:32px;background:linear-gradient(135deg,#2ED5B8,#7B6CFF);display:flex;align-items:center;justify-content:center"><span class="mdi" style="font-size:30px;color:#08090D">&#xF040A;</span></div>
    <div style="position:absolute;left:202px;top:374px;width:48px;height:48px;border-radius:8px;background:#161B24;display:flex;align-items:center;justify-content:center"><span class="mdi" style="font-size:30px">&#xF04AD;</span></div>
  </div>

  <!-- climate card (pad 20) -->
  <div class="glass" style="left:412px;top:104px;width:288px;height:218px">
    <span class="l f-small" style="left:24px;top:22px;color:#8A8F9E">CLIMATE</span>
    <span class="mdi l" style="right:26px;top:20px;color:#FFCE54;font-size:30px">&#xF0599;</span>
    <span class="l f-disp" style="left:22px;top:66px;font-size:52px">72</span>
    <span class="l f-body" style="left:24px;top:158px;color:#2ED5B8">Sunny</span>
    <span class="l f-small" style="left:24px;top:188px;color:#8A8F9E">Outdoor</span>
  </div>

  <!-- lights card (pad 20) -->
  <div class="glass" style="left:716px;top:104px;width:288px;height:218px">
    <span class="mdi l" style="left:28px;top:28px;color:#FFCE54;font-size:30px">&#xF0335;</span>
    <span class="l f-title" style="left:70px;top:36px">Lights</span>
    <span class="l f-small" style="left:28px;top:190px;color:#8A8F9E">Tap to control</span>
  </div>

  <!-- doors card (pad 20) -->
  <div class="glass" style="left:412px;top:338px;width:288px;height:218px">
    <span class="l f-small" style="left:24px;top:22px;color:#8A8F9E">DOORS &amp; SENSORS</span>
    <span class="l f-body" style="left:24px;top:70px">Front Door</span><span class="l f-body" style="right:24px;top:70px;color:#8A8F9E">Locked</span>
    <span class="l f-body" style="left:24px;top:112px">Back Door</span><span class="l f-body" style="right:24px;top:112px;color:#8A8F9E">Locked</span>
    <span class="l f-body" style="left:24px;top:154px">Presence</span><span class="l f-body" style="right:24px;top:154px;color:#2ED5B8">Home</span>
  </div>

  <!-- quick card (pad 12) -->
  <div class="glass" style="left:716px;top:338px;width:288px;height:218px">
    <span class="l f-small" style="left:14px;top:12px;color:#8A8F9E">QUICK</span>
    <div class="qbtn" style="left:12px;top:42px">Rooms</div>
    <div class="qbtn" style="left:144px;top:42px">Media</div>
    <div class="qbtn" style="left:12px;top:114px">Network</div>
    <div class="qbtn" style="left:144px;top:114px">Library</div>
  </div>
</div>
</body></html>
