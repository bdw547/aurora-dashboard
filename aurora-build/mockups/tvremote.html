<!doctype html><html><head><meta charset=utf-8>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css" rel="stylesheet">
<style>
html,body{margin:0;padding:0;background:#000}
.aufr{position:relative;width:1024px;height:600px;background:#08090d;background-image:radial-gradient(120% 90% at 85% 0%,rgba(46,213,184,.10),rgba(123,108,255,.07) 40%,transparent 70%);font-family:'Sora',system-ui,sans-serif;color:#EEF0F6;overflow:hidden}
.mdi{font-family:'Material Design Icons';font-style:normal;line-height:1}
.btn{position:absolute;background:#141720;border:1px solid #2A2E38;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:16px}
.lbl{position:absolute;white-space:nowrap}
</style></head><body>
<div class="aufr">
  <div class="lbl" style="left:100px;top:26px;font-size:24px;font-weight:600">LG G3 OLED Remote</div>
  <div style="position:absolute;right:12px;top:12px;width:104px;height:44px;border-radius:8px;background:#1B2230;border:2px solid #2ED5B8;display:flex;align-items:center;justify-content:center;color:#2ED5B8;font-size:15px">Back</div>

  <!-- left column -->
  <div class="btn" style="left:120px;top:100px;width:150px;height:56px;color:#FF9F6B">Power</div>
  <div class="btn" style="left:120px;top:164px;width:150px;height:56px">Home</div>
  <div class="btn" style="left:120px;top:228px;width:150px;height:56px">Back</div>
  <div class="btn" style="left:120px;top:292px;width:150px;height:56px">Exit</div>
  <div class="btn" style="left:120px;top:356px;width:150px;height:56px">Menu</div>
  <div class="btn" style="left:120px;top:420px;width:150px;height:56px">Info</div>

  <!-- D-pad -->
  <div class="btn" style="left:476px;top:110px;width:84px;height:84"><span class="mdi mdi-chevron-up" style="font-size:40px"></span></div>
  <div class="btn" style="left:382px;top:200px;width:84px;height:84"><span class="mdi mdi-chevron-left" style="font-size:40px"></span></div>
  <div class="btn" style="left:476px;top:200px;width:84px;height:84;background:#2ED5B8;border-color:#2ED5B8;color:#08090D;font-weight:600">OK</div>
  <div class="btn" style="left:570px;top:200px;width:84px;height:84"><span class="mdi mdi-chevron-right" style="font-size:40px"></span></div>
  <div class="btn" style="left:476px;top:290px;width:84px;height:84"><span class="mdi mdi-chevron-down" style="font-size:40px"></span></div>

  <!-- transport -->
  <div class="btn" style="left:382px;top:392px;width:70px;height:54;font-size:13px">REW</div>
  <div class="btn" style="left:458px;top:392px;width:70px;height:54;font-size:13px">PLAY</div>
  <div class="btn" style="left:534px;top:392px;width:70px;height:54;font-size:13px">PAUSE</div>
  <div class="btn" style="left:610px;top:392px;width:70px;height:54;font-size:13px">STOP</div>
  <div class="btn" style="left:686px;top:392px;width:70px;height:54;font-size:13px">FF</div>

  <!-- apps + trackpad -->
  <div style="position:absolute;left:382px;top:456px;width:240px;height:54px;border-radius:14px;background:#7B6CFF;display:flex;align-items:center;color:#fff;font-size:16px"><span style="margin-left:16px">Apps</span><span style="position:absolute;right:12px;font-size:13px;color:#E6E2FF">Netflix</span></div>
  <div class="btn" style="left:636px;top:456px;width:120px;height:54">Trackpad</div>

  <!-- right column -->
  <div class="btn" style="left:812px;top:110px;width:172px;height:56">VOL +</div>
  <div class="btn" style="left:812px;top:174px;width:172px;height:56">MUTE</div>
  <div class="btn" style="left:812px;top:238px;width:172px;height:56">VOL -</div>
  <div class="btn" style="left:812px;top:318px;width:172px;height:56">CH +</div>
  <div class="btn" style="left:812px;top:382px;width:172px;height:56">CH -</div>
</div>
</body></html>
