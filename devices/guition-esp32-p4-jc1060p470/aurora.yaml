        - obj:
            x: 96
            y: 84
            width: 816
            height: 116
            styles: st_glass
            scrollable: false
            widgets:
              - label: { text: "DISPLAY BRIGHTNESS", x: 4, y: 0, text_font: f_small, text_color: 0x8A8F9E }
              - slider:
                  id: sld_brightness
                  x: 0
                  y: 48
                  width: 776
                  min_value: 5
                  max_value: 100
                  value: 80
                  on_value:
                    - light.turn_on:
                        id: display_backlight
                        brightness: !lambda 'return x / 100.0f;'
                    - lambda: 'id(g_bri) = (int) x;'
        - obj:
            x: 96
            y: 210
            width: 816
            height: 150
            styles: st_glass
            scrollable: false
            widgets:
              - label: { text: "SCREEN TIMEOUT", x: 0, y: 0, text_font: f_small, text_color: 0x8A8F9E }
              - button:
                  id: to_never
                  x: 0
                  y: 44
                  width: 182
                  height: 60
                  bg_color: 0x2ED5B8
                  scrollable: false
                  widgets: [label: { text: "Never", align: center, text_font: f_body, text_color: 0x08090D }]
                  on_click:
                    - lambda: 'id(g_timeout_ms) = 0;'
                    - lvgl.widget.update: { id: to_never, bg_color: 0x2ED5B8 }
                    - lvgl.widget.update: { id: to_1, bg_color: 0x161B24 }
                    - lvgl.widget.update: { id: to_5, bg_color: 0x161B24 }
                    - lvgl.widget.update: { id: to_15, bg_color: 0x161B24 }
              - button:
                  id: to_1
                  x: 198
                  y: 44
                  width: 182
                  height: 60
                  bg_color: 0x161B24
                  scrollable: false
                  widgets: [label: { text: "1 min", align: center, text_font: f_body, text_color: 0xEEF0F6 }]
                  on_click:
                    - lambda: 'id(g_timeout_ms) = 60000;'
                    - lvgl.widget.update: { id: to_never, bg_color: 0x161B24 }
                    - lvgl.widget.update: { id: to_1, bg_color: 0x2ED5B8 }
                    - lvgl.widget.update: { id: to_5, bg_color: 0x161B24 }
                    - lvgl.widget.update: { id: to_15, bg_color: 0x161B24 }
              - button:
