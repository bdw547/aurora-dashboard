  # ---- Front-door camera proxy URL (tokenized, from entity_picture) ----
  - platform: homeassistant
    id: ha_cam_picture
    entity_id: $ent_camera_front
    attribute: entity_picture
    on_value:
      then:
        - lambda: 'id(g_cam_url) = std::string("$ha_base") + x;'
  # ---- Doorbell chime -> pop up the camera (guard: ignore initial sync) ----
  - platform: homeassistant
    id: ha_chime
    entity_id: $ent_event_chime
    on_value:
      then:
        - if:
            condition:
              lambda: 'return !id(g_chime_init);'
            then:
              - lambda: 'id(g_chime_init) = true; id(g_last_chime) = x;'
            else:
              - if:
                  condition:
                    lambda: 'return x != id(g_last_chime);'
                  then:
                    - lambda: 'id(g_last_chime) = x;'
                    - light.turn_on: { id: display_backlight, brightness: !lambda 'return id(g_bri) / 100.0f;' }
                    - lambda: 'id(g_screen_off) = false;'
                    - lvgl.page.show: page_doorbell
  # ---- Weather detail: current condition -> big glyph + pretty name ----
  - platform: homeassistant
    id: ha_wx_cond
    entity_id: $ent_weather
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_wx_icon
            text: !lambda |-
              std::string c = x;
              if (c=="sunny") return std::string("\U000F0599");
              if (c=="clear-night") return std::string("\U000F0594");
              if (c=="partlycloudy") return std::string("\U000F0595");
              if (c=="cloudy") return std::string("\U000F0590");
              if (c=="rainy") return std::string("\U000F0597");
              if (c=="pouring") return std::string("\U000F0596");
              if (c=="snowy") return std::string("\U000F0598");
              if (c=="snowy-rainy") return std::string("\U000F067F");
              if (c=="fog") return std::string("\U000F0591");
              if (c=="hail") return std::string("\U000F0592");
              if (c=="lightning") return std::string("\U000F0593");
              if (c=="lightning-rainy") return std::string("\U000F067E");
              if (c=="windy" || c=="windy-variant") return std::string("\U000F059D");
              return std::string("\U000F0026");
        - lvgl.label.update:
            id: lbl_wx_cond
            text: !lambda |-
              std::string c = x;
              if (c=="partlycloudy") return std::string("Partly cloudy");
              if (c=="clear-night") return std::string("Clear");
              if (c=="snowy-rainy") return std::string("Sleet");
              if (c=="lightning-rainy") return std::string("Thunderstorms");
              if (c=="lightning") return std::string("Thunder");
              if (c=="windy-variant") return std::string("Windy");
              for (size_t i=0;i<c.size();i++){ if(c[i]=='-') c[i]=' '; }
              if (!c.empty()) c[0]=toupper(c[0]);
              return c;
  # ---- Today high/low (forecast package) ----
