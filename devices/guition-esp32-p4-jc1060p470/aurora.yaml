            on_click:
              - homeassistant.action:
                  action: light.toggle
                  data: { entity_id: light.kitchen_kitchen }
        - button:
            x: 96
            y: 278
            width: 266
            height: 56
            styles: st_glass
            pad_all: 12
            widgets:
              - obj: { width: 11, height: 11, radius: 6, bg_color: 0xFF9F6B, align: left_mid, x: 4, border_width: 0 }
              - label: { text: "Reading Lamp", align: left_mid, x: 24, text_font: f_body, text_color: 0xEEF0F6 }
            on_click:
              - homeassistant.action:
                  action: light.toggle
                  data: { entity_id: light.reading_lamp }
        - button:
            x: 96
            y: 340
            width: 266
            height: 56
            styles: st_glass
            pad_all: 12
            widgets:
              - obj: { width: 11, height: 11, radius: 6, bg_color: 0x2ED5B8, align: left_mid, x: 4, border_width: 0 }
              - label: { text: "Patio Lights", align: left_mid, x: 24, text_font: f_body, text_color: 0xEEF0F6 }
            on_click:
              - homeassistant.action:
                  action: light.toggle
                  data: { entity_id: light.outdoor_patio_back_porch_lights }
        - button:
            x: 96
            y: 402
            width: 266
            height: 56
            styles: st_glass
            pad_all: 12
            widgets:
              - obj: { width: 11, height: 11, radius: 6, bg_color: 0xCFE6FF, align: left_mid, x: 4, border_width: 0 }
              - label: { text: "Office Main", align: left_mid, x: 24, text_font: f_body, text_color: 0xEEF0F6 }
            on_click:
              - homeassistant.action:
                  action: light.toggle
                  data: { entity_id: light.office_main_lights }
        - button:
            x: 96
