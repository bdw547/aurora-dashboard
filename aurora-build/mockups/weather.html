<!doctype html><html><head><meta charset=utf-8>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css" rel="stylesheet">
<style>
html,body{margin:0;padding:0;background:#000}
.aufr{position:relative;width:1024px;height:600px;background:#08090d;background-image:radial-gradient(120% 90% at 80% 0%,rgba(255,206,84,.10),rgba(123,108,255,.07) 45%,transparent 72%);font-family:'Sora',system-ui,sans-serif;color:#EEF0F6;overflow:hidden}
.nav{position:absolute;left:8px;width:58px;height:58px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:30px;color:#EEF0F6}
.c{position:absolute;background:#141720;border:1px solid #2A2E38;border-radius:22px}
.mdi{font-family:'Material Design Icons';font-style:normal;line-height:1}
.lbl{position:absolute;white-space:nowrap}
.day{position:absolute;width:118px;height:172px;border-radius:16px;background:#161B24}
</style></head><body>
<div class="aufr">
  <div style="position:absolute;left:0;top:0;width:74px;height:600px;background:#10121A;opacity:.96"></div>
  <div class="nav mdi mdi-home" style="top:22px"></div>
  <div class="nav mdi mdi-sofa" style="top:92px"></div>
  <div class="nav mdi mdi-lightbulb" style="top:162px"></div>
  <div class="nav mdi mdi-thermostat" style="top:232px"></div>
  <div class="nav mdi mdi-music" style="top:302px"></div>
  <div class="nav mdi mdi-shield-home" style="top:372px"></div>
  <div class="nav mdi mdi-wifi" style="top:442px"></div>
  <div class="nav mdi mdi-cog" style="top:512px"></div>

  <!-- hero -->
  <div class="c" style="left:100px;top:24px;width:452px;height:300px">
    <span class="mdi mdi-weather-sunny lbl" style="left:30px;top:40px;font-size:120px;color:#FFCE54"></span>
    <span class="lbl" style="left:210px;top:44px;font-size:96px;font-weight:600">72&deg;</span>
    <span class="lbl" style="left:30px;top:180px;font-size:20px;font-weight:600">Sunny</span>
    <span class="lbl" style="left:30px;top:216px;font-size:14px;color:#8A8F9E">Walton-Home &middot; Feels like 70&deg;</span>
    <span class="lbl" style="left:30px;top:248px;font-size:14px;color:#8A8F9E">H 78&deg; &nbsp; L 61&deg; &nbsp;&middot;&nbsp; Wind 6 mph</span>
  </div>

  <!-- conditions -->
  <div class="c" style="left:568px;top:24px;width:436px;height:300px">
    <span class="lbl" style="left:24px;top:18px;font-size:12px;color:#8A8F9E;letter-spacing:.06em">CONDITIONS</span>
    <span class="mdi mdi-water-percent lbl" style="left:24px;top:56px;color:#2ED5B8;font-size:30px"></span><span class="lbl" style="left:70px;top:60px;font-size:15px">Humidity</span><span class="lbl" style="right:24px;top:60px;font-size:15px;font-weight:600">44%</span>
    <span class="mdi mdi-weather-windy lbl" style="left:24px;top:108px;color:#2ED5B8;font-size:30px"></span><span class="lbl" style="left:70px;top:112px;font-size:15px">Wind</span><span class="lbl" style="right:24px;top:112px;font-size:15px;font-weight:600">6 mph NW</span>
    <span class="mdi mdi-weather-sunset-up lbl" style="left:24px;top:160px;color:#FFCE54;font-size:30px"></span><span class="lbl" style="left:70px;top:164px;font-size:15px">Sunrise</span><span class="lbl" style="right:24px;top:164px;font-size:15px;font-weight:600">6:14 AM</span>
    <span class="mdi mdi-weather-sunset-down lbl" style="left:24px;top:212px;color:#FF8A65;font-size:30px"></span><span class="lbl" style="left:70px;top:216px;font-size:15px">Sunset</span><span class="lbl" style="right:24px;top:216px;font-size:15px;font-weight:600">8:42 PM</span>
  </div>

  <!-- 5-day -->
  <div class="lbl" style="left:100px;top:344px;font-size:12px;color:#8A8F9E;letter-spacing:.06em">5-DAY FORECAST</div>
  <div class="day" style="left:100px;top:372px"><span class="lbl" style="left:0;width:118px;text-align:center;top:18px;font-size:14px;color:#8A8F9E">Mon</span><span class="mdi mdi-weather-sunny lbl" style="left:0;width:118px;text-align:center;top:54px;font-size:40px;color:#FFCE54"></span><span class="lbl" style="left:0;width:118px;text-align:center;top:118px;font-size:18px;font-weight:600">78&deg;</span><span class="lbl" style="left:0;width:118px;text-align:center;top:146px;font-size:13px;color:#8A8F9E">61&deg;</span></div>
  <div class="day" style="left:236px;top:372px"><span class="lbl" style="left:0;width:118px;text-align:center;top:18px;font-size:14px;color:#8A8F9E">Tue</span><span class="mdi mdi-weather-partly-cloudy lbl" style="left:0;width:118px;text-align:center;top:54px;font-size:40px;color:#8A8F9E"></span><span class="lbl" style="left:0;width:118px;text-align:center;top:118px;font-size:18px;font-weight:600">74&deg;</span><span class="lbl" style="left:0;width:118px;text-align:center;top:146px;font-size:13px;color:#8A8F9E">59&deg;</span></div>
  <div class="day" style="left:372px;top:372px"><span class="lbl" style="left:0;width:118px;text-align:center;top:18px;font-size:14px;color:#8A8F9E">Wed</span><span class="mdi mdi-weather-rainy lbl" style="left:0;width:118px;text-align:center;top:54px;font-size:40px;color:#42A5F5"></span><span class="lbl" style="left:0;width:118px;text-align:center;top:118px;font-size:18px;font-weight:600">66&deg;</span><span class="lbl" style="left:0;width:118px;text-align:center;top:146px;font-size:13px;color:#8A8F9E">55&deg;</span></div>
  <div class="day" style="left:508px;top:372px"><span class="lbl" style="left:0;width:118px;text-align:center;top:18px;font-size:14px;color:#8A8F9E">Thu</span><span class="mdi mdi-weather-pouring lbl" style="left:0;width:118px;text-align:center;top:54px;font-size:40px;color:#42A5F5"></span><span class="lbl" style="left:0;width:118px;text-align:center;top:118px;font-size:18px;font-weight:600">63&deg;</span><span class="lbl" style="left:0;width:118px;text-align:center;top:146px;font-size:13px;color:#8A8F9E">52&deg;</span></div>
  <div class="day" style="left:644px;top:372px"><span class="lbl" style="left:0;width:118px;text-align:center;top:18px;font-size:14px;color:#8A8F9E">Fri</span><span class="mdi mdi-weather-partly-cloudy lbl" style="left:0;width:118px;text-align:center;top:54px;font-size:40px;color:#8A8F9E"></span><span class="lbl" style="left:0;width:118px;text-align:center;top:118px;font-size:18px;font-weight:600">71&deg;</span><span class="lbl" style="left:0;width:118px;text-align:center;top:146px;font-size:13px;color:#8A8F9E">57&deg;</span></div>

  <!-- radar placeholder -->
  <div class="c" style="left:792px;top:344px;width:212px;height:212px;overflow:hidden;padding:0">
    <div style="position:absolute;inset:0;background:#0c1016;background-image:radial-gradient(60% 60% at 50% 50%,rgba(46,213,184,.25),rgba(66,165,245,.12) 60%,transparent)"></div>
    <span class="mdi mdi-radar lbl" style="left:0;width:212px;text-align:center;top:70px;font-size:48px;color:#2ED5B8"></span>
    <span class="lbl" style="left:0;width:212px;text-align:center;top:140px;font-size:13px;color:#8A8F9E">Radar</span>
  </div>
</div>
</body></html>
